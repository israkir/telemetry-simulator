# OTEL resource configuration: presets keyed by vendor.module value (semconv resource_attributes).
# Attribute keys follow resource/scenarios/conventions/semconv.yaml
# (e.g. vendor.module, vendor.component, vendor.otel.source).
#
# Preset "data-plane": vendor.component is set at runtime per span to one of
# (semconv): orchestrator, planning, retrieval, llm, mcp_client, tool_recommender.
# Do not set vendor.component under data-plane.attributes; it is overridden per span.

schema_url: "https://gentoro.ai/otel/schema/enterprise/1.0.0"

control-plane:
  attributes:
    service.name: "gentoro-enterprise"
    service.version: "1.1.0"
    service.instance.id: "pod-7f9c6d4b8d-xyz12"
    deployment.environment.name: "development"
    vendor.module: "control-plane"
    vendor.component: "gateway-ext"
    vendor.otel.source: "propagated"

data-plane:
  attributes:
    service.name: "gentoro-enterprise"
    service.version: "1.1.0"
    service.instance.id: "pod-7f9c6d4b8d-xyz12"
    deployment.environment.name: "development"
    vendor.module: "data-plane"
    # vendor.component: set at runtime per span (orchestrator | planning | retrieval | llm | mcp_client | tool_recommender)
    vendor.otel.source: "propagated"
