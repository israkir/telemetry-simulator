# -----------------------------------------------------------------------------
# Latency profiles: scenario selects one via data_plane.latency_profile (or goal: higher_latency).
# Scenario mapping: new_claim_phone (happy_path) vs claim_status_phone_higher_latency (higher_latency).
# Exported trace duration attributes align with actual span duration so happy_path vs higher_latency
# are clearly distinguishable (e.g. mcp_tool_execute 160ms vs 800ms, a2a_orchestrate 1500 vs 2200).
# -----------------------------------------------------------------------------
latency_profiles:
  happy_path:
    default_variance: 0.2
    spans:
      a2a_orchestrate: { mean_ms: 1500.0, variance: 0.2 }
      planner: { mean_ms: 220.0, variance: 0.22 }
      task_execute: { mean_ms: 75.0, variance: 0.18 }
      llm_call: { mean_ms: 420.0, variance: 0.35 }
      tools_recommend: { mean_ms: 52.0, variance: 0.28 }
      mcp_tool_execute: { mean_ms: 160.0, variance: 0.32 }
      response_compose: { mean_ms: 58.0, variance: 0.2 }
      request_validation: { mean_ms: 36.0, variance: 0.25 }
      response_validation: { mean_ms: 38.0, variance: 0.25 }
      validation_payload: { mean_ms: 18.0, variance: 0.22 }
      validation_policy: { mean_ms: 24.0, variance: 0.25 }
      augmentation: { mean_ms: 85.0, variance: 0.35 }
  higher_latency:
    default_variance: 0.2
    spans:
      a2a_orchestrate: { mean_ms: 2200.0, variance: 0.25 }
      planner: { mean_ms: 220.0, variance: 0.22 }
      task_execute: { mean_ms: 75.0, variance: 0.18 }
      llm_call: { mean_ms: 420.0, variance: 0.35 }
      tools_recommend: { mean_ms: 52.0, variance: 0.28 }
      mcp_tool_execute: { mean_ms: 800.0, variance: 0.4 }
      response_compose: { mean_ms: 58.0, variance: 0.2 }
      request_validation: { mean_ms: 36.0, variance: 0.25 }
      response_validation: { mean_ms: 38.0, variance: 0.25 }
      validation_payload: { mean_ms: 18.0, variance: 0.22 }
      validation_policy: { mean_ms: 24.0, variance: 0.25 }
      augmentation: { mean_ms: 85.0, variance: 0.35 }
  # Peak hours / post long weekend: higher than base higher_latency for realistic peak load.
  higher_latency_peak:
    default_variance: 0.22
    spans:
      a2a_orchestrate: { mean_ms: 3000.0, variance: 0.28 }
      planner: { mean_ms: 280.0, variance: 0.22 }
      task_execute: { mean_ms: 95.0, variance: 0.2 }
      llm_call:
        mean_ms: 520.0
        variance: 0.35
