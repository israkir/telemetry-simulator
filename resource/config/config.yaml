# -----------------------------------------------------------------------------
# MCP tool payloads (GenAI semantic convention)
#
# Per resource/scenarios/conventions/semconv.yaml — mcp_tool_execution_model /
# mcp_tool_attempt_attributes:
#   - gen_ai.tool.call.arguments: JSON-serialized parameters (attempt span only)
#   - gen_ai.tool.call.result: JSON-serialized tool result (attempt span only)
#
# Each tool lists:
#   - structure: logical field catalog (documentation; optional for sim)
#   - sample: default object merged into traces; scenario YAML overrides per tool name
# -----------------------------------------------------------------------------
mcp_tool_genai_payloads:
  new_claim:
    gen_ai.tool.call.arguments:
      structure:
        product_type: { type: string, required: true, description: "Product line (phone, tv, fridge, ...)" }
        description: { type: string, description: "Free-text incident / damage summary" }
        incident_date: { type: string, format: iso8601-date }
        scheduling_time_resolution: { type: string, description: "When set to ambiguous_day_part, caller must also supply a concrete clock window or slot — otherwise MCP rejects (see preferred_time_window)." }
        preferred_time_window: { type: string, description: "Day-part hint (morning / afternoon); only valid with scheduling_time_resolution=concrete_slot or after get_available_slots; with ambiguous_day_part alone the tool fails." }
      sample:
        product_type: "phone"
        description: "Device not powering on after drop; screen damage reported."
        incident_date: "2026-03-10"
    gen_ai.tool.call.result:
      structure:
        claim_id: { type: string }
        product_type: { type: string }
        status: { type: string, enum: [opened, pending_info, closed, error] }
        coverage: { type: object, description: "Summary coverage descriptor" }
        notes: { type: string }
        error_code: { type: string, description: "Set when status=error (e.g. ambiguous_scheduling_time)" }
        error_message: { type: string }
      sample:
        claim_id: "CLM-0001"
        product_type: "phone"
        status: "opened"
        coverage: { type: "device_damage", deductible: 75 }
        notes: "Claim created from default payload."
  update_appointment:
    gen_ai.tool.call.arguments:
      structure:
        claim_id: { type: string, required: true }
        appointment_id: { type: string, description: "Existing booking to reschedule" }
        slot_id: { type: string }
        preferred_time_window: { type: string, description: "e.g. morning / ISO range" }
        scheduling_time_resolution: { type: string, description: "ambiguous_day_part without slot_id causes MCP validation failure; use concrete slot_id or list slots first." }
      sample:
        claim_id: "CLM-0001"
        appointment_id: "APT-000100"
        slot_id: "SLOT-2026-03-21T14:00"
        preferred_time_window: "afternoon"
    gen_ai.tool.call.result:
      structure:
        claim_id: { type: string }
        appointment_id: { type: string }
        status: { type: string }
        scheduled_at: { type: string, format: iso8601-datetime }
        error_code: { type: string }
        error_message: { type: string }
      sample:
        claim_id: "CLM-0001"
        appointment_id: "APT-000100"
        status: "rescheduled"
        scheduled_at: "2026-03-21T14:00:00Z"
  claim_status:
    gen_ai.tool.call.arguments:
      structure:
        claim_id: { type: string, required: true }
      sample:
        claim_id: "CLM-0001"
    gen_ai.tool.call.result:
      structure:
        claim_id: { type: string }
        status: { type: string }
        last_updated: { type: string, format: iso8601-datetime }
        milestones: { type: array, items: { type: string } }
      sample:
        claim_id: "CLM-0001"
        status: "in_review"
        last_updated: "2026-03-18T09:15:00Z"
        milestones: ["intake_complete", "awaiting_photos", "assessor_assigned"]
  cancel_claim:
    gen_ai.tool.call.arguments:
      structure:
        claim_id: { type: string, required: true }
        reason: { type: string }
      sample:
        claim_id: "CLM-0001"
        reason: "customer_requested_cancellation"
    gen_ai.tool.call.result:
      structure:
        claim_id: { type: string }
        status: { type: string }
        cancelled_at: { type: string, format: iso8601-datetime }
      sample:
        claim_id: "CLM-0001"
        status: "cancelled"
        cancelled_at: "2026-03-19T11:02:00Z"
  upload_documents:
    gen_ai.tool.call.arguments:
      structure:
        claim_id: { type: string, required: true }
        document_types: { type: array, items: { type: string }, description: "e.g. photo, receipt" }
        expected_count: { type: integer }
      sample:
        claim_id: "CLM-0001"
        document_types: ["photo_damage", "proof_of_purchase"]
        expected_count: 2
    gen_ai.tool.call.result:
      structure:
        claim_id: { type: string }
        upload_batch_id: { type: string }
        pending_count: { type: integer }
        status: { type: string }
      sample:
        claim_id: "CLM-0001"
        upload_batch_id: "UPL-900"
        pending_count: 0
        status: "received"
  choose_insurance:
    gen_ai.tool.call.arguments:
      structure:
        product_category: { type: string, required: true }
        coverage_tier: { type: string }
        region: { type: string }
      sample:
        product_category: "phone"
        coverage_tier: "plus"
        region: "NO-01"
    gen_ai.tool.call.result:
      structure:
        quote_id: { type: string }
        premium_monthly: { type: number }
        currency: { type: string }
        valid_until: { type: string, format: iso8601-date }
      sample:
        quote_id: "QT-500"
        premium_monthly: 12.5
        currency: "EUR"
        valid_until: "2026-04-01"
  buy_insurance:
    gen_ai.tool.call.arguments:
      structure:
        quote_id: { type: string, required: true }
        payment_method: { type: string }
        holder_reference: { type: string }
      sample:
        quote_id: "QT-500"
        payment_method: "card_on_file"
        holder_reference: "enduser_0001"
    gen_ai.tool.call.result:
      structure:
        policy_id: { type: string }
        quote_id: { type: string }
        effective_date: { type: string, format: iso8601-date }
        status: { type: string }
      sample:
        policy_id: "POL-700"
        quote_id: "QT-500"
        effective_date: "2026-03-20"
        status: "active"
  cancel_product:
    gen_ai.tool.call.arguments:
      structure:
        policy_id: { type: string, required: true }
        reason: { type: string }
      sample:
        policy_id: "POL-700"
        reason: "cooling_off"
    gen_ai.tool.call.result:
      structure:
        policy_id: { type: string }
        status: { type: string }
        refund_estimate: { type: number }
        currency: { type: string }
      sample:
        policy_id: "POL-700"
        status: "cancelled_pending_refund"
        refund_estimate: 11.25
        currency: "EUR"
  pay:
    gen_ai.tool.call.arguments:
      structure:
        payment_target: { type: string, enum: [claim_invoice, policy_renewal, excess], description: "What is being paid" }
        reference_id: { type: string, description: "claim_id, policy_id, or invoice id" }
        amount: { type: number }
        currency: { type: string }
      sample:
        payment_target: "excess"
        reference_id: "CLM-0001"
        amount: 75.0
        currency: "EUR"
    gen_ai.tool.call.result:
      structure:
        payment_id: { type: string }
        reference_id: { type: string }
        status: { type: string }
        amount: { type: number }
        currency: { type: string }
      sample:
        payment_id: "PAY-300"
        reference_id: "CLM-0001"
        status: "captured"
        amount: 75.0
        currency: "EUR"
  get_available_slots:
    gen_ai.tool.call.arguments:
      structure:
        claim_id: { type: string, required: true }
        service_type: { type: string, description: "repair_collection, assessor_visit, ..." }
        date_range_start: { type: string, format: iso8601-date }
        date_range_end: { type: string, format: iso8601-date }
      sample:
        claim_id: "CLM-0001"
        service_type: "repair_collection"
        date_range_start: "2026-03-20"
        date_range_end: "2026-03-27"
    gen_ai.tool.call.result:
      structure:
        claim_id: { type: string }
        slots: { type: array, items: { type: object } }
        timezone: { type: string }
      sample:
        claim_id: "CLM-0001"
        slots:
          - { slot_id: "SLOT-2026-03-21T09:00", duration_minutes: 120 }
          - { slot_id: "SLOT-2026-03-21T14:00", duration_minutes: 120 }
        timezone: "America/Los_Angeles"

