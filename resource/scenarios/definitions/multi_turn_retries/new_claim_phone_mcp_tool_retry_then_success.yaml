# Phone MCP: new_claim with MCP retry (first attempt timeout, second success).
# MCP retry template from config: mcp_retry_templates.retry_then_success (data_plane.mcp_retry).
# Parent mcp.tool.execute has attempt children; retry.count, retry.policy, step.outcome from spec.

name: new_claim_phone_mcp_tool_retry_then_success
description: >
  new_claim tool on Phone MCP: first attempt times out (realistic latency from mcp_retry.latency_by_error_type),
  second attempt succeeds. Uses data_plane.mcp_retry template retry_then_success.

tags:
  - data-plane
  - mcp-retry
  - retry-then-success

# MCP retries (timeout then success) are a small but visible share of tool calls.
workload_weight: 0.8
interval_ms: 150
interval_deviation_ms: 30
redaction_applied: basic

data_plane:
  workflow: new_claim
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  # config mcp_retry_templates.retry_then_success: first attempt timeout, second success.
  mcp_retry: retry_then_success

  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to start a phone claim and produce a tool plan that calls the "new_claim"
        MCP tool on server "phone". Be robust to transient MCP errors by
        allowing a retry if the first tool execution times out.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "phone" with arguments from the
             external request (product_type=phone, incident_description, incident_date).
          2) If the first tool execution attempt times out, perform a single
             retry according to the mcp_retry policy.
          3) Return a confirmation including the new claim ID and next steps
             once a successful tool response is available.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the new_claim tool call into a clear final
        response for the end user. If a retry was needed because the first
        attempt timed out, briefly acknowledge that the retry succeeded and
        the claim is now active.

conversation:
  external:
    user_input: "I need to start a claim for my phone, it's broken."
    agent_response: "I've started a claim for your phone and created claim PH-8801. The first attempt to process your claim timed out, but the retry succeeded and your claim is now active. I'll confirm your cover and the next repair steps."

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - new_claim
  tool_call_arguments:
    new_claim:
      product_type: "phone"
      description: "Mobile phone is not working after being dropped; screen is cracked and the device will not power on."
      incident_date: "2025-03-10"
  tool_call_results:
    new_claim:
      claim_id: "PH-8801"
      product_type: "phone"
      status: "opened"
      coverage:
        type: "phone_screen_damage"
        deductible: 75
      notes: "Claim created for phone that stopped working after a drop with cracked screen (after retry)."
