name: multi_electronics_tablet_digitizer_slots_multiturn
description: >
  Tablet corner touch dead: CLAIM-EL-9175 + repair slots; books first option.

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 2.75
trace_interval_ms: 232
trace_interval_deviation_ms: 52

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 8, deviation: 3 }
      payload.validation: { mean: 5, deviation: 2 }
      policy.validation: { mean: 12, deviation: 5 }
      augmentation.validation: { mean: 6, deviation: 2 }
      a2a.orchestrate: { mean: 2060, deviation: 620 }
      planner: { mean: 520, deviation: 165 }
      llm.call: { mean: 655, deviation: 200 }
      task.execute: { mean: 740, deviation: 250 }
      tools.recommend: { mean: 54, deviation: 22 }
      mcp.tool.execute: { mean: 245, deviation: 110 }
      response.compose: { mean: 368, deviation: 115 }
      response.validation: { mean: 10, deviation: 4 }

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_electronics_tablet_digitizer_slots_multiturn
    vendor.enduser.pseudo.id: "user_mt_el_tab_105"
    channel: web
    mcp_server: electronics
    turns:
      - turn_index: 1
        span_plan: *phone_span_plan
        vendor.enduser.request.raw: >
          Tablet corner hit tile — part of the touchscreen is dead. Open a claim and reserve repair times.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                Tablet corner hit tile — part of the touchscreen is dead. Open a claim and reserve repair times.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                CLAIM-EL-9175 created. Monday 10:00 or Thursday 10:00 appointments — choose.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                Tablet corner hit tile — part of the touchscreen is dead. Open a claim and reserve repair times.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan": [{"tool_name": "new_claim", "trigger_summary": "I want to file a claim — Tablet digitizer dead strip.", "trigger_quote": "I want to file a claim — corner of the screen", "missing_info": null, "confidence": 0.91, "tool_args": {"product_type": "tablet", "description": "Corner drop; digitizer dead zone after impact.", "incident_date": "2026-05-15"}}, {"tool_name": "get_available_slots", "trigger_summary": "Carry-in morning slots.", "trigger_quote": "fix the tablet", "missing_info": null, "confidence": 0.89, "tool_args": {"claim_id": "CLAIM-EL-9175", "service_type": "authorized_repair_visit", "date_range_start": "2026-05-16", "date_range_end": "2026-05-23"}}]}
        agent_response: >
          CLAIM-EL-9175 created. Monday 10:00 or Thursday 10:00 appointments — choose.
        tool_chain: [new_claim, get_available_slots]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 990
        gen_ai.usage.output_tokens: 182
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 2
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "tablet"
            description: "Corner drop; digitizer dead zone after impact."
            incident_date: "2026-05-15"
          get_available_slots:
            claim_id: "CLAIM-EL-9175"
            service_type: "authorized_repair_visit"
            date_range_start: "2026-05-16"
            date_range_end: "2026-05-23"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "CLAIM-EL-9175"
            product_type: "tablet"
            status: "opened"
            coverage: { type: "electronics_impact_damage", deductible: 74 }
            notes: "Carry-in repair."
          get_available_slots:
            claim_id: "CLAIM-EL-9175"
            slots:
              - { slot_id: "SLOT-2026-05-18T10:00", duration_minutes: 120 }
              - { slot_id: "SLOT-2026-05-21T10:00", duration_minutes: 120 }
            timezone: "Europe/Dublin"
        planner:
          system_prompt: >
            Electronics tablet impact.
          output: >
            PLAN: new_claim; repair slots.
        response_compose:
          system_prompt: >
            CLAIM-EL-9175; two mornings.

      - turn_index: 2
        span_plan: *phone_span_plan
        vendor.enduser.request.raw: "Monday morning please."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "Monday morning please."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                Monday 10:00 carry-in booked on CLAIM-EL-9175.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "Monday morning please."
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan": [{"tool_name": "update_appointment", "trigger_summary":"Monday morning repair.", "trigger_quote":"Monday morning", "missing_info": null, "confidence": 0.94, "tool_args": {"claim_id": "CLAIM-EL-9175", "appointment_id": "APT-EL-9175-HOLD", "slot_id": "SLOT-2026-05-18T10:00", "preferred_time_window": "morning"}}]}
        agent_response: >
          Monday 10:00 carry-in booked on CLAIM-EL-9175.
        tool_chain: [update_appointment]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 790
        gen_ai.usage.output_tokens: 71
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          update_appointment:
            claim_id: "CLAIM-EL-9175"
            appointment_id: "APT-EL-9175-HOLD"
            slot_id: "SLOT-2026-05-18T10:00"
            preferred_time_window: "morning"
        gen_ai.tool.call.result:
          update_appointment:
            claim_id: "CLAIM-EL-9175"
            appointment_id: "APT-EL-9175-01"
            status: "scheduled"
            scheduled_at: "2026-05-18T10:00:00Z"
        planner:
          system_prompt: >
            Sunday for CLAIM-EL-9175.
          output: >
            PLAN: update_appointment.
        response_compose:
          system_prompt: >
            Store hours note.
