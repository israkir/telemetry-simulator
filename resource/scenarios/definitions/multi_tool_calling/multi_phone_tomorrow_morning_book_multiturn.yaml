name: multi_phone_tomorrow_morning_book_multiturn
description: >
  Cracked screen: claim CLAIM-PH-6620 with tomorrow-morning slots 9:00 and 11:30;
  customer books 11:30.

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 2.4
trace_interval_ms: 235
trace_interval_deviation_ms: 52

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 3}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 12, deviation: 5}
      augmentation.validation: {mean: 6, deviation: 2}
      a2a.orchestrate: {mean: 1950, deviation: 385}
      planner: {mean: 490, deviation: 110}
      llm.call: {mean: 600, deviation: 135}
      task.execute: {mean: 660, deviation: 150}
      tools.recommend: {mean: 49, deviation: 16}
      mcp.tool.execute: {mean: 195, deviation: 53}
      response.compose: {mean: 325, deviation: 78}
      response.validation: {mean: 10, deviation: 4}

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_phone_tomorrow_morning_book_multiturn
    vendor.enduser.pseudo.id: "user_mt_ph_morning_03"
    channel: app_chat
    mcp_server: phone
    turns:
      - span_plan: *phone_span_plan
        turn_index: 1
        vendor.enduser.request.raw: "Can someone come tomorrow morning for my cracked
          phone screen and start a claim for it?\n\n11:30, please."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "Can someone come tomorrow morning for my
                cracked phone screen and start a claim for it?\n\n11:30, please."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                I’ve booked a repair for tomorrow at 11:30 under claim CLAIM-PH-6620.
                You’ll receive confirmation and
                details of the visit.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "Can someone come tomorrow morning
                for my cracked phone screen and start a claim for it?\n\n11:30, please.\n"
              vendor.agent.tool_selection.tool.plan: "{\"tool_plan\":[{\"tool_name\"\
                :\"new_claim\",\"trigger_summary\":\"I want to file a claim \\u2014
                Cracked screen; visit tomorrow morning.\",\"trigger_quote\":\"I want
                to file a claim \\u2014 cracked phone screen\",\"missing_info\":null,\"\
                confidence\":0.92,\"tool_args\":{\"product_type\":\"phone\",\"description\"\
                :\"Cracked screen; repair visit requested next morning.\",\"incident_date\"\
                :\"2026-03-22\"}},{\"tool_name\":\"get_available_slots\",\"trigger_summary\"\
                :\"Tomorrow morning repair windows.\",\"trigger_quote\":\"tomorrow
                morning\",\"missing_info\":null,\"confidence\":0.91,\"tool_args\"\
                :{\"claim_id\":\"CLAIM-PH-6620\",\"service_type\":\"screen_repair_visit\"\
                ,\"date_range_start\":\"2026-03-23\",\"date_range_end\":\"2026-03-23\"\
                }},{\"tool_name\":\"update_appointment\",\"trigger_summary\":\"Book
                tomorrow 11:30.\",\"trigger_quote\":\"11:30\",\"missing_info\":null,\"\
                confidence\":0.96,\"tool_args\":{\"claim_id\":\"CLAIM-PH-6620\",\"\
                appointment_id\":\"APT-PH-6620-HOLD\",\"slot_id\":\"SLOT-2026-03-23T11:30\"\
                ,\"preferred_time_window\":\"morning\"}}]}\n"
        agent_response: >
          I’ve booked a repair for tomorrow at 11:30 under claim CLAIM-PH-6620. You’ll
          receive confirmation and
          details of the visit.
        tool_chain:
          - new_claim
          - get_available_slots
          - update_appointment
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1870
        gen_ai.usage.output_tokens: 282
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 3
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "phone"
            description: "Cracked screen; customer requests morning visit next day."
            incident_date: "2026-03-22"
          get_available_slots:
            claim_id: "CLAIM-PH-6620"
            service_type: "screen_repair_visit"
            date_range_start: "2026-03-23"
            date_range_end: "2026-03-23"
          update_appointment:
            claim_id: "CLAIM-PH-6620"
            appointment_id: "APT-PH-6620-HOLD"
            slot_id: "SLOT-2026-03-23T11:30"
            preferred_time_window: "morning"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "CLAIM-PH-6620"
            product_type: "phone"
            status: "opened"
            coverage:
              type: "phone_screen_damage"
              deductible: 75
            notes: "Morning slots offered for next-day visit."
          get_available_slots:
            claim_id: "CLAIM-PH-6620"
            slots:
              - slot_id: "SLOT-2026-03-23T09:00"
                duration_minutes: 90
              - slot_id: "SLOT-2026-03-23T11:30"
                duration_minutes: 90
            timezone: "Europe/London"
          update_appointment:
            claim_id: "CLAIM-PH-6620"
            appointment_id: "APT-PH-6620-01"
            status: "scheduled"
            scheduled_at: "2026-03-23T11:30:00Z"
        planner:
          system_prompt: "Phone: new claim plus same-day date range for tomorrow morning
            slots.\n\nCustomer chose 11:30 tomorrow for claim CLAIM-PH-6620."
          output: "PLAN: new_claim CLAIM-PH-6620 path; get_available_slots 2026-03-23
            only morning.\n\nPLAN: update_appointment morning slot."
        response_compose:
          system_prompt: "Affirm help; claim CLAIM-PH-6620; 9:00 vs 11:30 tomorrow
            morning.\n\nConfirm visit booking and outbound confirmation."
