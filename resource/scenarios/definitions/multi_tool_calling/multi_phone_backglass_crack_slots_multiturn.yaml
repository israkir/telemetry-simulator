name: multi_phone_backglass_crack_slots_multiturn
description: >
  Rear glass cracked: claim CLAIM-PH-9161 + repair slots; books Friday.

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 2.6
trace_interval_ms: 232
trace_interval_deviation_ms: 52

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 3}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 12, deviation: 5}
      augmentation.validation: {mean: 6, deviation: 2}
      a2a.orchestrate: {mean: 2000, deviation: 620}
      planner: {mean: 520, deviation: 165}
      llm.call: {mean: 655, deviation: 200}
      task.execute: {mean: 740, deviation: 250}
      tools.recommend: {mean: 54, deviation: 22}
      mcp.tool.execute: {mean: 245, deviation: 110}
      response.compose: {mean: 368, deviation: 115}
      response.validation: {mean: 10, deviation: 4}

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_phone_backglass_crack_slots_multiturn
    vendor.enduser.pseudo.id: "user_mt_ph_back_96"
    channel: web_chat
    mcp_server: phone
    turns:
      - span_plan: *phone_span_plan
        turn_index: 1
        vendor.enduser.request.raw: "I cracked the back glass on my phone. Open a
          claim and show me repair appointments for next week.\n\nTuesday at eleven,
          please."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "I cracked the back glass on my phone. Open
                a claim and show me repair appointments for next week.\n\nTuesday
                at eleven, please."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                Tuesday 11:00 is booked under claim CLAIM-PH-9161 — you’ll get shop
                directions by SMS.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "I cracked the back glass on
                my phone. Open a claim and show me repair appointments for next week.\n\
                \nTuesday at eleven, please.\n"
              vendor.agent.tool_selection.tool.plan: "{\"tool_plan\":[{\"tool_name\"\
                :\"new_claim\",\"trigger_summary\":\"I want to file a claim \\u2014
                Rear panel glass crack.\",\"trigger_quote\":\"I want to file a claim
                \\u2014 back glass cracked\",\"missing_info\":null,\"confidence\"\
                :0.93,\"tool_args\":{\"product_type\":\"phone\",\"description\":\"\
                Rear glass cracked after drop; customer wants in-store repair.\",\"\
                incident_date\":\"2026-05-06\"}},{\"tool_name\":\"get_available_slots\"\
                ,\"trigger_summary\":\"Repair-shop slots next week.\",\"trigger_quote\"\
                :\"book a repair\",\"missing_info\":null,\"confidence\":0.89,\"tool_args\"\
                :{\"claim_id\":\"CLAIM-PH-9161\",\"service_type\":\"screen_repair_visit\"\
                ,\"date_range_start\":\"2026-05-07\",\"date_range_end\":\"2026-05-13\"\
                }},{\"tool_name\":\"update_appointment\",\"trigger_summary\":\"Tuesday
                11:00 screen repair.\",\"trigger_quote\":\"Tuesday at eleven\",\"\
                missing_info\":null,\"confidence\":0.94,\"tool_args\":{\"claim_id\"\
                :\"CLAIM-PH-9161\",\"appointment_id\":\"APT-PH-9161-HOLD\",\"slot_id\"\
                :\"SLOT-2026-05-12T11:00\",\"preferred_time_window\":\"morning\"}}]}\n"
        agent_response: >
          Tuesday 11:00 is booked under claim CLAIM-PH-9161 — you’ll get shop directions
          by SMS.
        tool_chain:
          - new_claim
          - get_available_slots
          - update_appointment
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1910
        gen_ai.usage.output_tokens: 274
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 3
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "phone"
            description: "Rear glass cracked after drop; customer wants in-store repair."
            incident_date: "2026-05-06"
          get_available_slots:
            claim_id: "CLAIM-PH-9161"
            service_type: "screen_repair_visit"
            date_range_start: "2026-05-07"
            date_range_end: "2026-05-13"
          update_appointment:
            claim_id: "CLAIM-PH-9161"
            appointment_id: "APT-PH-9161-HOLD"
            slot_id: "SLOT-2026-05-12T11:00"
            preferred_time_window: "morning"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "CLAIM-PH-9161"
            product_type: "phone"
            status: "opened"
            coverage:
              type: "phone_accidental_damage"
              deductible: 70
            notes: "Screen repair line."
          get_available_slots:
            claim_id: "CLAIM-PH-9161"
            slots:
              - slot_id: "SLOT-2026-05-08T10:30"
                duration_minutes: 90
              - slot_id: "SLOT-2026-05-12T11:00"
                duration_minutes: 90
            timezone: "Europe/London"
          update_appointment:
            claim_id: "CLAIM-PH-9161"
            appointment_id: "APT-PH-9161-01"
            status: "scheduled"
            scheduled_at: "2026-05-12T11:00:00Z"
        planner:
          system_prompt: "Phone MCP: rear glass + repair slots.\n\nCustomer picks
            Tuesday 11:00 for claim CLAIM-PH-9161."
          output: "PLAN: new_claim; get_available_slots screen repair.\n\nPLAN: update_appointment."
        response_compose:
          system_prompt: "claim CLAIM-PH-9161; two concise options.\n\nSMS hint."
