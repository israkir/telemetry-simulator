# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: normal/multi_tool_calling/multi_tv_earliest_slot_book_multiturn.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 1
# MCP: electronics — TV no power claim CLAIM-EV-5522; earliest slot tomorrow 10:00; user confirms booking
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: multi_tv_earliest_slot_book_multiturn
description: >
  TV will not power on: claim CLAIM-EV-5522, earliest slot tomorrow 10:00 offered;
  customer accepts and books.

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 2.4
trace_interval_ms: 235
trace_interval_deviation_ms: 52

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 3}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 12, deviation: 5}
      augmentation.validation: {mean: 6, deviation: 2}
      a2a.orchestrate: {mean: 2020, deviation: 400}
      planner: {mean: 498, deviation: 114}
      llm.call: {mean: 625, deviation: 140}
      task.execute: {mean: 685, deviation: 155}
      tools.recommend: {mean: 50, deviation: 16}
      mcp.tool.execute: {mean: 202, deviation: 55}
      response.compose: {mean: 345, deviation: 83}
      response.validation: {mean: 10, deviation: 4}

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_tv_earliest_slot_book_multiturn
    vendor.enduser.pseudo.id: "user_mt_tv_earliest_05"
    channel: voice
    mcp_server: electronics
    turns:
      - span_plan: *phone_span_plan
        turn_index: 1
        vendor.enduser.request.raw: "My TV won’t power on at all. Please start a claim
          and book the earliest possible visit.\n\nYes, book that."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "My TV won’t power on at all. Please start
                a claim and book the earliest possible visit.\n\nYes, book that."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                I’ve scheduled your TV repair for tomorrow at 10:00 under claim CLAIM-EV-5522.
                You’ll get a
                confirmation with the appointment details.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "My TV won’t power on at all.
                Please start a claim and book the earliest possible visit.\n\nYes,
                book that.\n"
              vendor.agent.tool_selection.tool.plan: "{\"tool_plan\":[{\"tool_name\"\
                :\"new_claim\",\"trigger_summary\":\"I want to file a claim \\u2014
                TV completely dead; no power.\",\"trigger_quote\":\"I want to file
                a claim \\u2014 won\\u2019t power on\",\"missing_info\":null,\"confidence\"\
                :0.94,\"tool_args\":{\"product_type\":\"tv\",\"description\":\"TV
                will not power on; no standby light.\",\"incident_date\":\"2026-03-22\"\
                }},{\"tool_name\":\"get_available_slots\",\"trigger_summary\":\"Earliest
                engineer visit after intake.\",\"trigger_quote\":\"earliest possible
                visit\",\"missing_info\":null,\"confidence\":0.91,\"tool_args\":{\"\
                claim_id\":\"CLAIM-EV-5522\",\"service_type\":\"engineer_home_visit\"\
                ,\"date_range_start\":\"2026-03-23\",\"date_range_end\":\"2026-03-29\"\
                }},{\"tool_name\":\"update_appointment\",\"trigger_summary\":\"Confirm
                earliest tomorrow 10:00.\",\"trigger_quote\":\"Yes, book that\",\"\
                missing_info\":null,\"confidence\":0.93,\"tool_args\":{\"claim_id\"\
                :\"CLAIM-EV-5522\",\"appointment_id\":\"APT-EV-5522-HOLD\",\"slot_id\"\
                :\"SLOT-2026-03-23T10:00\",\"preferred_time_window\":\"morning\"}}]}\n"
        agent_response: >
          I’ve scheduled your TV repair for tomorrow at 10:00 under claim CLAIM-EV-5522.
          You’ll get a
          confirmation with the appointment details.
        tool_chain:
          - new_claim
          - get_available_slots
          - update_appointment
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1940
        gen_ai.usage.output_tokens: 275
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 3
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "tv"
            description: "TV will not power on; no standby light."
            incident_date: "2026-03-22"
          get_available_slots:
            claim_id: "CLAIM-EV-5522"
            service_type: "engineer_home_visit"
            date_range_start: "2026-03-23"
            date_range_end: "2026-03-29"
          update_appointment:
            claim_id: "CLAIM-EV-5522"
            appointment_id: "APT-EV-5522-HOLD"
            slot_id: "SLOT-2026-03-23T10:00"
            preferred_time_window: "morning"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "CLAIM-EV-5522"
            product_type: "tv"
            status: "opened"
            coverage:
              type: "tv_power_fault"
              deductible: 50
            notes: "Earliest slot identified; confirmation pending."
          get_available_slots:
            claim_id: "CLAIM-EV-5522"
            slots:
              - slot_id: "SLOT-2026-03-23T10:00"
                duration_minutes: 120
              - slot_id: "SLOT-2026-03-25T14:00"
                duration_minutes: 120
            timezone: "Europe/London"
          update_appointment:
            claim_id: "CLAIM-EV-5522"
            appointment_id: "APT-EV-5522-01"
            status: "scheduled"
            scheduled_at: "2026-03-23T10:00:00Z"
        planner:
          system_prompt: "Electronics: dead TV claim then minimum-date-range slot
            query.\n\nUser accepted tomorrow 10:00 for claim CLAIM-EV-5522."
          output: "PLAN: new_claim CLAIM-EV-5522; get_available_slots from tomorrow.\n\
            \nPLAN: update_appointment earliest slot."
        response_compose:
          system_prompt: "Voice-IVR friendly; offer tomorrow 10:00 as earliest; ask
            to book.\n\nConfirm booking; no jargon."
