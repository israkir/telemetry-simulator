# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: normal/multi_tool_calling/multi_appliances_repair_intake.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 1
# Interaction model: one user message → one orchestrated turn (4-tool chain)
# MCP: appliances — claim_status → upload_documents → get_available_slots → update_appointment
# Data plane: full span_plan (planner → llm.call → tools.recommend → mcp… → compose)
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================
#
# Split from former normal/multi_tool_calling.yaml (4-tool appliances path).

name: multi_appliances_repair_intake
description: >
  Washer claim follow-up in one turn: confirm status and landlord docs, register new photos,
  list Mon–Wed repair slots, book Tuesday 13:00 (four MCP tools on appliances).

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 1.5
trace_interval_ms: 220
trace_interval_deviation_ms: 55

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 8, deviation: 3 }
      payload.validation: { mean: 5, deviation: 2 }
      policy.validation: { mean: 12, deviation: 5 }
      augmentation.validation: { mean: 6, deviation: 2 }
      a2a.orchestrate: { mean: 2400, deviation: 450 }
      planner: { mean: 520, deviation: 120 }
      llm.call: { mean: 680, deviation: 150 }
      task.execute: { mean: 720, deviation: 160 }
      tools.recommend: { mean: 55, deviation: 18 }
      mcp.tool.execute: { mean: 200, deviation: 55 }
      response.compose: { mean: 380, deviation: 90 }
      response.validation: { mean: 10, deviation: 4 }

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_appliances_repair_intake
    vendor.enduser.pseudo.id: "user_mt_ap_washer_41"
    channel: voice
    mcp_server: appliances
    turns:
      - turn_index: 1
        span_plan: *phone_span_plan
        vendor.enduser.request.raw: >
          I'm calling about washer claim AP-WA-5544 — it still won't drain after the first visit note.
          Did the landlord's leak letter actually get attached? I just added floor and hose photos in the
          app. Show me authorized tech slots Monday through Wednesday and lock Tuesday 1pm if it's open.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                I'm calling about washer claim AP-WA-5544 — it still won't drain after the first visit note.
                Did the landlord's leak letter actually get attached? I just added floor and hose photos in the
                app. Show me authorized tech slots Monday through Wednesday and lock Tuesday 1pm if it's open.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                AP-WA-5544 is in review with the landlord leak note on file. Your new floor and hose photos
                are registered. Tuesday 13:00 is held with NordicFix — you'll get a calendar invite and SMS
                with the two-hour arrival window.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                I'm calling about washer claim AP-WA-5544 — it still won't drain after the first visit note.
                Did the landlord's leak letter actually get attached? I just added floor and hose photos in the
                app. Show me authorized tech slots Monday through Wednesday and lock Tuesday 1pm if it's open.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"claim_status","trigger_summary":"Confirm claim state and landlord documentation.","trigger_quote":"washer claim AP-WA-5544","missing_info":null,"confidence":0.93,"tool_args":{"claim_id":"AP-WA-5544"}},{"tool_name":"upload_documents","trigger_summary":"Register floor, hose, and landlord leak letter on file.","trigger_quote":"floor and hose photos in the app","missing_info":null,"confidence":0.9,"tool_args":{"claim_id":"AP-WA-5544","document_types":["photo_floor","photo_hose","landlord_leak_letter"],"expected_count":4}},{"tool_name":"get_available_slots","trigger_summary":"Technician availability Mon–Wed for authorized repair.","trigger_quote":"slots Monday through Wednesday","missing_info":null,"confidence":0.88,"tool_args":{"claim_id":"AP-WA-5544","service_type":"authorized_repair_visit","date_range_start":"2026-03-23","date_range_end":"2026-03-25"}},{"tool_name":"update_appointment","trigger_summary":"Book Tuesday 13:00 slot.","trigger_quote":"Tuesday 1pm","missing_info":null,"confidence":0.87,"tool_args":{"claim_id":"AP-WA-5544","appointment_id":"APT-AP-5544-TMP","slot_id":"SLOT-2026-03-24T13:00","preferred_time_window":"early_afternoon"}}]}
        agent_response: >
          AP-WA-5544 is in review with the landlord leak note on file. Your new floor and hose photos
          are registered. Tuesday 13:00 is held with NordicFix — you'll get a calendar invite and SMS
          with the two-hour arrival window.
        tool_chain: [claim_status, upload_documents, get_available_slots, update_appointment]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1420
        gen_ai.usage.output_tokens: 520
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 4
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          claim_status:
            claim_id: "AP-WA-5544"
          upload_documents:
            claim_id: "AP-WA-5544"
            document_types: ["photo_floor", "photo_hose", "landlord_leak_letter"]
            expected_count: 4
          get_available_slots:
            claim_id: "AP-WA-5544"
            service_type: "authorized_repair_visit"
            date_range_start: "2026-03-23"
            date_range_end: "2026-03-25"
          update_appointment:
            claim_id: "AP-WA-5544"
            appointment_id: "APT-AP-5544-TMP"
            slot_id: "SLOT-2026-03-24T13:00"
            preferred_time_window: "early_afternoon"
        gen_ai.tool.call.result:
          claim_status:
            claim_id: "AP-WA-5544"
            status: "in_review"
            last_updated: "2026-03-22T09:40:00Z"
            milestones:
              - intake_complete
              - landlord_document_received
              - awaiting_technician_schedule
          upload_documents:
            claim_id: "AP-WA-5544"
            upload_batch_id: "UPL-AP-5544-03"
            pending_count: 0
            status: "received"
          get_available_slots:
            claim_id: "AP-WA-5544"
            slots:
              - { slot_id: "SLOT-2026-03-24T09:00", duration_minutes: 120 }
              - { slot_id: "SLOT-2026-03-24T13:00", duration_minutes: 120 }
              - { slot_id: "SLOT-2026-03-25T10:00", duration_minutes: 120 }
            timezone: "Europe/Oslo"
          update_appointment:
            claim_id: "AP-WA-5544"
            appointment_id: "APT-AP-5544-BOOK"
            status: "scheduled"
            scheduled_at: "2026-03-24T13:00:00Z"
        planner:
          system_prompt: >
            Toro appliances planner: single user turn with four sequential MCP calls on server appliances.
          output: >
            PLAN: claim_status AP-WA-5544; upload_documents for new photos; get_available_slots Mon–Wed;
            update_appointment to SLOT-2026-03-24T13:00; confirm NordicFix and messaging.
        response_compose:
          system_prompt: >
            Voice-IVR friendly summary; reassure documentation and Tuesday hold.
