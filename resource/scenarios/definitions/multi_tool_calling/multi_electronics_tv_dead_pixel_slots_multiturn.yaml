# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: normal/multi_tool_calling/multi_electronics_tv_dead_pixel_slots_multiturn.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 2
# MCP: electronics — new_claim + get_available_slots, then update_appointment
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: multi_electronics_tv_dead_pixel_slots_multiturn
description: >
  TV cluster defect: EL-9171 + engineer slots; books first window.

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 2.85
trace_interval_ms: 232
trace_interval_deviation_ms: 52

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 8, deviation: 3 }
      payload.validation: { mean: 5, deviation: 2 }
      policy.validation: { mean: 12, deviation: 5 }
      augmentation.validation: { mean: 6, deviation: 2 }
      a2a.orchestrate: { mean: 2160, deviation: 620 }
      planner: { mean: 520, deviation: 165 }
      llm.call: { mean: 655, deviation: 200 }
      task.execute: { mean: 740, deviation: 250 }
      tools.recommend: { mean: 54, deviation: 22 }
      mcp.tool.execute: { mean: 245, deviation: 110 }
      response.compose: { mean: 368, deviation: 115 }
      response.validation: { mean: 10, deviation: 4 }

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_electronics_tv_dead_pixel_slots_multiturn
    vendor.enduser.pseudo.id: "user_mt_el_tv_101"
    channel: web
    mcp_server: electronics
    turns:
      - turn_index: 1
        span_plan: *phone_span_plan
        vendor.enduser.request.raw: >
          New TV has a block of dead pixels centre screen. Start a claim and book engineer visits to the house.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                New TV has a block of dead pixels centre screen. Start a claim and book engineer visits to the house.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                EL-9171 created. Thursday 10:00–13:00 or Sunday 10:00–13:00 — choose one.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                New TV has a block of dead pixels centre screen. Start a claim and book engineer visits to the house.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan": [{"tool_name": "new_claim", "trigger_summary": "Panel pixel cluster defect.", "trigger_quote": "dead pixels", "missing_info": null, "confidence": 0.92, "tool_args": {"product_type": "tv", "description": "Bright dead-pixel cluster mid-panel after delivery handling.", "incident_date": "2026-05-11"}}, {"tool_name": "get_available_slots", "trigger_summary": "Engineer home visit availability.", "trigger_quote": "home visit", "missing_info": null, "confidence": 0.9, "tool_args": {"claim_id": "EL-9171", "service_type": "engineer_home_visit", "date_range_start": "2026-05-12", "date_range_end": "2026-05-19"}}]}
        agent_response: >
          EL-9171 created. Thursday 10:00–13:00 or Sunday 10:00–13:00 — choose one.
        tool_chain: [new_claim, get_available_slots]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1070
        gen_ai.usage.output_tokens: 198
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 2
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "tv"
            description: "Bright dead-pixel cluster mid-panel after delivery handling."
            incident_date: "2026-05-11"
          get_available_slots:
            claim_id: "EL-9171"
            service_type: "engineer_home_visit"
            date_range_start: "2026-05-12"
            date_range_end: "2026-05-19"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "EL-9171"
            product_type: "tv"
            status: "opened"
            coverage: { type: "electronics_impact_damage", deductible: 110 }
            notes: "In-home assessment."
          get_available_slots:
            claim_id: "EL-9171"
            slots:
              - { slot_id: "SLOT-2026-05-14T10:00", duration_minutes: 180 }
              - { slot_id: "SLOT-2026-05-17T10:00", duration_minutes: 180 }
            timezone: "Europe/Oslo"
        planner:
          system_prompt: >
            Electronics TV intake + home visits.
          output: >
            PLAN: new_claim; engineer_home_visit slots.
        response_compose:
          system_prompt: >
            EL-9171; two mornings.

      - turn_index: 2
        span_plan: *phone_span_plan
        vendor.enduser.request.raw: "Thursday morning visit."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "Thursday morning visit."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                Thursday 10:00–13:00 engineer is booked on EL-9171.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "Thursday morning visit."
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan": [{"tool_name": "update_appointment", "trigger_summary": "Thursday engineer window.", "trigger_quote": "Thursday morning", "missing_info": null, "confidence": 0.94, "tool_args": {"claim_id": "EL-9171", "appointment_id": "APT-EL-9171-HOLD", "slot_id": "SLOT-2026-05-14T10:00", "preferred_time_window": "morning"}}]}
        agent_response: >
          Thursday 10:00–13:00 engineer is booked on EL-9171.
        tool_chain: [update_appointment]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 830
        gen_ai.usage.output_tokens: 76
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          update_appointment:
            claim_id: "EL-9171"
            appointment_id: "APT-EL-9171-HOLD"
            slot_id: "SLOT-2026-05-14T10:00"
            preferred_time_window: "morning"
        gen_ai.tool.call.result:
          update_appointment:
            claim_id: "EL-9171"
            appointment_id: "APT-EL-9171-01"
            status: "scheduled"
            scheduled_at: "2026-05-14T10:00:00Z"
        planner:
          system_prompt: >
            Thursday for EL-9171.
          output: >
            PLAN: update_appointment.
        response_compose:
          system_prompt: >
            Arrival window tone.
