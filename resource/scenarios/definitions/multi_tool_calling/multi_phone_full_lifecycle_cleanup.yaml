          system_prompt: >
            Phone MCP: ten-step agentic plan — new intake through policy cleanup and duplicate withdrawal.
          output: >
            PLAN: new_claim; claim_status PH-MTC-1001; upload_documents; get_available_slots;
            update_appointment Citypoint Wed 16:00; pay excess; choose_insurance plus; buy_insurance;
            cancel_product POL-SCR-8801; cancel_claim PH-MTC-0998.
        response_compose:
