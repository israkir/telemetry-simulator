          new liquid-damage claim.\n\nI’ve added locker photos plus the drying-kit
          receipt in the app. Can you confirm claim CLAIM-PH-MTC-1001 shows them and
          that the claim looks right on your side?\n\nWhat Citypoint drop-off slots
          do you have next week? I’m usually free late afternoon.\n\nWednesday 4pm
          at Citypoint works — please book that.\n\nI want to submit payment of €75
          to my saved Visa for claim CLAIM-PH-MTC-1001.\n\nWhile we’re at it — email
          me Toro Plus pricing for this handset. If it’s under €17 a month, I want
          to buy it on the card you just used.\n\nOne more thing — I have a redundant
          screen-only micro-policy POL-SCR-8801 on my carrier bundle. Can you cancel
          that so I’m not double-covered?"
