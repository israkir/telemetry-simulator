# File: normal/multi_tool_calling/multi_phone_full_lifecycle_cleanup.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 8
# Interaction model: multi-turn chat — cancel duplicate draft first, then claim intake
#   through documents, repair booking, excess, add-on coverage, redundant policy removal.
# MCP: phone — same ten distinct tools overall, realistic turn boundaries
# Data plane: full span_plan (planner → llm.call → tools.recommend → mcp… → compose)
