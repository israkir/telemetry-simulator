name: multi_electronics_four_tool_visit_oneturn
description: >
  Single chat message on claim EL-HT-8844: confirm HDMI-board assessor note matches the file, register
  uploaded packaging photos, offer North-1 engineer home visits Tue–Thu, book Wednesday 9–12 if available.

tags:
  - normal
  - multi_tool_calling

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 1.75
trace_interval_ms: 228
trace_interval_deviation_ms: 56

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 8, deviation: 3 }
      payload.validation: { mean: 5, deviation: 2 }
      policy.validation: { mean: 12, deviation: 5 }
      augmentation.validation: { mean: 6, deviation: 2 }
      a2a.orchestrate: { mean: 2050, deviation: 420 }
      planner: { mean: 510, deviation: 118 }
      llm.call: { mean: 660, deviation: 145 }
      task.execute: { mean: 700, deviation: 160 }
      tools.recommend: { mean: 54, deviation: 18 }
      mcp.tool.execute: { mean: 200, deviation: 54 }
      response.compose: { mean: 360, deviation: 88 }
      response.validation: { mean: 10, deviation: 4 }

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_electronics_four_tool_visit_oneturn
    vendor.enduser.pseudo.id: "user_mt_el_seven_44"
    channel: web_chat
    mcp_server: electronics
    turns:
      - turn_index: 1
        span_plan: *phone_span_plan
        vendor.enduser.request.raw: >
          EL-HT-8844 for my soundbar — the assessor wrote that the HDMI board is dead. Please confirm that’s
          what your claim shows, ingest the carton photos I uploaded about an hour ago, list engineer
          home visits in North-1 from Tuesday through Thursday next week, and book the Wednesday 9–12 window if
          it’s still open.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                EL-HT-8844 for my soundbar — the assessor wrote that the HDMI board is dead. Please confirm that’s
                what your claim shows, ingest the carton photos I uploaded about an hour ago, list engineer
                home visits in North-1 from Tuesday through Thursday next week, and book the Wednesday 9–12 window if
                it’s still open.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                EL-HT-8844 matches the assessor: HDMI mainboard failure. Your photos are on file and the
                Wednesday 09:00–12:00 engineer visit is booked — you’ll get a confirmation email with the
