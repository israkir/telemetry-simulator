          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                EL-HT-8844 for my soundbar — the assessor wrote that the HDMI board is dead. Please confirm that’s
                what your claim shows, ingest the carton photos I uploaded about an hour ago, list engineer
