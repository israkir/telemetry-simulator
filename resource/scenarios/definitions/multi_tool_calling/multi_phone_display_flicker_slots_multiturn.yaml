name: multi_phone_display_flicker_slots_multiturn
description: >
  Brightness flicker: PH-9164 + slots; customer picks Thursday.

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 2.58
trace_interval_ms: 232
trace_interval_deviation_ms: 52

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 8, deviation: 3 }
      payload.validation: { mean: 5, deviation: 2 }
      policy.validation: { mean: 12, deviation: 5 }
      augmentation.validation: { mean: 6, deviation: 2 }
      a2a.orchestrate: { mean: 2020, deviation: 620 }
      planner: { mean: 520, deviation: 165 }
      llm.call: { mean: 655, deviation: 200 }
      task.execute: { mean: 740, deviation: 250 }
      tools.recommend: { mean: 54, deviation: 22 }
      mcp.tool.execute: { mean: 245, deviation: 110 }
      response.compose: { mean: 368, deviation: 115 }
      response.validation: { mean: 10, deviation: 4 }

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_phone_display_flicker_slots_multiturn
    vendor.enduser.pseudo.id: "user_mt_ph_flick_99"
    channel: voice
    mcp_server: phone
    turns:
      - turn_index: 1
        span_plan: *phone_span_plan
        vendor.enduser.request.raw: >
          My phone screen flickers when brightness is low ever since I dropped it. File a claim and find afternoon repairs.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                My phone screen flickers when brightness is low ever since I dropped it. File a claim and find afternoon repairs.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                PH-9164 is open. Wednesday noon or Friday noon slots — ninety minutes each.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                My phone screen flickers when brightness is low ever since I dropped it. File a claim and find afternoon repairs.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan": [{"tool_name": "new_claim", "trigger_summary": "Low-brightness flicker fault.", "trigger_quote": "screen flickers", "missing_info": null, "confidence": 0.89, "tool_args": {"product_type": "phone", "description": "Panel flickers at low brightness after minor drop.", "incident_date": "2026-05-09"}}, {"tool_name": "get_available_slots", "trigger_summary": "Midweek repair slots.", "trigger_quote": "book repair", "missing_info": null, "confidence": 0.86, "tool_args": {"claim_id": "PH-9164", "service_type": "screen_repair_visit", "date_range_start": "2026-05-10", "date_range_end": "2026-05-16"}}]}
        agent_response: >
          PH-9164 is open. Wednesday noon or Friday noon slots — ninety minutes each.
        tool_chain: [new_claim, get_available_slots]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 970
        gen_ai.usage.output_tokens: 180
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 2
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "phone"
            description: "Panel flickers at low brightness after minor drop."
            incident_date: "2026-05-09"
          get_available_slots:
            claim_id: "PH-9164"
            service_type: "screen_repair_visit"
            date_range_start: "2026-05-10"
            date_range_end: "2026-05-16"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "PH-9164"
            product_type: "phone"
            status: "opened"
            coverage: { type: "phone_display_damage", deductible: 72 }
            notes: "Display stack."
          get_available_slots:
            claim_id: "PH-9164"
            slots:
              - { slot_id: "SLOT-2026-05-13T12:00", duration_minutes: 90 }
              - { slot_id: "SLOT-2026-05-15T12:00", duration_minutes: 90 }
            timezone: "Europe/Oslo"
        planner:
          system_prompt: >
            Phone voice flicker intake.
          output: >
            PLAN: new_claim + slots Wed/Fri noon.
        response_compose:
          system_prompt: >
            Speak clearly; PH-9164.

      - turn_index: 2
        span_plan: *phone_span_plan
        vendor.enduser.request.raw: "Wednesday noon slot."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "Wednesday noon slot."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                Wednesday 12:00 is secured on PH-9164 — we’ll confirm by text.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "Wednesday noon slot."
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan": [{"tool_name": "update_appointment", "trigger_summary": "Wednesday noon repair.", "trigger_quote": "Wednesday noon", "missing_info": null, "confidence": 0.94, "tool_args": {"claim_id": "PH-9164", "appointment_id": "APT-PH-9164-HOLD", "slot_id": "SLOT-2026-05-13T12:00", "preferred_time_window": "afternoon"}}]}
        agent_response: >
          Wednesday 12:00 is secured on PH-9164 — we’ll confirm by text.
        tool_chain: [update_appointment]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 750
        gen_ai.usage.output_tokens: 68
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          update_appointment:
            claim_id: "PH-9164"
            appointment_id: "APT-PH-9164-HOLD"
            slot_id: "SLOT-2026-05-13T12:00"
            preferred_time_window: "afternoon"
        gen_ai.tool.call.result:
          update_appointment:
            claim_id: "PH-9164"
            appointment_id: "APT-PH-9164-01"
            status: "scheduled"
            scheduled_at: "2026-05-13T12:00:00Z"
        planner:
          system_prompt: >
            Wednesday for PH-9164.
          output: >
            PLAN: update_appointment noon.
        response_compose:
          system_prompt: >
            Text confirm.
