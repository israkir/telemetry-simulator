        turn_index: 1
        vendor.enduser.request.raw: "Fridge door sweats non-stop and the seal feels
          warped — start a claim and give me two visit windows later this week.\n\n\
          Friday morning slot."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "Fridge door sweats non-stop and the seal
                feels warped — start a claim and give me two visit windows later this
                week.\n\nFriday morning slot."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                Friday 11:00–15:00 is confirmed for claim CLAIM-HA-9155. Keep perishables
                monitored until the tech arrives.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "Fridge door sweats non-stop
                and the seal feels warped — start a claim and give me two visit windows
                later this week.\n\nFriday morning slot.\n"
