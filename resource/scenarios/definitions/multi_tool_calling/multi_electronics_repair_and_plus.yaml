            service_type: "engineer_home_visit"
            date_range_start: "2026-03-24"
            date_range_end: "2026-03-28"
          update_appointment:
            claim_id: "CLAIM-EL-HT-7707"
            appointment_id: "APT-EL-7707-HOLD"
            slot_id: "SLOT-2026-03-26T09:00"
            preferred_time_window: "morning"
        gen_ai.tool.call.result:
          get_available_slots:
            claim_id: "CLAIM-EL-HT-7707"
            slots:
