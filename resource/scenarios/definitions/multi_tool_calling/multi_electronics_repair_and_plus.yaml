            reference_id: "CLAIM-EL-HT-7707"
            amount: 75.0
            currency: "EUR"
        gen_ai.tool.call.result:
          pay:
            payment_id: "PAY-EL-7707-EX"
            reference_id: "CLAIM-EL-HT-7707"
            status: "captured"
            amount: 75.0
            currency: "EUR"
        planner:
          system_prompt: >
            Electronics MCP: take excess after visit is booked.
          output: >
            PLAN: submit payment 75 EUR for CLAIM-EL-HT-7707 card_on_file.
        response_compose:
          system_prompt: >
