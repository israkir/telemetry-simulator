# Split from former normal/multi_tool_calling.yaml (7-tool electronics path).

name: multi_electronics_repair_and_plus
description: >
  Soundbar claim in one turn: verify assessor outcome, attach photos, book engineer visit, pay excess,
  quote and buy Toro Premium for living-room AV (seven MCP tools on electronics).

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 1.5
trace_interval_ms: 220
trace_interval_deviation_ms: 55

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 8, deviation: 3 }
      payload.validation: { mean: 5, deviation: 2 }
      policy.validation: { mean: 12, deviation: 5 }
      augmentation.validation: { mean: 6, deviation: 2 }
      a2a.orchestrate: { mean: 2400, deviation: 450 }
      planner: { mean: 520, deviation: 120 }
      llm.call: { mean: 680, deviation: 150 }
      task.execute: { mean: 720, deviation: 160 }
      tools.recommend: { mean: 55, deviation: 18 }
      mcp.tool.execute: { mean: 200, deviation: 55 }
      response.compose: { mean: 380, deviation: 90 }
      response.validation: { mean: 10, deviation: 4 }

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_electronics_repair_and_plus
    vendor.enduser.pseudo.id: "user_mt_el_soundbar_72"
    channel: web_chat
    mcp_server: electronics
    turns:
      - turn_index: 1
        span_plan: *phone_span_plan
        vendor.enduser.request.raw: >
          Soundbar claim EL-HT-7707 — the assessor said the HDMI board is dead. Confirm that's what's on
          the file, register the carton photos I uploaded, list engineer home-visit slots in East-2 next
          week, put me Thursday 9–12, charge the €75 excess to my card on file, then quote Toro Premium
          for living-room AV and buy it at the monthly you quoted in the last email if it's still valid.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                Soundbar claim EL-HT-7707 — the assessor said the HDMI board is dead. Confirm that's what's on
                the file, register the carton photos I uploaded, list engineer home-visit slots in East-2 next
                week, put me Thursday 9–12, charge the €75 excess to my card on file, then quote Toro Premium
                for living-room AV and buy it at the monthly you quoted in the last email if it's still valid.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                EL-HT-7707 shows assessor conclusion "HDMI mainboard failure — replace unit path." Carton
                photos are on the claim. Thursday 09:00–12:00 visit is booked; €75 excess captured. Toro
                Premium for living-room AV is active on policy POL-EL-PRM-7707 from quote QT-EL-7707.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                Soundbar claim EL-HT-7707 — the assessor said the HDMI board is dead. Confirm that's what's on
                the file, register the carton photos I uploaded, list engineer home-visit slots in East-2 next
                week, put me Thursday 9–12, charge the €75 excess to my card on file, then quote Toro Premium
                for living-room AV and buy it at the monthly you quoted in the last email if it's still valid.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"claim_status","trigger_summary":"Verify assessor outcome on file.","trigger_quote":"HDMI board is dead","missing_info":null,"confidence":0.94,"tool_args":{"claim_id":"EL-HT-7707"}},{"tool_name":"upload_documents","trigger_summary":"Attach carton / packaging photos.","trigger_quote":"carton photos I uploaded","missing_info":null,"confidence":0.91,"tool_args":{"claim_id":"EL-HT-7707","document_types":["photo_packaging","assessor_report_pdf"],"expected_count":3}},{"tool_name":"get_available_slots","trigger_summary":"Engineer visits East-2 next week.","trigger_quote":"slots in East-2 next week","missing_info":null,"confidence":0.89,"tool_args":{"claim_id":"EL-HT-7707","service_type":"engineer_home_visit","date_range_start":"2026-03-24","date_range_end":"2026-03-28"}},{"tool_name":"update_appointment","trigger_summary":"Thursday morning window.","trigger_quote":"Thursday 9–12","missing_info":null,"confidence":0.88,"tool_args":{"claim_id":"EL-HT-7707","appointment_id":"APT-EL-7707-HOLD","slot_id":"SLOT-2026-03-26T09:00","preferred_time_window":"morning"}},{"tool_name":"pay","trigger_summary":"Collect policy excess.","trigger_quote":"charge the €75 excess","missing_info":null,"confidence":0.92,"tool_args":{"payment_target":"excess","reference_id":"EL-HT-7707","amount":75.0,"currency":"EUR"}},{"tool_name":"choose_insurance","trigger_summary":"Premium bundle for living-room AV.","trigger_quote":"Toro Premium for living-room AV","missing_info":null,"confidence":0.86,"tool_args":{"product_category":"living_room_av","coverage_tier":"premium","region":"East-2"}},{"tool_name":"buy_insurance","trigger_summary":"Purchase quoted Premium plan.","trigger_quote":"buy it at the monthly you quoted","missing_info":null,"confidence":0.84,"tool_args":{"quote_id":"QT-EL-7707","payment_method":"card_on_file","holder_reference":"user_mt_el_soundbar_72"}}]}
        agent_response: >
          EL-HT-7707 shows assessor conclusion "HDMI mainboard failure — replace unit path." Carton
          photos are on the claim. Thursday 09:00–12:00 visit is booked; €75 excess captured. Toro
          Premium for living-room AV is active on policy POL-EL-PRM-7707 from quote QT-EL-7707.
        tool_chain:
          - claim_status
          - upload_documents
          - get_available_slots
          - update_appointment
          - pay
          - choose_insurance
          - buy_insurance
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1980
        gen_ai.usage.output_tokens: 910
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 7
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
