            claim_id: "EL-HT-7707"
            status: "in_review"
            last_updated: "2026-03-22T11:05:00Z"
            milestones:
              - assessor_report_received
              - parts_order_pending
          upload_documents:
            claim_id: "EL-HT-7707"
            upload_batch_id: "UPL-EL-7707-02"
