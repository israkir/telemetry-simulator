            claim_id: "CLAIM-EL-HT-7707"
          upload_documents:
            claim_id: "CLAIM-EL-HT-7707"
            document_types: ["photo_packaging", "assessor_report_pdf"]
            expected_count: 3
        gen_ai.tool.call.result:
          claim_status:
            claim_id: "CLAIM-EL-HT-7707"
            status: "in_review"
            last_updated: "2026-03-22T11:05:00Z"
            milestones:
