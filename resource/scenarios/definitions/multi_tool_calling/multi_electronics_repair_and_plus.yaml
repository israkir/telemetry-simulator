# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: normal/multi_tool_calling/multi_electronics_repair_and_plus.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 4
# Interaction model: multi-turn — confirm assessor outcome and docs, book engineer visit,
#   pay excess, then quote and buy add-on coverage.
# MCP: electronics — seven MCP tools across four user messages
# Data plane: full span_plan (planner → llm.call → tools.recommend → mcp… → compose)
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: multi_electronics_repair_and_plus
description: >
  Soundbar CLAIM-EL-HT-7707 across four turns: verify assessor notes match what the customer heard,
  register new packaging photos, book a Thursday engineer window, pay excess, then activate Toro
  Premium for living-room AV.

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 2.8
trace_interval_ms: 225
trace_interval_deviation_ms: 54

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 8, deviation: 3 }
      payload.validation: { mean: 5, deviation: 2 }
      policy.validation: { mean: 12, deviation: 5 }
      augmentation.validation: { mean: 6, deviation: 2 }
      a2a.orchestrate: { mean: 1980, deviation: 390 }
      planner: { mean: 495, deviation: 112 }
      llm.call: { mean: 610, deviation: 138 }
      task.execute: { mean: 670, deviation: 152 }
      tools.recommend: { mean: 50, deviation: 16 }
      mcp.tool.execute: { mean: 198, deviation: 54 }
      response.compose: { mean: 330, deviation: 80 }
      response.validation: { mean: 10, deviation: 4 }

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_electronics_repair_and_plus
    vendor.enduser.pseudo.id: "user_mt_el_soundbar_72"
    channel: web_chat
    mcp_server: electronics
    turns:
      - turn_index: 1
        span_plan: *phone_span_plan
        vendor.enduser.request.raw: >
          I’m following up on soundbar CLAIM-EL-HT-7707. The assessor told me the HDMI board is dead —
          does your file actually say that? I also uploaded carton photos in the portal just now.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                I’m following up on soundbar CLAIM-EL-HT-7707. The assessor told me the HDMI board is dead —
                does your file actually say that? I also uploaded carton photos in the portal just now.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                Yes — CLAIM-EL-HT-7707 shows the assessor conclusion as HDMI mainboard failure. Your new carton
                photos are attached. Next step is scheduling an engineer; say when you’d like me to look at
                home-visit slots in East-2.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                I’m following up on soundbar CLAIM-EL-HT-7707. The assessor told me the HDMI board is dead —
                does your file actually say that? I also uploaded carton photos in the portal just now.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"claim_status","trigger_summary":"Verify assessor outcome matches customer understanding.","trigger_quote":"CLAIM-EL-HT-7707","missing_info":null,"confidence":0.94,"tool_args":{"claim_id":"CLAIM-EL-HT-7707"}},{"tool_name":"upload_documents","trigger_summary":"Register newly uploaded packaging photos.","trigger_quote":"uploaded carton photos","missing_info":null,"confidence":0.91,"tool_args":{"claim_id":"CLAIM-EL-HT-7707","document_types":["photo_packaging","assessor_report_pdf"],"expected_count":3}}]}
        agent_response: >
          Yes — CLAIM-EL-HT-7707 shows the assessor conclusion as HDMI mainboard failure. Your new carton
          photos are attached. Next step is scheduling an engineer; say when you’d like me to look at
          home-visit slots in East-2.
        tool_chain: [claim_status, upload_documents]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1180
        gen_ai.usage.output_tokens: 248
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 2
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
