# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: normal/multi_tool_calling/multi_phone_water_slots_book_multiturn.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 1
# MCP: phone — new_claim + get_available_slots, then update_appointment
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: multi_phone_water_slots_book_multiturn
description: >
  Water-damaged phone: claim CLAIM-PH-7744, offer Tue 11:00 / Wed 15:00 / Fri 9:30,
  customer books Wednesday 15:00.

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 2.4
trace_interval_ms: 235
trace_interval_deviation_ms: 52

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 3}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 12, deviation: 5}
      augmentation.validation: {mean: 6, deviation: 2}
      a2a.orchestrate: {mean: 1980, deviation: 390}
      planner: {mean: 495, deviation: 112}
      llm.call: {mean: 610, deviation: 138}
      task.execute: {mean: 670, deviation: 152}
      tools.recommend: {mean: 50, deviation: 16}
      mcp.tool.execute: {mean: 198, deviation: 54}
      response.compose: {mean: 330, deviation: 80}
      response.validation: {mean: 10, deviation: 4}

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_phone_water_slots_book_multiturn
    vendor.enduser.pseudo.id: "user_mt_ph_water_02"
    channel: web_chat
    mcp_server: phone
    turns:
      - span_plan: *phone_span_plan
        turn_index: 1
        vendor.enduser.request.raw: "My phone fell in water and won’t turn on. Please
          start a claim.\n\nLet’s do Wednesday at 3."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "My phone fell in water and won’t turn on.
                Please start a claim.\n\nLet’s do Wednesday at 3."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                No problem — I’ve scheduled your repair for Wednesday at 15:00 under
                claim CLAIM-PH-7744. You’ll get a
                confirmation shortly.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "My phone fell in water and won’t
                turn on. Please start a claim.\n\nLet’s do Wednesday at 3.\n"
              vendor.agent.tool_selection.tool.plan: "{\"tool_plan\":[{\"tool_name\"\
                :\"new_claim\",\"trigger_summary\":\"I want to file a claim \\u2014
                Water immersion; device will not power on.\",\"trigger_quote\":\"\
                I want to file a claim \\u2014 fell in water\",\"missing_info\":null,\"\
                confidence\":0.94,\"tool_args\":{\"product_type\":\"phone\",\"description\"\
                :\"Water damage; device will not turn on.\",\"incident_date\":\"2026-03-22\"\
                }},{\"tool_name\":\"get_available_slots\",\"trigger_summary\":\"Repair
                slots after liquid claim.\",\"trigger_quote\":\"start a claim\",\"\
                missing_info\":null,\"confidence\":0.88,\"tool_args\":{\"claim_id\"\
                :\"CLAIM-PH-7744\",\"service_type\":\"screen_repair_visit\",\"date_range_start\"\
                :\"2026-03-25\",\"date_range_end\":\"2026-03-28\"}},{\"tool_name\"\
                :\"update_appointment\",\"trigger_summary\":\"Book Wednesday 15:00.\"\
                ,\"trigger_quote\":\"Wednesday at 3\",\"missing_info\":null,\"confidence\"\
                :0.95,\"tool_args\":{\"claim_id\":\"CLAIM-PH-7744\",\"appointment_id\"\
                :\"APT-PH-7744-HOLD\",\"slot_id\":\"SLOT-2026-03-26T15:00\",\"preferred_time_window\"\
                :\"afternoon\"}}]}\n"
        agent_response: >
          No problem — I’ve scheduled your repair for Wednesday at 15:00 under claim
          CLAIM-PH-7744. You’ll get a
          confirmation shortly.
        tool_chain:
          - new_claim
          - get_available_slots
          - update_appointment
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 2000
        gen_ai.usage.output_tokens: 323
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 3
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "phone"
            description: "Water damage; device will not turn on."
            incident_date: "2026-03-22"
          get_available_slots:
            claim_id: "CLAIM-PH-7744"
            service_type: "screen_repair_visit"
            date_range_start: "2026-03-25"
            date_range_end: "2026-03-28"
          update_appointment:
            claim_id: "CLAIM-PH-7744"
            appointment_id: "APT-PH-7744-HOLD"
            slot_id: "SLOT-2026-03-26T15:00"
            preferred_time_window: "afternoon"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "CLAIM-PH-7744"
            product_type: "phone"
            status: "opened"
            coverage:
              type: "phone_liquid_damage"
              deductible: 75
            notes: "Repair slots listed; customer may defer booking."
          get_available_slots:
            claim_id: "CLAIM-PH-7744"
            slots:
              - slot_id: "SLOT-2026-03-25T11:00"
                duration_minutes: 90
              - slot_id: "SLOT-2026-03-26T15:00"
                duration_minutes: 90
              - slot_id: "SLOT-2026-03-28T09:30"
                duration_minutes: 90
            timezone: "Europe/London"
          update_appointment:
            claim_id: "CLAIM-PH-7744"
            appointment_id: "APT-PH-7744-01"
            status: "scheduled"
            scheduled_at: "2026-03-26T15:00:00Z"
        planner:
          system_prompt: "Phone MCP: liquid damage intake plus same-turn slot listing.\n\
            \nCustomer confirms Wednesday 15:00 for claim CLAIM-PH-7744."
          output: "PLAN: new_claim; get_available_slots Tue–Fri window for claim CLAIM-PH-7744.\n\
            \nPLAN: update_appointment SLOT-2026-03-26T15:00."
        response_compose:
          system_prompt: "Give claim CLAIM-PH-7744; three slot options; offer to book
            now or later.\n\nBrief booking confirmation."
