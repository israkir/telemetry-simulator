# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: normal/mcp_tool_retries_exhausted_failed.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 2
# Interaction model: multi-turn — confirm excess status first; customer authorizes payment;
#   pay retries through unavailable, rate limiting, and tool error (all attempts fail)
# MCP: phone — claim_status (turn 1) → pay (turn 2; 3× fail; exponential_jitter; final error.type on parent)
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: mcp_tool_retries_exhausted_failed
description: >
  Phone glass CLAIM-PH-8820: first message confirms the £95 excess matches what the portal shows;
  second message asks to submit payment to the card on file. The payment MCP path retries and never captures,
  with the last error class on the parent span.

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 2.3
trace_interval_ms: 200
trace_interval_deviation_ms: 50

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 8, deviation: 3 }
      payload.validation: { mean: 5, deviation: 2 }
      policy.validation: { mean: 12, deviation: 5 }
      augmentation.validation: { mean: 6, deviation: 2 }
      a2a.orchestrate: { mean: 2260, deviation: 810 }
      planner: { mean: 500, deviation: 178 }
      llm.call: { mean: 592, deviation: 220 }
      task.execute: { mean: 770, deviation: 300 }
      tools.recommend: { mean: 54, deviation: 23 }
      mcp.tool.execute: { mean: 340, deviation: 155 }
      response.compose: { mean: 372, deviation: 132 }
      response.validation: { mean: 10, deviation: 4 }

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: mcp_tool_retries_exhausted_failed
    vendor.enduser.pseudo.id: "user_ph_pay_retry_fail_22"
    channel: web
    mcp_server: phone
    turns:
      - turn_index: 1
        span_plan: *phone_span_plan
        vendor.enduser.request.raw: >
          CLAIM-PH-8820 for the cracked glass — the portal says I owe the ninety-five pound excess.
          Can you confirm that’s what you’re showing on your side before I pay?
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                CLAIM-PH-8820 for the cracked glass — the portal says I owe the ninety-five pound excess.
                Can you confirm that’s what you’re showing on your side before I pay?
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                Yes — CLAIM-PH-8820 is waiting on the £95 glass excess, same as your portal. When you’re ready,
                I can try the card on file or you can pay in the app.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                CLAIM-PH-8820 for the cracked glass — the portal says I owe the ninety-five pound excess.
                Can you confirm that’s what you’re showing on your side before I pay?
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"claim_status","trigger_summary":"Verify claim state and excess matches portal £95.","trigger_quote":"CLAIM-PH-8820","missing_info":null,"confidence":0.92,"tool_args":{"claim_id":"CLAIM-PH-8820"}}]}
        agent_response: >
          Yes — CLAIM-PH-8820 is waiting on the £95 glass excess, same as your portal. When you’re ready,
          I can try the card on file or you can pay in the app.
        tool_chain: [claim_status]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1050
        gen_ai.usage.output_tokens: 155
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          claim_status:
            claim_id: "CLAIM-PH-8820"
        gen_ai.tool.call.result:
          claim_status:
            claim_id: "CLAIM-PH-8820"
            status: "pending_payment"
            last_updated: "2026-03-21T14:22:00Z"
            milestones:
              - intake_complete
              - assessor_approved
              - excess_due
        planner:
          system_prompt: >
            Toro phone planner: confirm CLAIM-PH-8820 excess before any payment attempt.
          output: >
            PLAN: claim_status CLAIM-PH-8820; reassure £95 excess aligns with portal.
        response_compose:
          system_prompt: >
            Calm confirmation; offer payment channel without gateway jargon.

      - turn_index: 2
        span_plan: *phone_span_plan
        vendor.enduser.request.raw: >
          Thanks — I want to submit payment of £95 to my card on file now.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                Thanks — I want to submit payment of £95 to my card on file now.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                I wasn’t able to finish the card charge just now — please try again in a little while or pay
                in the app when you have a moment.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                Thanks — I want to submit payment of £95 to my card on file now.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"pay","trigger_summary":"Submit payment of £95 glass excess after customer authorizes.","trigger_quote":"submit payment of ninety-five pounds","missing_info":null,"confidence":0.9,"tool_args":{"payment_target":"excess","reference_id":"CLAIM-PH-8820","amount":95.0,"currency":"GBP"}}]}
        agent_response: >
          I wasn’t able to finish the card charge just now — please try again in a little while or pay
          in the app when you have a moment.
        tool_chain: [pay]
        mcp_tool_retries:
          pay:
            policy: exponential_jitter
            attempts:
              - outcome: fail
                error.type: unavailable
              - outcome: fail
                error.type: rate_limited
                gentoro.retry.reason: rate_limited
                gentoro.retry.backoff.ms: 320
              - outcome: fail
                error.type: tool_error
                gentoro.retry.reason: transient_error
                gentoro.retry.backoff.ms: 750
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 920
        gen_ai.usage.output_tokens: 128
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          pay:
            payment_target: "excess"
            reference_id: "CLAIM-PH-8820"
            amount: 95.0
            currency: "GBP"
        gen_ai.tool.call.result:
          pay:
            payment_id: "PAY-PH-8820-PEND"
            reference_id: "CLAIM-PH-8820"
            status: "not_captured"
            amount: 95.0
            currency: "GBP"
        planner:
          system_prompt: >
            Second turn: customer explicitly authorizes pay; retries may all fail.
          output: >
            PLAN: submit payment 95 GBP for CLAIM-PH-8820; on failure suggest app retry.
        response_compose:
          system_prompt: >
            Calm, practical wording; no payment gateway codes or tool names.
