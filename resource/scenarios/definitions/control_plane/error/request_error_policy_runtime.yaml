# Policy engine runtime exception → request outcome=error. Policy span status=ERROR with exception.
# Template: config control_plane.request_validation_templates.error_policy_runtime.

name: request_error_policy_runtime
description: >
  Control-plane request validation fails with policy engine runtime exception; request.outcome=error, policy span status=ERROR and exception event (PolicyEngineTimeout).

tags:
  - control-plane

# Policy engine runtime errors are rare.
workload_weight: 0.15
interval_ms: 50
redaction_applied: none

# Latency: control-plane only (trace_flow = incoming_validation); config control_plane.latencies_ms (no latency_profile).
control_plane:
  template: error_policy_runtime
  policy_exception:
    type: PolicyEngineTimeout
    message: "Policy engine timed out; request outcome=error."

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone

conversation:
  external:
    user_input: "Can you tell me if my new address change is allowed under my current policy?"
    agent_response: "We ran into an internal policy error while handling your request, so it may not have completed successfully."
