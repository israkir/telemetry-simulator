# Agent confusion: user intent is cancel_claim but agent calls cancel_product (similar names).
# Same input cluster ("cancel my claim" / "cancel it") maps to both cancel_claim and cancel_product;
# agent picks wrong tool. Trace shows cancel_product tool call (succeeds) and response_compose
# marked fail (goal: ungrounded_response) so wrong-tool traffic is visible in error metrics.

name: agent_confusion_cancel_product_instead_of_claim
description: >
  Tool confusion (cancel_product vs cancel_claim): User wants to cancel a claim. Ambiguous
  phrasing matches both tools; agent incorrectly invokes cancel_product. Trace shows
  cancel_product tool call (succeeds) and response_compose fail with WrongToolError so
  wrong-tool traffic is visible in error metrics. Cause: same input cluster → similar
  tools (cancel_claim vs cancel_product).

tags:
  - data-plane
  - tool-confusion
  - agent-confusion
  - cancel-product
  - cancel-claim

workload_weight: 1.0
interval_ms: 100
redaction_applied: none

data_plane:
  workflow: cancel_product
  goal: ungrounded_response
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. User intent is to cancel a
        claim, but in this failure scenario the agent incorrectly invokes
        cancel_product (similar name) on the electronics server.
      output: >
        PLAN:
          1) Call MCP tool "cancel_product" on server "electronics" with
             policy_id and reason based on the external request.
          2) Return a confirmation that the product has been cancelled and
             when cover will end.
    - role: summarizer
      system_prompt: >
        Summarize the outcome. The agent responds as if cancel_product was
        executed (product/policy cancelled) although the user wanted to
        cancel a claim.

# response_compose is marked fail so wrong-tool traffic appears in error metrics.
scenario_overrides:
  exception_type: "WrongToolError"
  exception_message: "Agent invoked cancel_product instead of cancel_claim; response not valid for user intent."

# User wording suggests cancel_claim; agent responds as if cancel_product was executed.
context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: electronics
  tools:
    - cancel_product
  tool_call_arguments:
    cancel_product:
      policy_id: "EV-COV-3001"
      effective_date: "2025-03-31"
      reason: "customer_request"
  tool_call_results:
    cancel_product:
      policy_id: "EV-COV-3001"
      status: "cancelled"
      effective_date: "2025-03-31"
      refund_amount: 4.75
      reason: "customer_request"

conversation:
  external:
    user_input: "I want to cancel my claim — I don't need the repair anymore."
    agent_response: "I've cancelled the product. Your cover will end at the next billing date."
