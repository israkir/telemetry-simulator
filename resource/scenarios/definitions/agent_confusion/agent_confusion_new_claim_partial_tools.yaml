# Agent confusion: does not call the full set of tools in new claim workflow.
# User intent is to start a claim; expected flow is planner → task → tools_recommend → new_claim → response_compose.
# Agent runs planner, task, tools_recommend, then response_compose without ever calling new_claim (partial tool set).
# Simulated via goal: partial_workflow and scenario_overrides.actual_steps omitting the new_claim step.
# Cause: no context about sequence — agent composes response without executing the required tool.

name: agent_confusion_new_claim_partial_tools
description: >
  Partial tool set in new-claim workflow: User wants to start a phone claim. Expected flow
  is planner → task → tools_recommend → new_claim → response_compose. Agent runs planner,
  task, tools_recommend, then response_compose without calling new_claim. Trace shows
  orchestration with no MCP tool execution for new_claim; response_compose is marked
  fail (partial_workflow). Cause: no context about sequence — agent proceeds to respond
  without executing the required tool.

tags:
  - data-plane
  - agent-confusion
  - partial-workflow
  - new-claim

workload_weight: 1.0
interval_ms: 100
redaction_applied: none

data_plane:
  workflow: new_claim
  goal: partial_workflow
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to start a phone claim and decide how to respond. In this failure
        scenario the agent proceeds directly to response_compose without
        executing any MCP tools.
      output: >
        PLAN:
          1) Provide generic guidance on how the user can start a phone claim
             in the app, instead of invoking any MCP tools.
          2) Suggest that the user has their policy details ready for when
             they follow the in-app flow.
    - role: summarizer
      system_prompt: >
        Summarize the outcome for the end user. In the partial workflow the
        agent responds without having called new_claim, so the response is
        generic guidance rather than a real claim ID or next steps.

# Hierarchy is built from actual_steps (no new_claim); modifier marks response_compose as fail.
scenario_overrides:
  actual_steps:
    - planner
    - task
    - tools_recommend
    - response_compose
  exception_type: "PartialWorkflowError"
  exception_message: "Required tool not called in workflow; no context about sequence."

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - new_claim
  tool_call_arguments:
    new_claim:
      product_type: "phone"
      description: "Screen cracked after a drop down the stairs"
      incident_date: "2025-03-10"
  tool_call_results:
    new_claim:
      claim_id: "PH-8842"
      product_type: "phone"
      status: "opened"
      coverage:
        type: "phone_screen_damage"
        deductible: 75
      notes: "Claim created for cracked phone screen (not executed in partial workflow)."

conversation:
  external:
    user_input: "I dropped my phone and the screen is cracked. How do I start a claim?"
    agent_response: "You can start a claim in the app under Claims, or I can guide you through the steps there. Have your policy details ready."
