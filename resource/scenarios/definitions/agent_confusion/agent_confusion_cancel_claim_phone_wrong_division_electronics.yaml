# Agent confusion: user intent is phone (cancel phone claim) but request is ambiguous.
# Similar tool names (cancel_claim vs cancel_product) and same action wording across divisions;
# agent selects electronics MCP instead of correct phone division → wrong mcp.server.uuid / mcp.tool.uuid.
# Simulated via goal: wrong_division; trace built for phone cancel_claim then modifier swaps to electronics.

name: agent_confusion_cancel_claim_phone_wrong_division_electronics
description: >
  Division confusion (cancel): User wants to cancel their phone claim. Ambiguous request
  (e.g. "Cancel my claim", "I want to cancel") does not specify division; tool names
  (cancel_claim, cancel_product) are similar across divisions. Agent incorrectly routes
  to electronics MCP; trace shows electronics cancel_claim tool/server UUID (wrong_division
  modifier). Cause: same input cluster → similar functionality from different divisions.

tags:
  - data-plane
  - division-confusion
  - wrong-division
  - agent-confusion
  - cancel-claim

# Wrong-division routing is a rare but visible failure mode.
workload_weight: 1.0
interval_ms: 100
redaction_applied: none

data_plane:
  workflow: cancel_claim
  goal: wrong_division
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. User wants to cancel their
        phone claim. In this failure scenario the agent incorrectly routes
        to electronics MCP; trace modifier swaps cancel_claim to electronics.
      output: >
        PLAN:
          1) Choose a division based on the ambiguous request and call MCP
             tool "cancel_claim" on the selected server with claim_id and
             reason. In this scenario the selected division is electronics
             instead of phone.
          2) Attempt to return a confirmation that the claim has been
             cancelled, but the wrong division can result in a backend error.
    - role: summarizer
      system_prompt: >
        Summarize the outcome. When wrong division occurs the response may
        still say "claim cancelled" or reflect a division error.

scenario_overrides:
  wrong_division_target: electronics
  # Optional: exception event on the failed MCP attempt (wrong division → backend error).
  exception_type: "WrongDivisionError"
  exception_message: "Claim not found in this division; cancellation context is for another division."

# Ambiguous input: "cancel" could be claim or product, division unspecified; agent routes to electronics.
context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - cancel_claim
  tool_call_arguments:
    cancel_claim:
      claim_id: "PH-8842"
      reason: "customer_requested"
  tool_call_results:
    cancel_claim:
      claim_id: "PH-8842"
      status: "failed"
      error_type: "WrongDivisionError"
      error_message: "Claim not found in this division; cancellation context is for another division."

conversation:
  external:
    user_input: "I want to cancel my claim."
    agent_response: "I’ve tried to cancel your claim, but I can’t find it in this part of our system. I’m not able to complete the cancellation here, so please check you’re in the right account or contact support to finish cancelling the claim."
