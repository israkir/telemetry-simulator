# Agent confusion: first tool called is not the first tool in expected sequence.
# Expected new-claim flow: planner → task → tools_recommend → new_claim → response_compose
# (new_claim is the only tool and is the correct first/only tool). Agent instead calls
# update_appointment first, then new_claim. Simulated via goal: partial_workflow and
# scenario_overrides.actual_steps with update_appointment before new_claim.
# Cause: no context about sequence — agent invokes tools in wrong order.

name: agent_confusion_new_claim_wrong_tool_order
description: >
  First tool not first in sequence: User wants to start a phone claim. Expected flow
  is planner → task → tools_recommend → new_claim → response_compose. Agent has no
  context about sequence and calls update_appointment first, then new_claim. Trace
  shows two MCP tool executions in that order; response_compose is marked fail
  (partial_workflow). Cause: no context about sequence — agent invokes tools in
  wrong order.

tags:
  - data-plane
  - agent-confusion
  - partial-workflow
  - wrong-order
  - new-claim

workload_weight: 1.0
interval_ms: 100
redaction_applied: none

data_plane:
  workflow: new_claim
  goal: partial_workflow
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to start a phone claim. In this failure scenario the agent has no
        context about sequence and calls update_appointment before new_claim.
      output: >
        PLAN:
          1) Call MCP tool "update_appointment" first, then call "new_claim"
             using details from the external request and session.
          2) Return a confirmation including the new claim ID and appointment
             details in a single response.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the tool calls. The response may reference
        both an appointment check and a new claim in the wrong order.

# Hierarchy built with update_appointment before new_claim so first MCP span is wrong tool.
scenario_overrides:
  actual_steps:
    - planner
    - task
    - tools_recommend
    - update_appointment
    - new_claim
    - response_compose
  exception_type: "WrongToolOrderError"
  exception_message: "First tool called was not the first in expected sequence; no context about workflow order."

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - new_claim
    - update_appointment
  tool_call_arguments:
    new_claim:
      product_type: "phone"
      description: "Screen cracked after a drop down the stairs"
      incident_date: "2025-03-10"
    update_appointment:
      claim_id: "PH-8842"
      slot: "2025-03-12T09:00:00Z"
      reason: "initial_booking"
  tool_call_results:
    new_claim:
      claim_id: "PH-8842"
      product_type: "phone"
      status: "opened"
      coverage:
        type: "phone_screen_damage"
        deductible: 75
      notes: "Claim created for cracked phone screen (called after update_appointment in wrong order)."
    update_appointment:
      claim_id: "PH-8842"
      appointment:
        start: "2025-03-12T09:00:00Z"
        end: "2025-03-12T11:00:00Z"
        status: "booked"
      confirmation_id: "PH-8842-APT-1"
      reason: "initial_booking"

conversation:
  external:
    user_input: "I need to start a claim for my phone — the screen is cracked."
    agent_response: "I've checked your appointments and started a new claim (PH-8842). You can update the appointment in the next step if needed."
