# Agent confusion: user intent is phone (pay for phone claim) but request is ambiguous.
# Same input cluster (pay balance / pay claim) maps to same tool name across divisions;
# agent selects electronics MCP instead of correct phone division → wrong mcp.server.uuid / mcp.tool.uuid.
# Simulated via goal: wrong_division; trace is built for phone then modifier swaps MCP span to electronics.

name: agent_confusion_pay_phone_wrong_division_electronics
description: >
  Division confusion (pay): User has a phone claim and wants to pay. Ambiguous request
  (e.g. "I want to pay my balance", "Can I pay for my claim?") does not specify division.
  Agent incorrectly routes to electronics MCP; trace shows electronics pay tool/server UUID
  (wrong_division modifier). Cause: same input cluster → tools with same functionality
  (pay) from different divisions; tool descriptions similar across divisions.

tags:
  - data-plane
  - division-confusion
  - wrong-division
  - agent-confusion
  - pay

workload_weight: 1.0
interval_ms: 120
redaction_applied: none

data_plane:
  workflow: pay
  goal: wrong_division
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to pay a claim balance and produce a tool plan. The user has a phone
        claim, but in this failure scenario division routing is ambiguous and
        the agent ends up using the electronics MCP instead of the correct
        phone division.
      output: >
        PLAN:
          1) Choose a division based on the ambiguous request and call MCP
             tool "pay" on the selected server with arguments from the external
             request (claim_id, amount, currency, method). In this scenario
             the selected division is electronics instead of phone.
          2) Attempt to return a confirmation including the payment status and
             reference, but the wrong division leads to a division error from
             the backend.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the pay tool call. When wrong division occurs
        the user may receive a generic payment-link style response or an error.

scenario_overrides:
  wrong_division_target: electronics
  # Optional: exception event on the failed MCP attempt (wrong division → backend error).
  exception_type: "WrongDivisionError"
  exception_message: "Claim or order not found in this division; payment context is for another division."

# Ambiguous user input: could apply to phone or electronics; agent picks wrong division.
context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - pay
  tool_call_arguments:
    pay:
      claim_id: "PH-8842"
      amount: 75.00
      currency: "GBP"
      method: "card"
  tool_call_results:
    pay:
      claim_id: "PH-8842"
      status: "failed"
      error_type: "WrongDivisionError"
      error_message: "Claim or order not found in this division; payment context is for another division."

conversation:
  external:
    user_input: "I want to pay my balance."
    agent_response: "I’ve tried to look up your balance, but I can’t find your claim in this part of our system right now. I’m not able to take the payment here, so please check you’re in the right account or contact support to complete the payment."
