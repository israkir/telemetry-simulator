# Agent calls claim_status (correct tool) with claim ID in wrong format → 4xx.
# Cause: how input entities were specified — e.g. claim ID without dash (7733 vs HA-7733),
# wrong prefix, or malformed ID. One MCP attempt gets error.type=invalid_arguments and
# http.response.status_code in [400, 404, 422].
# Division: appliances (dishwasher, fridge, etc.). Template-driven; no code change to add similar scenarios.

name: claim_status_appliances_tool_4xx_invalid_params
description: >
  Agent calls claim_status for appliances with claim ID in wrong format (e.g. without dash,
  wrong prefix), resulting in 4xx. Cause: how the user specified the claim ID.

tags:
  - data-plane
  - 4xx
  - invalid-params
  - claim-id-format
  - appliances

workload_weight: 0.45
interval_ms: 60
interval_deviation_ms: 50
redaction_applied: none

data_plane:
  workflow: claim_status
  goal: 4xx_invalid_arguments
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        for the status of an appliance claim and produce a tool plan that calls
        the "claim_status" MCP tool on server "appliances" with the claim ID.
      output: >
        PLAN:
          1) Call MCP tool "claim_status" on server "appliances" with the claim_id
             from the external request.
          2) Return a summary of the current status and next steps, or explain
             why the claim ID was not accepted.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the claim_status tool call into a clear final
        response for the end user, including any validation errors when the
        claim ID format is invalid.

# tool_call_arguments: wrong claim_id format (no prefix) so MCP receives invalid params → 4xx.
# Per-sample args match user_input (7733, 5521, 4412) so gen_ai.tool.call.arguments are consistent with conversation.
context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: appliances
  tools:
    - claim_status
  tool_call_arguments:
    claim_status:
      claim_id: "7733"
  tool_call_results:
    claim_status:
      error_type: "invalid_arguments"
      http_status_code: 404
      message: "Claim ID must include division prefix (e.g. HA-7733). Received 7733."

conversation:
  external:
    user_input: "What's the status of my dishwasher claim 7733?"
    agent_response: "I couldn't find that claim. Please use the full claim ID (e.g. HA-7733) so I can look it up."