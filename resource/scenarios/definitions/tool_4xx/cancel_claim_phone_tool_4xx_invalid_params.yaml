# Agent calls cancel_claim (correct tool) with invalid or missing reason → 4xx.
# Cause: reason must be from an allowed set (e.g. customer_requested, duplicate, no_longer_needed);
# user gave free text or empty reason, so MCP returns error.type=invalid_arguments and 4xx.
# Division: phone (mobile, tablet). Same pattern for all divisions.

name: cancel_claim_phone_tool_4xx_invalid_params
description: >
  Agent calls cancel_claim for phone with invalid or missing reason (e.g. free text or empty),
  resulting in 4xx. Cause: cancel_claim requires a reason from the allowed set.

tags:
  - data-plane
  - 4xx
  - invalid-params
  - cancel-reason
  - cancel-claim
  - phone

workload_weight: 0.45
interval_ms: 60
interval_deviation_ms: 50
redaction_applied: none

data_plane:
  workflow: cancel_claim
  goal: 4xx_invalid_arguments
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to cancel a phone claim and produce a tool plan that calls the
        "cancel_claim" MCP tool on server "phone" with the claim ID and
        cancellation reason.
      output: >
        PLAN:
          1) Call MCP tool "cancel_claim" on server "phone" with arguments from
             the external request (claim_id and reason).
          2) Return a confirmation including the final status of the claim or
             explain why the cancellation reason was not accepted.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the cancel_claim tool call into a clear final
        response for the end user, including any validation errors when the
        cancellation reason is invalid or missing.

# Valid claim_id (PH-8842); invalid reason (empty or free text) so MCP returns 4xx.
context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - cancel_claim
  tool_call_arguments:
    cancel_claim: { claim_id: "PH-8842", reason: "" }
  tool_call_results:
    cancel_claim:
      error_type: "invalid_arguments"
      http_status_code: 422
      message: "reason must be one of: customer_requested, duplicate, no_longer_needed, resolved_elsewhere. Received empty reason."

conversation:
  external:
    user_input: "Just cancel my phone claim PH-8842. I don't want to give a reason."
    agent_response: "I need a reason to cancel (e.g. 'no longer needed', 'duplicate claim'). Which applies? Then I can complete the cancellation."