# Agent calls new_claim (correct tool) with incorrect or missing parameters → 4xx.
# Cause: how input entities were specified — e.g. date of loss in wrong format (13/31/2024,
# "March 15" vs ISO), missing required fields, or malformed payload. One MCP attempt gets
# error.type=invalid_arguments and http.response.status_code in [400, 404, 422].
# Division: electronics (TV, laptop, home electronics). Template-driven; no code change to add similar scenarios.

name: new_claim_electronics_tool_4xx_invalid_params
description: >
  Agent calls new_claim for electronics with wrong format or missing parameters (e.g. date format,
  missing required field), resulting in 4xx. Cause: how input entities were specified by the user.

tags:
  - data-plane
  - 4xx
  - invalid-params
  - entity-format
  - electronics

# Invalid params (wrong format, missing fields) are an occasional share of tool calls.
workload_weight: 0.45
interval_ms: 60
interval_deviation_ms: 50
redaction_applied: none

data_plane:
  workflow: new_claim
  goal: 4xx_invalid_arguments
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to start a home electronics claim and produce a tool plan that calls
        the "new_claim" MCP tool on server "electronics" with the incident
        description and date.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "electronics" with arguments from the
             external request (product_type=electronics, incident_description, incident_date).
          2) Return a confirmation including the new claim ID and next steps.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the new_claim tool call into a clear final
        response for the end user, including any validation errors so the user
        understands why the claim could not be created.

# tool_call_arguments: wrong date format or missing so MCP receives invalid params → 4xx.
# Per-sample args match user_input so gen_ai.tool.call.arguments are consistent with conversation.
context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: electronics
  tools:
    - new_claim
  tool_call_arguments:
    new_claim:
      product_type: "TV"
      description: "Damage"
      incident_date: "13/31/2024"
  tool_call_results:
    new_claim:
      error_type: "invalid_arguments"
      http_status_code: 422
      message: "Incident date must be a valid ISO-8601 date (e.g. 2024-03-15). Received 13/31/2024."

conversation:
  external:
    user_input: "I need to claim my TV. Date of damage 13/31/2024."
    agent_response: "I tried to start the claim but the system didn't accept that date. Please use a format like 15 March 2024 or 2024-03-15."
