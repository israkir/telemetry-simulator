# Agent calls cancel_product (correct tool) with invalid or missing policy_id → 4xx.
# Cause: policy_id must be present and in valid format (e.g. pol_xxx); user gave empty or
# malformed policy_id, so MCP returns error.type=invalid_arguments and 4xx.
# Division: appliances. Same pattern for all divisions.

name: cancel_product_appliances_tool_4xx_invalid_params
description: >
  Agent calls cancel_product for appliances with invalid or missing policy_id (e.g. empty or
  malformed), resulting in 4xx. Cause: cancel_product requires a valid policy_id.

tags:
  - data-plane
  - 4xx
  - invalid-params
  - cancel-product
  - appliances

workload_weight: 0.45
interval_ms: 60
interval_deviation_ms: 50
redaction_applied: none

data_plane:
  workflow: cancel_product
  goal: 4xx_invalid_arguments
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to cancel an appliance policy and produce a tool plan that calls the
        "cancel_product" MCP tool on server "appliances" with the policy ID
        and cancellation details.
      output: >
        PLAN:
          1) Call MCP tool "cancel_product" on server "appliances" with arguments from the
             external request (policy_id and effective_date).
          2) Return a confirmation including when cover ends and any refund information,
             or explain why the policy_id was not accepted.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the cancel_product tool call into a clear final
        response for the end user, including any validation errors when the
        policy_id is missing or malformed.

# Invalid policy_id (empty) so MCP returns 4xx.
context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: appliances
  tools:
    - cancel_product
  tool_call_arguments:
    cancel_product:
      policy_id: ""
      reason: "no_longer_needed"
  tool_call_results:
    cancel_product:
      error_type: "invalid_arguments"
      http_status_code: 400
      message: "policy_id is required and must match format (e.g. pol_xxx). Received empty policy_id."

conversation:
  external:
    user_input: "Cancel my appliance policy. I don't have the policy number."
    agent_response: "I need the policy ID to cancel (e.g. from your confirmation email). Without it I can't complete the cancellation."