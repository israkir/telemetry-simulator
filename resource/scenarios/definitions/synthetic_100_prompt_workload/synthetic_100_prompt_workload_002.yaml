name: synthetic_100_prompt_workload_002
description: Single-turn synthetic workload scenario row 2.
tags:
- normal
- synthetic
- single-turn
tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone
vendor.redaction.applied: none
workload_weight: 17.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 11, deviation: 3}
      payload.validation: {mean: 7, deviation: 2}
      policy.validation: {mean: 19, deviation: 5}
      augmentation.validation: {mean: 10, deviation: 3}
      a2a.orchestrate: {mean: 1480, deviation: 325}
      planner: {mean: 505, deviation: 121}
      llm.call: {mean: 416, deviation: 95}
      task.execute: {mean: 1080, deviation: 259}
      tools.recommend: {mean: 71, deviation: 21}
      mcp.tool.execute: {mean: 490, deviation: 127}
      response.compose: {mean: 364, deviation: 87}
      response.validation: {mean: 13, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 19, deviation: 5}
      payload.validation: {mean: 12, deviation: 3}
      policy.validation: {mean: 32, deviation: 8}
      augmentation.validation: {mean: 17, deviation: 4}
      a2a.orchestrate: {mean: 2560, deviation: 691}
      planner: {mean: 873, deviation: 235}
      llm.call: {mean: 719, deviation: 194}
      task.execute: {mean: 1868, deviation: 504}
      tools.recommend: {mean: 122, deviation: 33}
      mcp.tool.execute: {mean: 847, deviation: 228}
      response.compose: {mean: 629, deviation: 170}
      response.validation: {mean: 22, deviation: 6}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [5, 6, 7]
    start_hour: 18
    end_hour: 23
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
    - payload.validation
    - policy.validation
    - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
    - planner
    - task.execute
    - llm.call
    - tools.recommend
    - mcp.tool.execute
    - mcp.tool.execute.attempt
    - response.compose
  cp_response:
    root: response.validation
    children:
    - policy.validation
endusers:
- id: synthetic_row_002
  vendor.enduser.pseudo.id: user_syn_002
  channel: web
  mcp_server: phone
  turns:
  - turn_index: 1
    span_plan: *id001
    vendor.enduser.request.raw: "Stolen phone on the train yesterday evening\u2014wallet in the same bag. File claim under Toro."
    span_events:
    - target_span_class: request.validation
      name: gentoro.enduser.request
      attributes:
        vendor.enduser.request.raw: "Stolen phone on the train yesterday evening\u2014wallet in the same bag. File claim under Toro."
    - target_span_class: response.validation
      name: gentoro.agent.response
      attributes:
        vendor.agent.response.raw: Loss claim **CLM-1002** is **opened**; I grabbed morning slots and booked **SLOT-2026-03-25T09:00**. Keep any incident reference you received from the carrier.
    - target_span_class: tools.recommend
      name: gentoro.agent.tool_selection
      attributes:
        vendor.agent.tool_selection.input.raw: "Stolen phone on the train yesterday evening\u2014wallet in the same bag. File claim under Toro."
        vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "new_claim"}, {"tool_name": "get_available_slots"}, {"tool_name": "update_appointment"}]}'
    agent_response: Loss claim **CLM-1002** is **opened**; I grabbed morning slots and booked **SLOT-2026-03-25T09:00**. Keep any incident reference you received from the carrier.
    tool_chain:
    - new_claim
    - get_available_slots
    - update_appointment
    gen_ai.request.type: completion
    gen_ai.response.finish_reason: stop
    gen_ai.usage.input_tokens: 900
    gen_ai.usage.output_tokens: 130
    gentoro.llm.streaming: false
    gentoro.llm.content.capture.enabled: true
    gentoro.llm.content.redaction.enabled: false
    gen_ai.tool.call.arguments:
      new_claim:
        product_type: phone
        description: "Stolen phone on the train yesterday evening\u2014wallet in the same bag. File claim under Toro."
        incident_date: '2026-03-20'
      get_available_slots:
        claim_id: CLM-1002
        service_type: repair_collection
        date_range_start: '2026-03-20'
        date_range_end: '2026-03-31'
      update_appointment:
        claim_id: CLM-1002
        appointment_id: APT-000002
        slot_id: SLOT-2026-03-25T09:00
        preferred_time_window: morning
    gen_ai.tool.call.result:
      new_claim:
        claim_id: CLM-1002
        product_type: phone
        status: opened
        coverage:
          type: device_damage
          deductible: 75
        notes: Claim created from workload row.
      get_available_slots:
        claim_id: CLM-1002
        slots:
        - slot_id: SLOT-2026-03-25T09:00
          duration_minutes: 120
        - slot_id: SLOT-2026-03-27T14:00
          duration_minutes: 120
        timezone: America/Los_Angeles
      update_appointment:
        claim_id: CLM-1002
        appointment_id: APT-000002
        status: rescheduled
        scheduled_at: '2026-03-25T09:00:00Z'
    planner:
      system_prompt: Phone MCP; execute table-defined tool chain.
      output: 'PLAN: new_claim -> get_available_slots -> update_appointment'
    response_compose:
      system_prompt: Return concise customer-facing confirmation in plain language.
