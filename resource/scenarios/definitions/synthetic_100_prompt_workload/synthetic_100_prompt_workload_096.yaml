name: synthetic_100_prompt_workload_096
description: Single-turn synthetic workload scenario row 96.
tags:
- normal
- synthetic
- single-turn
tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone
vendor.redaction.applied: none
workload_weight: 24.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 10, deviation: 2}
      payload.validation: {mean: 6, deviation: 2}
      policy.validation: {mean: 17, deviation: 5}
      augmentation.validation: {mean: 9, deviation: 2}
      a2a.orchestrate: {mean: 1470, deviation: 323}
      planner: {mean: 420, deviation: 100}
      llm.call: {mean: 355, deviation: 81}
      task.execute: {mean: 660, deviation: 158}
      tools.recommend: {mean: 59, deviation: 17}
      mcp.tool.execute: {mean: 330, deviation: 85}
      response.compose: {mean: 376, deviation: 90}
      response.validation: {mean: 12, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 16, deviation: 4}
      payload.validation: {mean: 9, deviation: 2}
      policy.validation: {mean: 27, deviation: 7}
      augmentation.validation: {mean: 14, deviation: 3}
      a2a.orchestrate: {mean: 2396, deviation: 646}
      planner: {mean: 684, deviation: 184}
      llm.call: {mean: 578, deviation: 156}
      task.execute: {mean: 1075, deviation: 290}
      tools.recommend: {mean: 96, deviation: 25}
      mcp.tool.execute: {mean: 537, deviation: 145}
      response.compose: {mean: 612, deviation: 165}
      response.validation: {mean: 19, deviation: 5}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [5, 6, 7]
    start_hour: 18
    end_hour: 23
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
    - payload.validation
    - policy.validation
    - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
    - planner
    - task.execute
    - llm.call
    - tools.recommend
    - mcp.tool.execute
    - mcp.tool.execute.attempt
    - response.compose
  cp_response:
    root: response.validation
    children:
    - policy.validation
endusers:
- id: synthetic_row_096
  vendor.enduser.pseudo.id: user_syn_096
  channel: web
  mcp_server: phone
  turns:
  - turn_index: 1
    span_plan: *id001
    vendor.enduser.request.raw: 'Urgent request: please activate phone **Plus** now using quote **QT-500**.'
    span_events:
    - target_span_class: request.validation
      name: gentoro.enduser.request
      attributes:
        vendor.enduser.request.raw: 'Urgent request: please activate phone **Plus** now using quote **QT-500**.'
    - target_span_class: response.validation
      name: gentoro.agent.response
      attributes:
        vendor.agent.response.raw: Completed. Your phone **Plus** policy from **QT-500** is active as **POL-700**. But, payment has not been made yet.
    - target_span_class: tools.recommend
      name: gentoro.agent.tool_selection
      attributes:
        vendor.agent.tool_selection.input.raw: 'Urgent request: please activate phone **Plus** now using quote **QT-500**.'
        vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "choose_insurance"}, {"tool_name": "buy_insurance"}]}'
    agent_response: Completed. Your phone **Plus** policy from **QT-500** is active as **POL-700**. But, payment has not been made yet.
    tool_chain:
    - choose_insurance
    - buy_insurance
    gen_ai.request.type: completion
    gen_ai.response.finish_reason: stop
    gen_ai.usage.input_tokens: 900
    gen_ai.usage.output_tokens: 130
    gentoro.llm.streaming: false
    gentoro.llm.content.capture.enabled: true
    gentoro.llm.content.redaction.enabled: false
    gen_ai.tool.call.arguments:
      choose_insurance:
        product_category: phone
        coverage_tier: plus
        region: NO-01
      buy_insurance:
        quote_id: QT-500
        payment_method: card_on_file
        holder_reference: enduser_0096
    gen_ai.tool.call.result:
      choose_insurance:
        quote_id: QT-500
        premium_monthly: 12.5
        currency: EUR
        valid_until: '2026-04-01'
      buy_insurance:
        policy_id: POL-700
        quote_id: QT-500
        effective_date: '2026-03-20'
        status: active
    planner:
      system_prompt: Phone MCP; execute table-defined tool chain.
      output: 'PLAN: choose_insurance -> buy_insurance'
    response_compose:
      system_prompt: Return concise customer-facing confirmation in plain language.
