name: synthetic_100_prompt_workload_091
description: Single-turn synthetic workload scenario row 91.
tags:
  - normal
  - synthetic
  - single-turn
  - B2
tenant: toro
agent: toro-customer-assistant-001
vendor.redaction.applied: none
workload_weight: 2.4
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 9, deviation: 2}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 15, deviation: 4}
      augmentation.validation: {mean: 8, deviation: 2}
      a2a.orchestrate: {mean: 1190, deviation: 261}
      planner: {mean: 420, deviation: 100}
      llm.call: {mean: 371, deviation: 85}
      task.execute: {mean: 660, deviation: 158}
      tools.recommend: {mean: 59, deviation: 17}
      mcp.tool.execute: {mean: 330, deviation: 85}
      response.compose: {mean: 316, deviation: 75}
      response.validation: {mean: 11, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 16, deviation: 4}
      payload.validation: {mean: 9, deviation: 2}
      policy.validation: {mean: 27, deviation: 7}
      augmentation.validation: {mean: 14, deviation: 3}
      a2a.orchestrate: {mean: 2142, deviation: 578}
      planner: {mean: 756, deviation: 204}
      llm.call: {mean: 667, deviation: 180}
      task.execute: {mean: 1188, deviation: 320}
      tools.recommend: {mean: 106, deviation: 28}
      mcp.tool.execute: {mean: 594, deviation: 160}
      response.compose: {mean: 568, deviation: 153}
      response.validation: {mean: 19, deviation: 5}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [1, 2, 3, 4, 5]
    start_hour: 17
    end_hour: 22
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation
endusers:
  - id: synthetic_row_091
    vendor.enduser.pseudo.id: user_syn_091
    channel: web
    turns:
      - turn_index: 1
        span_plan: *id001
        vendor.enduser.request.raw: "I'm traveling tomorrow - activate phone coverage on QT-500 with my saved card, today."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "I'm traveling tomorrow - activate phone coverage on QT-500 with my saved card, today."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: Done quickly as requested. Your phone policy from QT-500 is now active under POL-700.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "I'm traveling tomorrow - activate phone coverage on QT-500 with my saved card, today."
              vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "choose_insurance"}, {"tool_name": "buy_insurance"}]}'
        agent_response: Done quickly as requested. Your phone policy from QT-500 is now active under POL-700.
        tool_chain:
          - mcp_server: phone
            tool: choose_insurance
          - mcp_server: phone
            tool: buy_insurance
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 900
        gen_ai.usage.output_tokens: 130
        gentoro.llm.streaming: false
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          choose_insurance:
            product_category: phone
            coverage_tier: standard
            region: NO-01
          buy_insurance:
            quote_id: QT-500
            payment_method: card_on_file
            holder_reference: enduser_0091
        gen_ai.tool.call.result:
          choose_insurance:
            quote_id: QT-500
            premium_monthly: 12.5
            currency: EUR
            valid_until: '2026-04-01'
          buy_insurance:
            policy_id: POL-700
            quote_id: QT-500
            effective_date: '2026-03-20'
            status: active
        planner:
          system_prompt: Phone MCP; execute table-defined tool chain.
          output: 'PLAN: choose_insurance -> buy_insurance'
        response_compose:
          system_prompt: Return concise customer-facing confirmation in plain language.
