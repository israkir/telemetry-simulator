name: synthetic_100_prompt_workload_092
description: Single-turn synthetic workload scenario row 92.
tags:
- normal
- synthetic
- single-turn
tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone
vendor.redaction.applied: none
workload_weight: 24.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 10, deviation: 2}
      payload.validation: {mean: 6, deviation: 2}
      policy.validation: {mean: 16, deviation: 4}
      augmentation.validation: {mean: 8, deviation: 2}
      a2a.orchestrate: {mean: 1330, deviation: 292}
      planner: {mean: 420, deviation: 100}
      llm.call: {mean: 366, deviation: 84}
      task.execute: {mean: 660, deviation: 158}
      tools.recommend: {mean: 59, deviation: 17}
      mcp.tool.execute: {mean: 330, deviation: 85}
      response.compose: {mean: 346, deviation: 83}
      response.validation: {mean: 12, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 20, deviation: 5}
      payload.validation: {mean: 12, deviation: 3}
      policy.validation: {mean: 32, deviation: 8}
      augmentation.validation: {mean: 16, deviation: 4}
      a2a.orchestrate: {mean: 2699, deviation: 728}
      planner: {mean: 852, deviation: 230}
      llm.call: {mean: 742, deviation: 200}
      task.execute: {mean: 1339, deviation: 361}
      tools.recommend: {mean: 119, deviation: 32}
      mcp.tool.execute: {mean: 669, deviation: 180}
      response.compose: {mean: 702, deviation: 189}
      response.validation: {mean: 24, deviation: 6}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [5, 6, 7]
    start_hour: 18
    end_hour: 23
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
    - payload.validation
    - policy.validation
    - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
    - planner
    - task.execute
    - llm.call
    - tools.recommend
    - mcp.tool.execute
    - mcp.tool.execute.attempt
    - response.compose
  cp_response:
    root: response.validation
    children:
    - policy.validation
endusers:
- id: synthetic_row_092
  vendor.enduser.pseudo.id: user_syn_092
  channel: web
  mcp_server: phone
  turns:
  - turn_index: 1
    span_plan: *id001
    vendor.enduser.request.raw: Please purchase gaming/electronics coverage using quote **QT-410**, and also take the **$18.75** payment now.
    span_events:
    - target_span_class: request.validation
      name: gentoro.enduser.request
      attributes:
        vendor.enduser.request.raw: Please purchase gaming/electronics coverage using quote **QT-410**, and also take the **$18.75** payment now.
    - target_span_class: response.validation
      name: gentoro.agent.response
      attributes:
        vendor.agent.response.raw: Completed. Your electronics coverage from **QT-410** is active as **POL-700**.
    - target_span_class: tools.recommend
      name: gentoro.agent.tool_selection
      attributes:
        vendor.agent.tool_selection.input.raw: Please purchase gaming/electronics coverage using quote **QT-410**, and also take the **$18.75** payment now.
        vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "choose_insurance"}, {"tool_name": "buy_insurance"}]}'
    agent_response: Completed. Your electronics coverage from **QT-410** is active as **POL-700**.
    tool_chain:
    - choose_insurance
    - buy_insurance
    gen_ai.request.type: completion
    gen_ai.response.finish_reason: stop
    gen_ai.usage.input_tokens: 900
    gen_ai.usage.output_tokens: 130
    gentoro.llm.streaming: false
    gentoro.llm.content.capture.enabled: true
    gentoro.llm.content.redaction.enabled: false
    gen_ai.tool.call.arguments:
      choose_insurance:
        product_category: electronics
        coverage_tier: standard
        region: NO-01
      buy_insurance:
        quote_id: QT-410
        payment_method: card_on_file
        holder_reference: enduser_0092
    gen_ai.tool.call.result:
      choose_insurance:
        quote_id: QT-410
        premium_monthly: 18.75
        currency: EUR
        valid_until: '2026-04-01'
      buy_insurance:
        policy_id: POL-700
        quote_id: QT-410
        effective_date: '2026-03-20'
        status: active
    planner:
      system_prompt: Phone MCP; execute table-defined tool chain.
      output: 'PLAN: choose_insurance -> buy_insurance'
    response_compose:
      system_prompt: Return concise customer-facing confirmation in plain language.
