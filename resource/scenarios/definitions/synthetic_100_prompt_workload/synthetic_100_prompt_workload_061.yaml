name: synthetic_100_prompt_workload_061
description: Single-turn synthetic workload scenario row 61.
tags:
  - normal
  - synthetic
  - single-turn
  - B1
tenant: toro
agent: toro-customer-assistant-001
vendor.redaction.applied: none
workload_weight: 25.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 2}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 13, deviation: 3}
      augmentation.validation: {mean: 7, deviation: 2}
      a2a.orchestrate: {mean: 1160, deviation: 255}
      planner: {mean: 335, deviation: 80}
      llm.call: {mean: 301, deviation: 69}
      task.execute: {mean: 520, deviation: 124}
      tools.recommend: {mean: 47, deviation: 14}
      mcp.tool.execute: {mean: 200, deviation: 52}
      response.compose: {mean: 298, deviation: 71}
      response.validation: {mean: 10, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 13, deviation: 3}
      payload.validation: {mean: 8, deviation: 2}
      policy.validation: {mean: 21, deviation: 5}
      augmentation.validation: {mean: 11, deviation: 3}
      a2a.orchestrate: {mean: 1948, deviation: 526}
      planner: {mean: 562, deviation: 151}
      llm.call: {mean: 505, deviation: 136}
      task.execute: {mean: 873, deviation: 235}
      tools.recommend: {mean: 78, deviation: 21}
      mcp.tool.execute: {mean: 336, deviation: 90}
      response.compose: {mean: 500, deviation: 135}
      response.validation: {mean: 16, deviation: 4}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [5, 6, 7]
    start_hour: 18
    end_hour: 23
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation
endusers:
  - id: synthetic_row_061
    vendor.enduser.pseudo.id: user_syn_061
    channel: web
    turns:
      - turn_index: 1
        span_plan: *id001
        vendor.enduser.request.raw: I only need a phone Plus quote right now. Please do not activate anything.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: I only need a phone Plus quote right now. Please do not activate anything.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: 'Sure - I prepared a Plus quote: QT-500, $12.50/month, valid until 2026-04-01. No purchase was made.'
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: I only need a phone Plus quote right now. Please do not activate anything.
              vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "choose_insurance"}]}'
        agent_response: 'Sure - I prepared a Plus quote: QT-500, $12.50/month, valid until 2026-04-01. No purchase was made.'
        tool_chain:
          - mcp_server: phone
            tool: choose_insurance
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 900
        gen_ai.usage.output_tokens: 130
        gentoro.llm.streaming: false
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          choose_insurance:
            product_category: phone
            coverage_tier: plus
            region: NO-01
        gen_ai.tool.call.result:
          choose_insurance:
            quote_id: QT-500
            premium_monthly: 12.5
            currency: EUR
            valid_until: '2026-04-01'
        planner:
          system_prompt: Phone MCP; execute table-defined tool chain.
          output: 'PLAN: choose_insurance'
        response_compose:
          system_prompt: Return concise customer-facing confirmation in plain language.
