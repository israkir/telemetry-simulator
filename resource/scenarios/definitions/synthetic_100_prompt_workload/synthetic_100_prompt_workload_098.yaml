name: synthetic_100_prompt_workload_098
description: Single-turn synthetic workload scenario row 98.
tags:
  - normal
  - synthetic
  - single-turn
  - B3
tenant: toro
agent: toro-customer-assistant-001
vendor.redaction.applied: none
workload_weight: 2.75
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 11, deviation: 3}
      payload.validation: {mean: 6, deviation: 2}
      policy.validation: {mean: 18, deviation: 5}
      augmentation.validation: {mean: 9, deviation: 2}
      a2a.orchestrate: {mean: 1360, deviation: 299}
      planner: {mean: 505, deviation: 121}
      llm.call: {mean: 425, deviation: 97}
      task.execute: {mean: 800, deviation: 192}
      tools.recommend: {mean: 71, deviation: 21}
      mcp.tool.execute: {mean: 460, deviation: 119}
      response.compose: {mean: 364, deviation: 87}
      response.validation: {mean: 13, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 17, deviation: 4}
      payload.validation: {mean: 9, deviation: 2}
      policy.validation: {mean: 27, deviation: 7}
      augmentation.validation: {mean: 13, deviation: 3}
      a2a.orchestrate: {mean: 2108, deviation: 569}
      planner: {mean: 782, deviation: 211}
      llm.call: {mean: 658, deviation: 177}
      task.execute: {mean: 1240, deviation: 334}
      tools.recommend: {mean: 110, deviation: 29}
      mcp.tool.execute: {mean: 713, deviation: 192}
      response.compose: {mean: 564, deviation: 152}
      response.validation: {mean: 20, deviation: 5}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [1, 2, 3, 4, 5]
    start_hour: 12
    end_hour: 16
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation
endusers:
  - id: synthetic_row_098
    vendor.enduser.pseudo.id: user_syn_098
    channel: web
    turns:
      - turn_index: 1
        span_plan: *id001
        vendor.enduser.request.raw: 'Washer coverage on QT-500 - buy the policy, then pay the $12.50 premium.'
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: 'Washer coverage on QT-500 - buy the policy, then pay the $12.50 premium.'
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: All set. Your washer policy was purchased from QT-500, is now active as POL-700, and the $12.50 policy payment has been completed.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: 'Washer coverage on QT-500 - buy the policy, then pay the $12.50 premium.'
              vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "choose_insurance"}, {"tool_name": "buy_insurance"}, {"tool_name": "pay"}]}'
        agent_response: All set. Your washer policy was purchased from QT-500, is now active as POL-700, and the $12.50 policy payment has been completed.
        tool_chain:
          - mcp_server: phone
            tool: choose_insurance
          - mcp_server: phone
            tool: buy_insurance
          - mcp_server: phone
            tool: pay
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 900
        gen_ai.usage.output_tokens: 130
        gentoro.llm.streaming: false
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          choose_insurance:
            product_category: appliances
            coverage_tier: standard
            region: NO-01
          buy_insurance:
            quote_id: QT-500
            payment_method: card_on_file
            holder_reference: enduser_0098
          pay:
            payment_target: policy_renewal
            reference_id: POL-700
            amount: 12.5
            currency: EUR
        gen_ai.tool.call.result:
          choose_insurance:
            quote_id: QT-500
            premium_monthly: 12.5
            currency: EUR
            valid_until: '2026-04-01'
          buy_insurance:
            policy_id: POL-700
            quote_id: QT-500
            effective_date: '2026-03-20'
            status: active
          pay:
            payment_id: PAY-398
            reference_id: POL-700
            status: captured
            amount: 12.5
            currency: EUR
        planner:
          system_prompt: Phone MCP; execute table-defined tool chain.
          output: 'PLAN: choose_insurance -> buy_insurance -> pay'
        response_compose:
          system_prompt: Return concise customer-facing confirmation in plain language.
