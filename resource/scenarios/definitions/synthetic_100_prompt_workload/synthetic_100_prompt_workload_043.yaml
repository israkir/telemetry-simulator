name: synthetic_100_prompt_workload_043
description: Single-turn synthetic workload scenario row 43.
tags:
  - normal
  - synthetic
  - single-turn
  - C2
tenant: toro
agent: toro-customer-assistant-001
vendor.redaction.applied: none
workload_weight: 0.625
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 2}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 13, deviation: 3}
      augmentation.validation: {mean: 7, deviation: 2}
      a2a.orchestrate: {mean: 1020, deviation: 224}
      planner: {mean: 335, deviation: 80}
      llm.call: {mean: 303, deviation: 69}
      task.execute: {mean: 610, deviation: 146}
      tools.recommend: {mean: 47, deviation: 14}
      mcp.tool.execute: {mean: 260, deviation: 67}
      response.compose: {mean: 268, deviation: 64}
      response.validation: {mean: 10, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 14, deviation: 3}
      payload.validation: {mean: 9, deviation: 2}
      policy.validation: {mean: 23, deviation: 6}
      augmentation.validation: {mean: 12, deviation: 3}
      a2a.orchestrate: {mean: 1836, deviation: 495}
      planner: {mean: 603, deviation: 162}
      llm.call: {mean: 545, deviation: 147}
      task.execute: {mean: 1098, deviation: 296}
      tools.recommend: {mean: 84, deviation: 22}
      mcp.tool.execute: {mean: 468, deviation: 126}
      response.compose: {mean: 482, deviation: 130}
      response.validation: {mean: 18, deviation: 4}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [1, 2, 3, 4, 5]
    start_hour: 17
    end_hour: 22
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation
endusers:
  - id: synthetic_row_043
    vendor.enduser.pseudo.id: user_syn_043
    channel: web
    turns:
      - turn_index: 1
        span_plan: *id001
        vendor.enduser.request.raw: "Corner glass is badly cracked after a stumble - start my Toro phone claim and book Saturday, March 21, 2026, 2:00 PM PT; the SMS you sent offered that afternoon window."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "Corner glass is badly cracked after a stumble - start my Toro phone claim and book Saturday, March 21, 2026, 2:00 PM PT; the SMS you sent offered that afternoon window."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: "CLM-4821 opened; pickup is set to Saturday, March 21, 2026, 2:00 PM PT - no separate slot listing step."
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "Corner glass is badly cracked after a stumble - start my Toro phone claim and book Saturday, March 21, 2026, 2:00 PM PT; the SMS you sent offered that afternoon window."
              vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "new_claim"}, {"tool_name": "update_appointment"}]}'
        agent_response: "CLM-4821 opened; pickup is set to Saturday, March 21, 2026, 2:00 PM PT - no separate slot listing step."
        tool_chain:
          - mcp_server: phone
            tool: new_claim
          - mcp_server: phone
            tool: update_appointment
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 900
        gen_ai.usage.output_tokens: 130
        gentoro.llm.streaming: false
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: phone
            description: Cracked corner glass after a stumble; user wants the SMS afternoon window booked.
            incident_date: '2026-03-20'
          update_appointment:
            claim_id: CLM-4821
            appointment_id: APT-000043
            slot_id: SLOT-2026-03-21T14:00
            preferred_time_window: afternoon
        gen_ai.tool.call.result:
          new_claim:
            claim_id: CLM-4821
            product_type: phone
            status: opened
            coverage:
              type: device_damage
              deductible: 75
            notes: Claim created from workload row.
          update_appointment:
            claim_id: CLM-4821
            appointment_id: APT-000043
            status: rescheduled
            scheduled_at: '2026-03-21T14:00:00Z'
        planner:
          system_prompt: Phone MCP; execute table-defined tool chain.
          output: 'PLAN: new_claim -> update_appointment'
        response_compose:
          system_prompt: Return concise customer-facing confirmation in plain language.
