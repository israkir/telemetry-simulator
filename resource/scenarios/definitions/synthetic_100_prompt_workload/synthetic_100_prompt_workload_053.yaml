name: synthetic_100_prompt_workload_053
description: Single-turn synthetic workload scenario row 53.
tags:
  - normal
  - synthetic
  - single-turn
  - C5
tenant: toro
agent: toro-customer-assistant-001
vendor.redaction.applied: none
workload_weight: 17.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 2}
      payload.validation: {mean: 4, deviation: 2}
      policy.validation: {mean: 12, deviation: 3}
      augmentation.validation: {mean: 6, deviation: 2}
      a2a.orchestrate: {mean: 1020, deviation: 224}
      planner: {mean: 335, deviation: 80}
      llm.call: {mean: 307, deviation: 70}
      task.execute: {mean: 520, deviation: 124}
      tools.recommend: {mean: 47, deviation: 14}
      mcp.tool.execute: {mean: 200, deviation: 52}
      response.compose: {mean: 268, deviation: 64}
      response.validation: {mean: 10, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 13, deviation: 3}
      payload.validation: {mean: 6, deviation: 2}
      policy.validation: {mean: 20, deviation: 5}
      augmentation.validation: {mean: 10, deviation: 2}
      a2a.orchestrate: {mean: 1734, deviation: 468}
      planner: {mean: 569, deviation: 153}
      llm.call: {mean: 521, deviation: 140}
      task.execute: {mean: 884, deviation: 238}
      tools.recommend: {mean: 79, deviation: 21}
      mcp.tool.execute: {mean: 340, deviation: 91}
      response.compose: {mean: 455, deviation: 123}
      response.validation: {mean: 17, deviation: 4}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [1, 2, 3, 4, 5]
    start_hour: 7
    end_hour: 10
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation
endusers:
  - id: synthetic_row_053
    vendor.enduser.pseudo.id: user_syn_053
    channel: web
    turns:
      - turn_index: 1
        span_plan: *id001
        vendor.enduser.request.raw: "Theft report filed - start claim but I need the reference number validated before booking."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "Theft report filed - start claim but I need the reference number validated before booking."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: "CLM-7003 loss created in opened status; holding scheduling until your reference checks out - send it when ready."
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "Theft report filed - start claim but I need the reference number validated before booking."
              vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "new_claim"}]}'
        agent_response: "CLM-7003 loss created in opened status; holding scheduling until your reference checks out - send it when ready."
        tool_chain:
          - mcp_server: phone
            tool: new_claim
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 900
        gen_ai.usage.output_tokens: 130
        gentoro.llm.streaming: false
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: phone
            description: "Theft report filed - start claim but I need the reference number validated before booking."
            incident_date: '2026-03-20'
        gen_ai.tool.call.result:
          new_claim:
            claim_id: CLM-7003
            product_type: phone
            status: opened
            coverage:
              type: device_damage
              deductible: 75
            notes: Claim created from workload row.
        planner:
          system_prompt: Phone MCP; execute table-defined tool chain.
          output: 'PLAN: new_claim'
        response_compose:
          system_prompt: Return concise customer-facing confirmation in plain language.
