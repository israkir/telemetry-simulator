name: synthetic_100_prompt_workload_051
description: Single-turn synthetic workload scenario row 51.
tags:
  - normal
  - synthetic
  - single-turn
  - C5
tenant: toro
agent: toro-customer-assistant-001
vendor.redaction.applied: none
workload_weight: 17.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 2}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 13, deviation: 3}
      augmentation.validation: {mean: 7, deviation: 2}
      a2a.orchestrate: {mean: 1160, deviation: 255}
      planner: {mean: 335, deviation: 80}
      llm.call: {mean: 302, deviation: 69}
      task.execute: {mean: 520, deviation: 124}
      tools.recommend: {mean: 47, deviation: 14}
      mcp.tool.execute: {mean: 200, deviation: 52}
      response.compose: {mean: 298, deviation: 71}
      response.validation: {mean: 10, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 14, deviation: 3}
      payload.validation: {mean: 8, deviation: 2}
      policy.validation: {mean: 23, deviation: 6}
      augmentation.validation: {mean: 12, deviation: 3}
      a2a.orchestrate: {mean: 2064, deviation: 557}
      planner: {mean: 596, deviation: 161}
      llm.call: {mean: 537, deviation: 145}
      task.execute: {mean: 925, deviation: 249}
      tools.recommend: {mean: 83, deviation: 22}
      mcp.tool.execute: {mean: 356, deviation: 96}
      response.compose: {mean: 530, deviation: 143}
      response.validation: {mean: 17, deviation: 4}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [5, 6, 7]
    start_hour: 18
    end_hour: 23
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation
endusers:
  - id: synthetic_row_051
    vendor.enduser.pseudo.id: user_syn_051
    channel: web
    turns:
      - turn_index: 1
        span_plan: *id001
        vendor.enduser.request.raw: Coffee spilled on my phone during my trip abroad today, please start a claim.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: Coffee spilled on my phone during my trip abroad today, please start a claim.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: 'CLM-7001 opened for device_damage. Ping us with dates when you land.'
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: Coffee spilled on my phone during my trip abroad today, please start a claim.
              vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "new_claim"}]}'
        agent_response: 'CLM-7001 opened for device_damage. Ping us with dates when you land.'
        tool_chain:
          - mcp_server: phone
            tool: new_claim
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 900
        gen_ai.usage.output_tokens: 130
        gentoro.llm.streaming: false
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: phone
            description: Coffee spilled on my phone during my trip abroad today, please start a claim.
            incident_date: '2026-03-20'
        gen_ai.tool.call.result:
          new_claim:
            claim_id: CLM-7001
            product_type: phone
            status: opened
            coverage:
              type: device_damage
              deductible: 75
            notes: Claim created from workload row.
        planner:
          system_prompt: Phone MCP; execute table-defined tool chain.
          output: 'PLAN: new_claim'
        response_compose:
          system_prompt: Return concise customer-facing confirmation in plain language.
