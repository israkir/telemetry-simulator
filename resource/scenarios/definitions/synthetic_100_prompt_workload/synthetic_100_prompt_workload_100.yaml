name: synthetic_100_prompt_workload_100
description: Single-turn synthetic workload scenario row 100.
tags:
  - normal
  - synthetic
  - single-turn
  - B3
tenant: toro
agent: toro-customer-assistant-001
vendor.redaction.applied: none
workload_weight: 2.75
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 11, deviation: 3}
      payload.validation: {mean: 6, deviation: 2}
      policy.validation: {mean: 18, deviation: 5}
      augmentation.validation: {mean: 9, deviation: 2}
      a2a.orchestrate: {mean: 1360, deviation: 299}
      planner: {mean: 505, deviation: 121}
      llm.call: {mean: 428, deviation: 98}
      task.execute: {mean: 800, deviation: 192}
      tools.recommend: {mean: 71, deviation: 21}
      mcp.tool.execute: {mean: 460, deviation: 119}
      response.compose: {mean: 364, deviation: 87}
      response.validation: {mean: 13, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 18, deviation: 4}
      payload.validation: {mean: 9, deviation: 2}
      policy.validation: {mean: 29, deviation: 8}
      augmentation.validation: {mean: 14, deviation: 4}
      a2a.orchestrate: {mean: 2244, deviation: 605}
      planner: {mean: 833, deviation: 224}
      llm.call: {mean: 706, deviation: 190}
      task.execute: {mean: 1320, deviation: 356}
      tools.recommend: {mean: 117, deviation: 31}
      mcp.tool.execute: {mean: 759, deviation: 204}
      response.compose: {mean: 600, deviation: 162}
      response.validation: {mean: 21, deviation: 5}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [6, 7]
    start_hour: 10
    end_hour: 22
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation
endusers:
  - id: synthetic_row_100
    vendor.enduser.pseudo.id: user_syn_100
    channel: web
    turns:
      - turn_index: 1
        span_plan: *id001
        vendor.enduser.request.raw: We looked at phone and appliances earlier - the washer line is what I want. Use quote QT-500 and complete the $12.50/month policy.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: We looked at phone and appliances earlier - the washer line is what I want. Use quote QT-500 and complete the $12.50/month policy.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: "I selected coverage, generated quote QT-500 (monthly premium $12.50), and completed your purchase successfully - your new policy is POL-700 and is now active."
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: We looked at phone and appliances earlier - the washer line is what I want. Use quote QT-500 and complete the $12.50/month policy.
              vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "choose_insurance"}, {"tool_name": "buy_insurance"}, {"tool_name": "pay"}]}'
        agent_response: "I selected coverage, generated quote QT-500 (monthly premium $12.50), and completed your purchase successfully - your new policy is POL-700 and is now active."
        tool_chain:
          - mcp_server: phone
            tool: choose_insurance
          - mcp_server: phone
            tool: buy_insurance
          - mcp_server: phone
            tool: pay
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 900
        gen_ai.usage.output_tokens: 130
        gentoro.llm.streaming: false
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          choose_insurance:
            product_category: appliances
            coverage_tier: standard
            region: NO-01
          buy_insurance:
            quote_id: QT-500
            payment_method: card_on_file
            holder_reference: enduser_0100
          pay:
            payment_target: policy_renewal
            reference_id: POL-700
            amount: 12.5
            currency: EUR
        gen_ai.tool.call.result:
          choose_insurance:
            quote_id: QT-500
            premium_monthly: 12.5
            currency: EUR
            valid_until: '2026-04-01'
          buy_insurance:
            policy_id: POL-700
            quote_id: QT-500
            effective_date: '2026-03-20'
            status: active
          pay:
            payment_id: PAY-400
            reference_id: POL-700
            status: captured
            amount: 12.5
            currency: EUR
        planner:
          system_prompt: Phone MCP; execute table-defined tool chain.
          output: 'PLAN: choose_insurance -> buy_insurance -> pay'
        response_compose:
          system_prompt: Return concise customer-facing confirmation in plain language.
