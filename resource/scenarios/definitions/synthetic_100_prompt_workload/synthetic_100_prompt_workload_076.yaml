name: synthetic_100_prompt_workload_076
description: Single-turn synthetic workload scenario row 76.
tags:
- normal
- synthetic
- single-turn
tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone
vendor.redaction.applied: none
workload_weight: 25.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 2}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 13, deviation: 3}
      augmentation.validation: {mean: 7, deviation: 2}
      a2a.orchestrate: {mean: 1160, deviation: 255}
      planner: {mean: 335, deviation: 80}
      llm.call: {mean: 299, deviation: 68}
      task.execute: {mean: 520, deviation: 124}
      tools.recommend: {mean: 47, deviation: 14}
      mcp.tool.execute: {mean: 200, deviation: 52}
      response.compose: {mean: 298, deviation: 71}
      response.validation: {mean: 10, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 14, deviation: 3}
      payload.validation: {mean: 9, deviation: 2}
      policy.validation: {mean: 23, deviation: 6}
      augmentation.validation: {mean: 12, deviation: 3}
      a2a.orchestrate: {mean: 2122, deviation: 573}
      planner: {mean: 613, deviation: 165}
      llm.call: {mean: 547, deviation: 147}
      task.execute: {mean: 951, deviation: 256}
      tools.recommend: {mean: 86, deviation: 23}
      mcp.tool.execute: {mean: 365, deviation: 98}
      response.compose: {mean: 545, deviation: 147}
      response.validation: {mean: 18, deviation: 4}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [5, 6, 7]
    start_hour: 18
    end_hour: 23
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
    - payload.validation
    - policy.validation
    - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
    - planner
    - task.execute
    - llm.call
    - tools.recommend
    - mcp.tool.execute
    - mcp.tool.execute.attempt
    - response.compose
  cp_response:
    root: response.validation
    children:
    - policy.validation
endusers:
- id: synthetic_row_076
  vendor.enduser.pseudo.id: user_syn_076
  channel: web
  mcp_server: phone
  turns:
  - turn_index: 1
    span_plan: *id001
    vendor.enduser.request.raw: I am comparing providers today \- just give me the phone **Plus** price.
    span_events:
    - target_span_class: request.validation
      name: gentoro.enduser.request
      attributes:
        vendor.enduser.request.raw: I am comparing providers today \- just give me the phone **Plus** price.
    - target_span_class: response.validation
      name: gentoro.agent.response
      attributes:
        vendor.agent.response.raw: Your quote is **QT-500** with a monthly premium of **$12.50**. Purchase is still pending.
    - target_span_class: tools.recommend
      name: gentoro.agent.tool_selection
      attributes:
        vendor.agent.tool_selection.input.raw: I am comparing providers today \- just give me the phone **Plus** price.
        vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "choose_insurance"}]}'
    agent_response: Your quote is **QT-500** with a monthly premium of **$12.50**. Purchase is still pending.
    tool_chain:
    - choose_insurance
    gen_ai.request.type: completion
    gen_ai.response.finish_reason: stop
    gen_ai.usage.input_tokens: 900
    gen_ai.usage.output_tokens: 130
    gentoro.llm.streaming: false
    gentoro.llm.content.capture.enabled: true
    gentoro.llm.content.redaction.enabled: false
    gen_ai.tool.call.arguments:
      choose_insurance:
        product_category: phone
        coverage_tier: plus
        region: NO-01
    gen_ai.tool.call.result:
      choose_insurance:
        quote_id: QT-500
        premium_monthly: 12.5
        currency: EUR
        valid_until: '2026-04-01'
    planner:
      system_prompt: Phone MCP; execute table-defined tool chain.
      output: 'PLAN: choose_insurance'
    response_compose:
      system_prompt: Return concise customer-facing confirmation in plain language.
