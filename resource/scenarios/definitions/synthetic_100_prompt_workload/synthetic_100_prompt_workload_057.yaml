name: synthetic_100_prompt_workload_057
description: Single-turn synthetic workload scenario row 57.
tags:
- normal
- synthetic
- single-turn
tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone
vendor.redaction.applied: none
workload_weight: 17.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 2}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 13, deviation: 3}
      augmentation.validation: {mean: 7, deviation: 2}
      a2a.orchestrate: {mean: 1140, deviation: 250}
      planner: {mean: 335, deviation: 80}
      llm.call: {mean: 301, deviation: 69}
      task.execute: {mean: 620, deviation: 148}
      tools.recommend: {mean: 47, deviation: 14}
      mcp.tool.execute: {mean: 200, deviation: 52}
      response.compose: {mean: 268, deviation: 64}
      response.validation: {mean: 10, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 16, deviation: 4}
      payload.validation: {mean: 10, deviation: 2}
      policy.validation: {mean: 27, deviation: 7}
      augmentation.validation: {mean: 14, deviation: 3}
      a2a.orchestrate: {mean: 2371, deviation: 640}
      planner: {mean: 696, deviation: 188}
      llm.call: {mean: 626, deviation: 169}
      task.execute: {mean: 1289, deviation: 348}
      tools.recommend: {mean: 97, deviation: 26}
      mcp.tool.execute: {mean: 416, deviation: 112}
      response.compose: {mean: 557, deviation: 150}
      response.validation: {mean: 20, deviation: 5}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [5, 6, 7]
    start_hour: 18
    end_hour: 23
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
    - payload.validation
    - policy.validation
    - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
    - planner
    - task.execute
    - llm.call
    - tools.recommend
    - mcp.tool.execute
    - mcp.tool.execute.attempt
    - response.compose
  cp_response:
    root: response.validation
    children:
    - policy.validation
endusers:
- id: synthetic_row_057
  vendor.enduser.pseudo.id: user_syn_057
  channel: web
  mcp_server: phone
  turns:
  - turn_index: 1
    span_plan: *id001
    vendor.enduser.request.raw: "Stolen device\u2014**start claim**, I\u2019m still at the police station queue."
    span_events:
    - target_span_class: request.validation
      name: gentoro.enduser.request
      attributes:
        vendor.enduser.request.raw: "Stolen device\u2014**start claim**, I\u2019m still at the police station queue."
    - target_span_class: response.validation
      name: gentoro.agent.response
      attributes:
        vendor.agent.response.raw: "**CLM-7007** loss **opened**\u2014when you\u2019re free, we\u2019ll pull **phone** slots in a follow\u2011up."
    - target_span_class: tools.recommend
      name: gentoro.agent.tool_selection
      attributes:
        vendor.agent.tool_selection.input.raw: "Stolen device\u2014**start claim**, I\u2019m still at the police station queue."
        vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "new_claim"}]}'
    agent_response: "**CLM-7007** loss **opened**\u2014when you\u2019re free, we\u2019ll pull **phone** slots in a follow\u2011up."
    tool_chain:
    - new_claim
    gen_ai.request.type: completion
    gen_ai.response.finish_reason: stop
    gen_ai.usage.input_tokens: 900
    gen_ai.usage.output_tokens: 130
    gentoro.llm.streaming: false
    gentoro.llm.content.capture.enabled: true
    gentoro.llm.content.redaction.enabled: false
    gen_ai.tool.call.arguments:
      new_claim:
        product_type: phone
        description: "Stolen device\u2014**start claim**, I\u2019m still at the police station queue."
        incident_date: '2026-03-20'
    gen_ai.tool.call.result:
      new_claim:
        claim_id: CLM-7007
        product_type: phone
        status: opened
        coverage:
          type: device_damage
          deductible: 75
        notes: Claim created from workload row.
    planner:
      system_prompt: Phone MCP; execute table-defined tool chain.
      output: 'PLAN: new_claim'
    response_compose:
      system_prompt: Return concise customer-facing confirmation in plain language.
