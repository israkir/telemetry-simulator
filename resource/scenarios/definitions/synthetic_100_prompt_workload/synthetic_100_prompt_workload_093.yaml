name: synthetic_100_prompt_workload_093
description: Single-turn synthetic workload scenario row 93.
tags:
  - normal
  - synthetic
  - single-turn
  - B2
tenant: toro
agent: toro-customer-assistant-001
vendor.redaction.applied: none
workload_weight: 24.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 9, deviation: 2}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 15, deviation: 4}
      augmentation.validation: {mean: 8, deviation: 2}
      a2a.orchestrate: {mean: 1190, deviation: 261}
      planner: {mean: 420, deviation: 100}
      llm.call: {mean: 362, deviation: 83}
      task.execute: {mean: 660, deviation: 158}
      tools.recommend: {mean: 59, deviation: 17}
      mcp.tool.execute: {mean: 330, deviation: 85}
      response.compose: {mean: 316, deviation: 75}
      response.validation: {mean: 11, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 17, deviation: 4}
      payload.validation: {mean: 9, deviation: 2}
      policy.validation: {mean: 28, deviation: 7}
      augmentation.validation: {mean: 15, deviation: 4}
      a2a.orchestrate: {mean: 2261, deviation: 610}
      planner: {mean: 798, deviation: 215}
      llm.call: {mean: 687, deviation: 185}
      task.execute: {mean: 1254, deviation: 338}
      tools.recommend: {mean: 112, deviation: 30}
      mcp.tool.execute: {mean: 627, deviation: 169}
      response.compose: {mean: 600, deviation: 162}
      response.validation: {mean: 20, deviation: 5}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [1, 2, 3, 4, 5]
    start_hour: 7
    end_hour: 10
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation
endusers:
  - id: synthetic_row_093
    vendor.enduser.pseudo.id: user_syn_093
    channel: web
    turns:
      - turn_index: 1
        span_plan: *id001
        vendor.enduser.request.raw: This is just for me on this account - buy phone coverage on QT-520.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: This is just for me on this account - buy phone coverage on QT-520.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: Done. I completed the phone policy purchase from QT-520 and activated POL-700.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: This is just for me on this account - buy phone coverage on QT-520.
              vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "choose_insurance"}, {"tool_name": "buy_insurance"}]}'
        agent_response: Done. I completed the phone policy purchase from QT-520 and activated POL-700.
        tool_chain:
          - mcp_server: phone
            tool: choose_insurance
          - mcp_server: phone
            tool: buy_insurance
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 900
        gen_ai.usage.output_tokens: 130
        gentoro.llm.streaming: false
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          choose_insurance:
            product_category: phone
            coverage_tier: standard
            region: NO-01
          buy_insurance:
            quote_id: QT-520
            payment_method: card_on_file
            holder_reference: enduser_0093
        gen_ai.tool.call.result:
          choose_insurance:
            quote_id: QT-520
            premium_monthly: 12.5
            currency: EUR
            valid_until: '2026-04-01'
          buy_insurance:
            policy_id: POL-700
            quote_id: QT-520
            effective_date: '2026-03-20'
            status: active
        planner:
          system_prompt: Phone MCP; execute table-defined tool chain.
          output: 'PLAN: choose_insurance -> buy_insurance'
        response_compose:
          system_prompt: Return concise customer-facing confirmation in plain language.
