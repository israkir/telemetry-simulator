name: synthetic_100_prompt_workload_094
description: Single-turn synthetic workload scenario row 94.
tags:
  - normal
  - synthetic
  - single-turn
  - B2
tenant: toro
agent: toro-customer-assistant-001
vendor.redaction.applied: none
workload_weight: 24.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 10, deviation: 2}
      payload.validation: {mean: 6, deviation: 2}
      policy.validation: {mean: 16, deviation: 4}
      augmentation.validation: {mean: 8, deviation: 2}
      a2a.orchestrate: {mean: 1330, deviation: 292}
      planner: {mean: 420, deviation: 100}
      llm.call: {mean: 362, deviation: 83}
      task.execute: {mean: 660, deviation: 158}
      tools.recommend: {mean: 59, deviation: 17}
      mcp.tool.execute: {mean: 330, deviation: 85}
      response.compose: {mean: 346, deviation: 83}
      response.validation: {mean: 12, deviation: 3}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 21, deviation: 5}
      payload.validation: {mean: 12, deviation: 3}
      policy.validation: {mean: 34, deviation: 9}
      augmentation.validation: {mean: 17, deviation: 4}
      a2a.orchestrate: {mean: 2832, deviation: 764}
      planner: {mean: 894, deviation: 241}
      llm.call: {mean: 771, deviation: 208}
      task.execute: {mean: 1405, deviation: 379}
      tools.recommend: {mean: 125, deviation: 33}
      mcp.tool.execute: {mean: 702, deviation: 189}
      response.compose: {mean: 736, deviation: 198}
      response.validation: {mean: 25, deviation: 6}
default_latency_profile: normal
workload_schedule:
  peak_hours:
    timezone: America/Los_Angeles
    weekdays: [5, 6, 7]
    start_hour: 18
    end_hour: 23
x_new_claim_span_plan: &id001
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation
endusers:
  - id: synthetic_row_094
    vendor.enduser.pseudo.id: user_syn_094
    channel: web
    turns:
      - turn_index: 1
        span_plan: *id001
        vendor.enduser.request.raw: Please replace my old phone policy by purchasing quote QT-630, then charge $27.40 today.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: Please replace my old phone policy by purchasing quote QT-630, then charge $27.40 today.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: Completed. Your replacement phone policy is now issued as POL-700 and is active. The additional payment charge was not processed in this flow.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: Please replace my old phone policy by purchasing quote QT-630, then charge $27.40 today.
              vendor.agent.tool_selection.tool.plan: '{"tool_plan": [{"tool_name": "choose_insurance"}, {"tool_name": "buy_insurance"}]}'
        agent_response: Completed. Your replacement phone policy is now issued as POL-700 and is active. The additional payment charge was not processed in this flow.
        tool_chain:
          - mcp_server: phone
            tool: choose_insurance
          - mcp_server: phone
            tool: buy_insurance
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 900
        gen_ai.usage.output_tokens: 130
        gentoro.llm.streaming: false
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          choose_insurance:
            product_category: phone
            coverage_tier: standard
            region: NO-01
          buy_insurance:
            quote_id: QT-630
            payment_method: card_on_file
            holder_reference: enduser_0094
        gen_ai.tool.call.result:
          choose_insurance:
            quote_id: QT-630
            premium_monthly: 27.4
            currency: EUR
            valid_until: '2026-04-01'
          buy_insurance:
            policy_id: POL-700
            quote_id: QT-630
            effective_date: '2026-03-20'
            status: active
        planner:
          system_prompt: Phone MCP; execute table-defined tool chain.
          output: 'PLAN: choose_insurance -> buy_insurance'
        response_compose:
          system_prompt: Return concise customer-facing confirmation in plain language.
