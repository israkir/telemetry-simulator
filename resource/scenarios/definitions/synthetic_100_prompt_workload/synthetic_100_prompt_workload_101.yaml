name: synthetic_100_prompt_workload_101
description: Single-turn synthetic workload scenario row 101.
tags:
  - normal
  - synthetic
  - single-turn
  - C2
tenant: toro
agent: toro-customer-assistant-001
vendor.redaction.applied: none
workload_weight: 0.625
endusers:
  - id: synthetic_row_101
    vendor.enduser.pseudo.id: user_syn_101
    channel: web
    turns:
      - turn_index: 1
        vendor.enduser.request.raw: Dropped my Toro phone - corner dent and loose back glass. Start a claim and put pickup on Thursday, April 2, 2026, 10:00 AM PT - that's the window I already chose in the app preview.
        agent_response: 'CLM-8101 opened for impact damage; update_appointment applied directly to Thursday, April 2, 2026, 10:00 AM PT - no separate slot listing step.'
        tool_chain:
          - mcp_server: phone
            tool: new_claim
          - mcp_server: phone
            tool: update_appointment
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: phone
            description: Dropped my Toro phone with corner dent and loose back glass.
            incident_date: '2026-04-01'
          update_appointment:
            claim_id: CLM-8101
            appointment_id: APT-000101
            slot_id: SLOT-2026-04-02T10:00
            preferred_time_window: morning
        gen_ai.tool.call.result:
          new_claim:
            claim_id: CLM-8101
            product_type: phone
            status: opened
            coverage:
              type: device_damage
              deductible: 75
            notes: Claim created from workload row.
          update_appointment:
            claim_id: CLM-8101
            appointment_id: APT-000101
            status: rescheduled
            scheduled_at: '2026-04-02T10:00:00Z'
