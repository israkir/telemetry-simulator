name: multi_phone_repair_slots_book_multiturn
description: >
  Phone screen repair request, two conversation designs. Revamped multiturn path
  follows user intent directly: open repair claim, list earliest slots, and book
  selected appointment.

tags:
  - normal
  - multi_tool_calling

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 3.0
trace_interval_ms: 228
trace_interval_deviation_ms: 50

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 3}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 12, deviation: 5}
      augmentation.validation: {mean: 6, deviation: 2}
      a2a.orchestrate: {mean: 1920, deviation: 380}
      planner: {mean: 480, deviation: 110}
      llm.call: {mean: 600, deviation: 135}
      task.execute: {mean: 660, deviation: 150}
      tools.recommend: {mean: 50, deviation: 16}
      mcp.tool.execute: {mean: 195, deviation: 53}
      response.compose: {mean: 320, deviation: 78}
      response.validation: {mean: 10, deviation: 4}

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_phone_repair_slots_book_multiturn
    vendor.enduser.pseudo.id: "user_mt_ph_repair_01"
    channel: web_chat
    mcp_server: phone
    turns:
      - span_plan: *phone_span_plan
        turn_index: 1
        vendor.enduser.request.raw: "I cracked my phone screen. Can you start a claim
          for a repair?\n\nPlease open a repair claim for this cracked screen and
          show me the earliest slots.\n\nMonday 10:00 works."
