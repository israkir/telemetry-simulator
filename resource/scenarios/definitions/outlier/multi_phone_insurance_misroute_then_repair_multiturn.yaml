              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"new_claim","trigger_summary":"Screen damage repair intake after customer correction.","trigger_quote":"open a repair claim for this cracked screen","missing_info":null,"confidence":0.96,"tool_args":{"product_type":"phone","description":"Cracked screen; customer requests repair visit.","incident_date":"2026-03-22"}},{"tool_name":"get_available_slots","trigger_summary":"Earliest screen_repair_visit slots for new claim.","trigger_quote":"earliest slots","missing_info":null,"confidence":0.93,"tool_args":{"claim_id":"PH-8821","service_type":"screen_repair_visit","date_range_start":"2026-03-24","date_range_end":"2026-03-26"}}]}
        agent_response: >
