            appointment_id: "APT-PH-8821-HOLD"
            slot_id: "SLOT-2026-03-24T10:00"
            preferred_time_window: "morning"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "CLAIM-PH-8821"
            product_type: "phone"
            status: "opened"
            coverage:
              type: "phone_screen_damage"
              deductible: 50
            notes: "Opened from direct repair intent."
          get_available_slots:
