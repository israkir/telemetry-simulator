# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: outlier/multi_phone_insurance_misroute_then_repair_multiturn.yaml
# Endusers: 2 | Conversation threads: 2 | Total user turns: 2
# MCP: phone — (A) misroute then new_claim + get_available_slots + update_appointment; (B) correct: slots then update_appointment
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: multi_phone_insurance_misroute_then_repair_multiturn
description: >
  Phone screen repair request, two conversation designs. Outlier multiturn: assistant
  wrongly sells insurance
  on turn 1; customer corrects on turn 2 with new_claim + get_available_slots. Correct
  counterpart: same
  opening user message handled properly: new_claim + get_available_slots, then update_appointment
  (no insurance tools).

tags:
  - normal
  - outlier
  - multi_tool_calling

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 3.0
trace_interval_ms: 228
trace_interval_deviation_ms: 50

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 3}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 12, deviation: 5}
      augmentation.validation: {mean: 6, deviation: 2}
      a2a.orchestrate: {mean: 1920, deviation: 380}
      planner: {mean: 480, deviation: 110}
      llm.call: {mean: 600, deviation: 135}
      task.execute: {mean: 660, deviation: 150}
      tools.recommend: {mean: 50, deviation: 16}
      mcp.tool.execute: {mean: 195, deviation: 53}
      response.compose: {mean: 320, deviation: 78}
      response.validation: {mean: 10, deviation: 4}

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: multi_phone_insurance_misroute_then_repair_multiturn
    vendor.enduser.pseudo.id: "user_mt_ph_misroute_01"
    channel: web_chat
    mcp_server: phone
    turns:
      - span_plan: *phone_span_plan
        turn_index: 1
        vendor.enduser.request.raw: "I cracked my phone screen. Can you start a claim
          for a repair?\n\nNo TV. I did not ask for insurance — open a repair claim
          for this cracked screen now and show me the earliest slots.\n\nMonday 10:00
          for claim CLAIM-PH-8821 works."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "I cracked my phone screen. Can you start
                a claim for a repair?\n\nNo TV. I did not ask for insurance — open
                a repair claim for this cracked screen now and show me the earliest
                slots.\n\nMonday 10:00 for claim CLAIM-PH-8821 works."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                Monday 10:00 is booked for claim CLAIM-PH-8821 — you’ll get the shop
                arrival details by SMS.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "I cracked my phone screen. Can
                you start a claim for a repair?\n\nNo TV. I did not ask for insurance
                — open a repair claim for this cracked screen now and show me the
                earliest slots.\n\nMonday 10:00 for claim CLAIM-PH-8821 works.\n"
              vendor.agent.tool_selection.tool.plan: "{\"tool_plan\":[{\"tool_name\"\
                :\"choose_insurance\",\"trigger_summary\":\"Bundle quote instead of
                repair intake.\",\"trigger_quote\":\"cracked my phone screen\",\"\
                missing_info\":null,\"confidence\":0.77,\"tool_args\":{\"product_category\"\
                :\"phone\",\"coverage_tier\":\"bundle\",\"region\":\"GB-01\"}},{\"\
                tool_name\":\"buy_insurance\",\"trigger_summary\":\"Bind policy and
                charge first premium.\",\"trigger_quote\":\"start a claim for a repair\"\
                ,\"missing_info\":null,\"confidence\":0.71,\"tool_args\":{\"quote_id\"\
                :\"QT-PH-MIS-441\",\"payment_method\":\"card_on_file\",\"holder_reference\"\
                :\"user_mt_ph_misroute_01\"}},{\"tool_name\":\"new_claim\",\"trigger_summary\"\
                :\"I want to file a claim \\u2014 Screen damage repair intake after
                customer correction.\",\"trigger_quote\":\"open a repair claim for
                this cracked screen\",\"missing_info\":null,\"confidence\":0.96,\"\
                tool_args\":{\"product_type\":\"phone\",\"description\":\"Cracked
                screen; customer requests repair visit.\",\"incident_date\":\"2026-03-22\"\
                }},{\"tool_name\":\"get_available_slots\",\"trigger_summary\":\"Earliest
                screen_repair_visit slots for new claim.\",\"trigger_quote\":\"earliest
                slots\",\"missing_info\":null,\"confidence\":0.93,\"tool_args\":{\"\
                claim_id\":\"CLAIM-PH-8821\",\"service_type\":\"screen_repair_visit\"\
                ,\"date_range_start\":\"2026-03-24\",\"date_range_end\":\"2026-03-26\"\
                }},{\"tool_name\":\"update_appointment\",\"trigger_summary\":\"Book
                Mon 10:00 screen repair from listed slots.\",\"trigger_quote\":\"\
                Monday 10:00\",\"missing_info\":null,\"confidence\":0.93,\"tool_args\"\
                :{\"claim_id\":\"CLAIM-PH-8821\",\"appointment_id\":\"APT-PH-8821-HOLD\"\
                ,\"slot_id\":\"SLOT-2026-03-24T10:00\",\"preferred_time_window\":\"\
                morning\"}}]}\n"
        agent_response: >
          Monday 10:00 is booked for claim CLAIM-PH-8821 — you’ll get the shop arrival
          details by SMS.
        tool_chain:
          - choose_insurance
          - buy_insurance
          - new_claim
          - get_available_slots
          - update_appointment
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 3135
        gen_ai.usage.output_tokens: 517
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 5
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          choose_insurance:
            product_category: "phone"
            coverage_tier: "bundle"
            region: "GB-01"
          buy_insurance:
            quote_id: "QT-PH-MIS-441"
            payment_method: "card_on_file"
            holder_reference: "user_mt_ph_misroute_01"
          new_claim:
