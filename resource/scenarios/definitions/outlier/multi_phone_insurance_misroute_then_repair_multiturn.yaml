        tool_chain: [new_claim, get_available_slots]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1180
        gen_ai.usage.output_tokens: 228
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 2
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "phone"
            description: "Cracked screen; customer requests repair visit."
            incident_date: "2026-03-22"
          get_available_slots:
            claim_id: "PH-8821"
            service_type: "screen_repair_visit"
            date_range_start: "2026-03-24"
            date_range_end: "2026-03-26"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "PH-8821"
            product_type: "phone"
            status: "opened"
            coverage: { type: "phone_screen_damage", deductible: 50 }
            notes: "Opened after customer rejected mistaken insurance upsell path."
          get_available_slots:
            claim_id: "PH-8821"
            slots:
