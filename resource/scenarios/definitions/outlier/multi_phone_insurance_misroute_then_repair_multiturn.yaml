            effective_date: "2026-03-22"
            status: "active"
          new_claim:
            claim_id: "CLAIM-PH-8821"
            product_type: "phone"
            status: "opened"
            coverage:
              type: "phone_screen_damage"
              deductible: 50
            notes: "Opened after customer rejected mistaken insurance upsell path."
          get_available_slots:
            claim_id: "CLAIM-PH-8821"
            slots:
              - slot_id: "SLOT-2026-03-24T10:00"
                duration_minutes: 90
              - slot_id: "SLOT-2026-03-25T14:30"
                duration_minutes: 90
              - slot_id: "SLOT-2026-03-26T09:00"
