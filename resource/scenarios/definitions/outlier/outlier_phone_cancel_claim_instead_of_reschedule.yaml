# File: outlier/outlier_phone_cancel_claim_instead_of_reschedule.yaml
# Endusers: 2 | Conversation threads: 2 | Total user turns: 2
# MCP: phone — (1) outlier: cancel_claim when user only asked to reschedule; (2) correct: get_available_slots then update_appointment afternoon
#
