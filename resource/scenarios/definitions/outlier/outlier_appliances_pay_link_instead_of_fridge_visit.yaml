# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: outlier/outlier_appliances_pay_link_instead_of_fridge_visit.yaml
# Endusers: 2 | Conversation threads: 2 | Total user turns: 2
# MCP: appliances — (1) outlier: pay / balance link instead of claim + visit; (2) correct: new_claim + slots
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: outlier_appliances_pay_link_instead_of_fridge_visit
description: >
  Paired flows for the same user wording (fridge not cooling; start claim and send someone). Outlier:
  assistant runs pay for an unrelated £24 balance on HA-3300 and talks about a payment link. Correct
  counterpart: new_claim for the fridge fault plus get_available_slots for authorized repair visits.

tags:
  - outlier
  - unexpected_behavior

tenant: toro
agent: toro-customer-assistant-001
mcp_server: appliances

vendor.redaction.applied: none

workload_weight: 2.0
trace_interval_ms: 218
trace_interval_deviation_ms: 48

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 8, deviation: 3 }
      payload.validation: { mean: 5, deviation: 2 }
      policy.validation: { mean: 12, deviation: 5 }
      augmentation.validation: { mean: 6, deviation: 2 }
      a2a.orchestrate: { mean: 2080, deviation: 560 }
      planner: { mean: 518, deviation: 150 }
      llm.call: { mean: 638, deviation: 186 }
      task.execute: { mean: 728, deviation: 238 }
      tools.recommend: { mean: 54, deviation: 21 }
      mcp.tool.execute: { mean: 228, deviation: 98 }
      response.compose: { mean: 362, deviation: 111 }
      response.validation: { mean: 10, deviation: 4 }

default_latency_profile: normal

x_appliances_span_plan: &appliances_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: outlier_appliances_pay_link_instead_of_fridge_visit
    vendor.enduser.pseudo.id: "user_outlier_ap_pay_05"
    channel: web_chat
    mcp_server: appliances
    turns:
      - turn_index: 1
        span_plan: *appliances_span_plan
        vendor.enduser.request.raw: >
          My fridge stopped cooling. Please start a claim and arrange someone to come out.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                My fridge stopped cooling. Please start a claim and arrange someone to come out.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                I’ve checked your account and you have an outstanding balance of £24 on order HA-3300. I’ve sent
                you a secure payment link so you can pay now. Once payment is complete, you can check your
                orders in the app.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                My fridge stopped cooling. Please start a claim and arrange someone to come out.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"pay","trigger_summary":"Surface unrelated order balance instead of fridge claim.","trigger_quote":"start a claim and arrange someone","missing_info":null,"confidence":0.74,"tool_args":{"payment_target":"claim_invoice","reference_id":"HA-3300","amount":24.0,"currency":"GBP"}}]}
        agent_response: >
          I’ve checked your account and you have an outstanding balance of £24 on order HA-3300. I’ve sent
          you a secure payment link so you can pay now. Once payment is complete, you can check your
          orders in the app.
        tool_chain: [pay]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 920
        gen_ai.usage.output_tokens: 108
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          pay:
            payment_target: "claim_invoice"
            reference_id: "HA-3300"
            amount: 24.0
            currency: "GBP"
        gen_ai.tool.call.result:
          pay:
            payment_id: "PAY-HA-3300-LINK"
            reference_id: "HA-3300"
            status: "link_sent"
            amount: 24.0
            currency: "GBP"
        planner:
          system_prompt: >
            Appliances MCP misroute: user needs fridge claim + visit; planner issues pay for stale invoice HA-3300.
          output: >
            PLAN: pay claim_invoice HA-3300 — wrong tool vs intake and scheduling request.
        response_compose:
          system_prompt: >
            Balance and payment link narrative; omit new_claim and technician slots.

  - id: correct_fridge_cooling_claim_and_visit_slots
    vendor.enduser.pseudo.id: "user_correct_ap_fridge_05"
    channel: web_chat
    mcp_server: appliances
    turns:
      - turn_index: 1
        span_plan: *appliances_span_plan
        vendor.enduser.request.raw: >
          My fridge stopped cooling. Please start a claim and arrange someone to come out.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                My fridge stopped cooling. Please start a claim and arrange someone to come out.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                I’ve opened a claim for your fridge that has stopped cooling — claim ID HA-9155. I can send a
                technician on Tuesday 09:00–13:00 or Wednesday 14:00–18:00 next week. Which window should I book?
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                My fridge stopped cooling. Please start a claim and arrange someone to come out.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"new_claim","trigger_summary":"Fridge no longer cooling; arrange engineer.","trigger_quote":"fridge stopped cooling","missing_info":null,"confidence":0.95,"tool_args":{"product_type":"fridge","description":"Stopped cooling; food safety risk; customer requests home visit.","incident_date":"2026-03-22"}},{"tool_name":"get_available_slots","trigger_summary":"Authorized repair multi-hour windows after intake.","trigger_quote":"arrange someone to come out","missing_info":null,"confidence":0.93,"tool_args":{"claim_id":"HA-9155","service_type":"authorized_repair_visit","date_range_start":"2026-03-25","date_range_end":"2026-03-26"}}]}
        agent_response: >
          I’ve opened a claim for your fridge that has stopped cooling — claim ID HA-9155. I can send a
          technician on Tuesday 09:00–13:00 or Wednesday 14:00–18:00 next week. Which window should I book?
        tool_chain: [new_claim, get_available_slots]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1100
        gen_ai.usage.output_tokens: 195
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 2
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "fridge"
            description: "Stopped cooling; food safety risk; customer requests home visit."
            incident_date: "2026-03-22"
          get_available_slots:
            claim_id: "HA-9155"
            service_type: "authorized_repair_visit"
            date_range_start: "2026-03-25"
            date_range_end: "2026-03-26"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "HA-9155"
            product_type: "fridge"
            status: "opened"
            coverage: { type: "appliance_cooling_fault", deductible: 40 }
            notes: "Correct path: intake plus two repair windows offered."
          get_available_slots:
            claim_id: "HA-9155"
            slots:
              - { slot_id: "SLOT-2026-03-25T09:00", duration_minutes: 240 }
              - { slot_id: "SLOT-2026-03-26T14:00", duration_minutes: 240 }
            timezone: "Europe/London"
        planner:
          system_prompt: >
            Appliances MCP; fridge cooling failure — new_claim then list authorized_repair_visit slots.
          output: >
            PLAN: new_claim HA-9155; get_available_slots Tue/Wed four-hour windows.
        response_compose:
          system_prompt: >
            Claim id; two technician windows; invite choice — no payment or unrelated orders.
