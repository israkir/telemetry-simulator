# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: outlier/outlier_phone_routed_to_electronics_division.yaml
# Endusers: 2 | Conversation threads: 2 | Total user turns: 2
# MCP: (1) outlier: electronics new_claim for a phone camera issue; (2) correct: phone new_claim + repair slots
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: outlier_phone_routed_to_electronics_division
description: >
  Paired flows for the same user wording (phone camera won’t focus; fix under cover). Outlier: assistant
  opens a home-electronics claim (EV-5510) and discusses TVs/sound/streaming. Correct counterpart: phone MCP
  intake plus get_available_slots for a handset repair visit.

tags:
  - outlier
  - unexpected_behavior

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 1.7
trace_interval_ms: 215
trace_interval_deviation_ms: 48

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 8, deviation: 3 }
      payload.validation: { mean: 5, deviation: 2 }
      policy.validation: { mean: 12, deviation: 5 }
      augmentation.validation: { mean: 6, deviation: 2 }
      a2a.orchestrate: { mean: 1750, deviation: 340 }
      planner: { mean: 445, deviation: 102 }
      llm.call: { mean: 555, deviation: 128 }
      task.execute: { mean: 615, deviation: 142 }
      tools.recommend: { mean: 48, deviation: 15 }
      mcp.tool.execute: { mean: 188, deviation: 51 }
      response.compose: { mean: 305, deviation: 74 }
      response.validation: { mean: 10, deviation: 4 }

default_latency_profile: normal

x_span_plan: &span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: outlier_phone_routed_to_electronics_division
    vendor.enduser.pseudo.id: "user_outlier_div_el_07"
    channel: web_chat
    mcp_server: electronics
    turns:
      - turn_index: 1
        span_plan: *span_plan
        vendor.enduser.request.raw: >
          My phone camera stopped focusing and I need to get it fixed under my cover.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                My phone camera stopped focusing and I need to get it fixed under my cover.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                I’ve started a Home electronics claim for your device; your claim ID is EV-5510. I can help you
                with TVs, sound systems, and streaming devices under this claim. Do you want to add your TV to
                the same claim as well?
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                My phone camera stopped focusing and I need to get it fixed under my cover.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"new_claim","trigger_summary":"Misroute mobile camera fault to electronics catalog.","trigger_quote":"phone camera stopped focusing","missing_info":null,"confidence":0.76,"tool_args":{"product_type":"smartphone","description":"Camera autofocus failure; user cites mobile cover — filed on electronics line.","incident_date":"2026-03-22"}}]}
        agent_response: >
          I’ve started a Home electronics claim for your device; your claim ID is EV-5510. I can help you
          with TVs, sound systems, and streaming devices under this claim. Do you want to add your TV to
          the same claim as well?
        tool_chain: [new_claim]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 910
        gen_ai.usage.output_tokens: 128
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "smartphone"
            description: "Camera autofocus failure; user cites mobile cover — filed on electronics line."
            incident_date: "2026-03-22"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "EV-5510"
            product_type: "smartphone"
            status: "opened"
            coverage: { type: "home_electronics_misc_device", deductible: 60 }
            notes: "Wrong MCP: phone symptom routed through electronics server."
        planner:
          system_prompt: >
            Electronics MCP misroute: user clearly on mobile cover; planner still selects new_claim here.
          output: >
            PLAN: new_claim EV-5510 on electronics — incorrect division vs phone MCP.
        response_compose:
          system_prompt: >
            Home electronics framing; TV/soundbar/streaming upsell — not mobile repair intake.

  - id: correct_phone_camera_claim_and_repair_slots
    vendor.enduser.pseudo.id: "user_correct_div_ph_07"
    channel: web_chat
    mcp_server: phone
    turns:
      - turn_index: 1
        span_plan: *span_plan
        vendor.enduser.request.raw: >
          My phone camera stopped focusing and I need to get it fixed under my cover.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                My phone camera stopped focusing and I need to get it fixed under my cover.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                I’ve opened a phone claim for the camera focus issue — claim ID PH-8890. I can offer repair
                visits on Thursday 10:00, Friday 14:00, or Monday 09:30. Would you like me to book one of
                these, or compare times later?
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                My phone camera stopped focusing and I need to get it fixed under my cover.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"new_claim","trigger_summary":"Handset camera autofocus fault under mobile cover.","trigger_quote":"phone camera stopped focusing","missing_info":null,"confidence":0.95,"tool_args":{"product_type":"phone","description":"Rear camera will not focus; customer requests repair under mobile policy.","incident_date":"2026-03-22"}},{"tool_name":"get_available_slots","trigger_summary":"In-store or service-center style repair slots after intake.","trigger_quote":"get it fixed under my cover","missing_info":null,"confidence":0.92,"tool_args":{"claim_id":"PH-8890","service_type":"screen_repair_visit","date_range_start":"2026-03-27","date_range_end":"2026-03-31"}}]}
        agent_response: >
          I’ve opened a phone claim for the camera focus issue — claim ID PH-8890. I can offer repair
          visits on Thursday 10:00, Friday 14:00, or Monday 09:30. Would you like me to book one of
          these, or compare times later?
        tool_chain: [new_claim, get_available_slots]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1020
        gen_ai.usage.output_tokens: 178
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 2
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "phone"
            description: "Rear camera will not focus; customer requests repair under mobile policy."
            incident_date: "2026-03-22"
          get_available_slots:
            claim_id: "PH-8890"
            service_type: "screen_repair_visit"
            date_range_start: "2026-03-27"
            date_range_end: "2026-03-31"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "PH-8890"
            product_type: "phone"
            status: "opened"
            coverage: { type: "phone_camera_module", deductible: 45 }
            notes: "Correct division: phone MCP for handset camera fault."
          get_available_slots:
            claim_id: "PH-8890"
            slots:
              - { slot_id: "SLOT-2026-03-27T10:00", duration_minutes: 90 }
              - { slot_id: "SLOT-2026-03-28T14:00", duration_minutes: 90 }
              - { slot_id: "SLOT-2026-03-31T09:30", duration_minutes: 90 }
            timezone: "Europe/London"
        planner:
          system_prompt: >
            Phone MCP; mobile camera defect — new_claim then screen_repair_visit slots (service-center path).
          output: >
            PLAN: new_claim PH-8890; get_available_slots end of month window.
        response_compose:
          system_prompt: >
            PH-8890; three repair times; no electronics or TV cross-sell.
