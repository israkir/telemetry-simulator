# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: outlier/outlier_appliances_dishwasher_claim_no_slots_offer.yaml
# Endusers: 2 | Conversation threads: 2 | Total user turns: 2
# MCP: appliances — (1) outlier: new_claim only despite “send someone out”; (2) correct: new_claim + slots
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: outlier_appliances_dishwasher_claim_no_slots_offer
description: >
  Paired flows for the same user wording (dishwasher overflowing; start claim and send someone). Outlier:
  assistant opens HA-9930 and adds urgent notes but never calls get_available_slots. Correct counterpart:
  new_claim plus get_available_slots for authorized repair visits.

tags:
  - outlier
  - unexpected_behavior

tenant: toro
agent: toro-customer-assistant-001
mcp_server: appliances

vendor.redaction.applied: none

workload_weight: 2.0
trace_interval_ms: 220
trace_interval_deviation_ms: 49

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 8, deviation: 3 }
      payload.validation: { mean: 5, deviation: 2 }
      policy.validation: { mean: 12, deviation: 5 }
      augmentation.validation: { mean: 6, deviation: 2 }
      a2a.orchestrate: { mean: 1820, deviation: 520 }
      planner: { mean: 478, deviation: 146 }
      llm.call: { mean: 610, deviation: 178 }
      task.execute: { mean: 700, deviation: 225 }
      tools.recommend: { mean: 53, deviation: 21 }
      mcp.tool.execute: { mean: 224, deviation: 96 }
      response.compose: { mean: 342, deviation: 108 }
      response.validation: { mean: 10, deviation: 4 }

default_latency_profile: normal

x_appliances_span_plan: &appliances_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: outlier_appliances_dishwasher_claim_no_slots_offer
    vendor.enduser.pseudo.id: "user_outlier_ap_noslots_08"
    channel: web_chat
    mcp_server: appliances
    turns:
      - turn_index: 1
        span_plan: *appliances_span_plan
        vendor.enduser.request.raw: >
          My dishwasher is overflowing with water. Please start a claim and send someone out.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                My dishwasher is overflowing with water. Please start a claim and send someone out.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                I’ve opened a claim for your dishwasher overflow. Your claim ID is HA-9930. I’ve added notes
                that water is spilling onto the floor and marked it as urgent. You can view all the details in
                your app.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                My dishwasher is overflowing with water. Please start a claim and send someone out.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"new_claim","trigger_summary":"Dishwasher overflow; urgency notes only.","trigger_quote":"overflowing with water","missing_info":null,"confidence":0.82,"tool_args":{"product_type":"dishwasher","description":"Overflow; water spilling onto floor; customer requests visit.","incident_date":"2026-03-22"}}]}
        agent_response: >
          I’ve opened a claim for your dishwasher overflow. Your claim ID is HA-9930. I’ve added notes
          that water is spilling onto the floor and marked it as urgent. You can view all the details in
          your app.
        tool_chain: [new_claim]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 980
        gen_ai.usage.output_tokens: 118
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "dishwasher"
            description: "Overflow; water spilling onto floor; customer requests visit."
            incident_date: "2026-03-22"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "HA-9930"
            product_type: "dishwasher"
            status: "opened"
            coverage: { type: "appliance_water_leak", deductible: 40 }
            notes: "Urgent flag and floor-water notes only; no technician slots offered in-channel."
        planner:
          system_prompt: >
            Appliances misroute: user asked for someone to attend; planner stops after new_claim HA-9930.
          output: >
            PLAN: new_claim only — missing get_available_slots despite send someone out.
        response_compose:
          system_prompt: >
            Claim id + urgency + app self-serve; omit concrete visit windows.

  - id: correct_dishwasher_overflow_claim_and_visit_slots
    vendor.enduser.pseudo.id: "user_correct_ap_dish_08"
    channel: web_chat
    mcp_server: appliances
    turns:
      - turn_index: 1
        span_plan: *appliances_span_plan
        vendor.enduser.request.raw: >
          My dishwasher is overflowing with water. Please start a claim and send someone out.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                My dishwasher is overflowing with water. Please start a claim and send someone out.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                I’ve opened claim HA-9941 for your overflowing dishwasher and flagged it urgent with floor-water
                notes. I can book a technician on Wednesday 08:00–12:00 or Friday 13:00–17:00 next week. Which
                window should I reserve?
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                My dishwasher is overflowing with water. Please start a claim and send someone out.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"new_claim","trigger_summary":"Dishwasher overflow onto floor; urgent visit.","trigger_quote":"overflowing with water","missing_info":null,"confidence":0.95,"tool_args":{"product_type":"dishwasher","description":"Active overflow; water on floor; urgent authorized repair.","incident_date":"2026-03-22"}},{"tool_name":"get_available_slots","trigger_summary":"Technician windows after intake.","trigger_quote":"send someone out","missing_info":null,"confidence":0.93,"tool_args":{"claim_id":"HA-9941","service_type":"authorized_repair_visit","date_range_start":"2026-03-26","date_range_end":"2026-03-28"}}]}
        agent_response: >
          I’ve opened claim HA-9941 for your overflowing dishwasher and flagged it urgent with floor-water
          notes. I can book a technician on Wednesday 08:00–12:00 or Friday 13:00–17:00 next week. Which
          window should I reserve?
        tool_chain: [new_claim, get_available_slots]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1120
        gen_ai.usage.output_tokens: 198
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 2
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "dishwasher"
            description: "Active overflow; water on floor; urgent authorized repair."
            incident_date: "2026-03-22"
          get_available_slots:
            claim_id: "HA-9941"
            service_type: "authorized_repair_visit"
            date_range_start: "2026-03-26"
            date_range_end: "2026-03-28"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "HA-9941"
            product_type: "dishwasher"
            status: "opened"
            coverage: { type: "appliance_water_leak", deductible: 40 }
            notes: "Correct path: urgent notes plus slots surfaced in reply."
          get_available_slots:
            claim_id: "HA-9941"
            slots:
              - { slot_id: "SLOT-2026-03-26T08:00", duration_minutes: 240 }
              - { slot_id: "SLOT-2026-03-28T13:00", duration_minutes: 240 }
            timezone: "Europe/London"
        planner:
          system_prompt: >
            Appliances MCP; overflow + send someone — new_claim then get_available_slots for HA-9941.
          output: >
            PLAN: new_claim dishwasher; get_available_slots Wed/Fri four-hour windows.
        response_compose:
          system_prompt: >
            HA-9941; urgency; two concrete technician windows; ask which to book.
