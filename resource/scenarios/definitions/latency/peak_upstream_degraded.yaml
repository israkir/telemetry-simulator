# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: latency/peak_upstream_degraded.yaml
# Endusers: 20 | Conversation threads: 20 | Total user turns: 20 (1 per enduser)
# Focus: elevated span durations (peak traffic + slow LLM/MCP upstream) and
# gentoro.higher_latency.* attributes on a2a.orchestrate (see semconv).
#
# Rationale (stressed-path / incident-adjacent, still plausible):
# - Validations grow modestly under load (queueing, CPU contention).
# - llm.call: multi-second tail when provider is throttled or model is heavily loaded.
# - mcp.tool.execute: retries, regional failover, or downstream DB saturation.
# - a2a.orchestrate: full orchestration wall-clock often 8–18 s in bad conditions.
#
# latency_profile_conditions: runner applies the first listed profile that exists
# (see LatencyModel.select_profile); higher_latency_attributes merge onto the
# orchestrate root span.
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: peak_upstream_degraded
description: >
  Twenty independent status-check conversations during peak upstream degradation
  (same latency profile and higher-latency orchestration attributes on every trace).
  User messages reference slow apps, rush hour, and realistic claim follow-ups.

tags:
  - latency
  - degraded
  - peak-hours

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 1.0
trace_interval_ms: 400
trace_interval_deviation_ms: 120
repeat_count: 1

latency_profiles:
  peak_upstream:
    span_durations_ms:
      request.validation: { mean: 14, deviation: 5 }
      payload.validation: { mean: 11, deviation: 4 }
      policy.validation: { mean: 22, deviation: 7 }
      augmentation.validation: { mean: 14, deviation: 5 }
      a2a.orchestrate: { mean: 11200, deviation: 2200 }
      planner: { mean: 780, deviation: 190 }
      llm.call: { mean: 5200, deviation: 1400 }
      task.execute: { mean: 1400, deviation: 350 }
      tools.recommend: { mean: 95, deviation: 32 }
      mcp.tool.execute: { mean: 2400, deviation: 900 }
      response.compose: { mean: 520, deviation: 140 }
      response.validation: { mean: 16, deviation: 6 }

latency_profile_conditions:
  - profile: peak_upstream
    higher_latency_attributes:
      gentoro.higher_latency.condition.keys: "peak_hours,upstream,throttle_policy"
      gentoro.higher_latency.peak_hours.timezone: "Europe/Oslo"
      gentoro.higher_latency.peak_hours.start_hour: 17
      gentoro.higher_latency.peak_hours.end_hour: 20
      gentoro.higher_latency.peak_hours.weekdays: "[1,2,3,4,5]"
      gentoro.higher_latency.condition.throttle_policy: "provider_token_bucket_near_limit"
      gentoro.higher_latency.condition.upstream: "llm_queue_depth_elevated"

default_latency_profile: peak_upstream

x_span_plan: &latency_demo_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

