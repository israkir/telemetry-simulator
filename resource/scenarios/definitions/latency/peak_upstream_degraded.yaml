      - turn_index: 1
        span_plan: *latency_demo_span_plan
        vendor.enduser.request.raw: >
          Status on PH-LAT-9101 please — the app spinner sat there forever during rush hour.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                Status on PH-LAT-9101 please — the app spinner sat there forever during rush hour.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                PH-LAT-9101 is still in review; photos cleared fraud checks. Expect an update SMS overnight.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                Status on PH-LAT-9101 please — the app spinner sat there forever during rush hour.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"claim_status","trigger_summary":"Status for PH-LAT-9101 during evening peak load.","trigger_quote":"PH-LAT-9101","missing_info":null,"confidence":0.94,"tool_args":{"claim_id":"PH-LAT-9101"}}]}
        agent_response: >
          PH-LAT-9101 is still in review; photos cleared fraud checks. Expect an update SMS overnight.
        tool_chain: [claim_status]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 718
        gen_ai.usage.output_tokens: 108
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          claim_status:
            claim_id: "PH-LAT-9101"
        gen_ai.tool.call.result:
          claim_status:
            claim_id: "PH-LAT-9101"
            status: "in_review"
            last_updated: "2026-03-21T18:32:00Z"
            milestones:
              - intake_complete
              - photos_received
              - fraud_checks_passed
        planner:
          system_prompt: >
            Peak-degraded latency: single claim_status; empathize if user mentions slowness.
          output: >
            PLAN: claim_status PH-LAT-9101; reflect current milestone story.
        response_compose:
          system_prompt: >
