name: peak_hours_commuter_spike
description: >
  Weekday commuter-window burst with realistic customer intents (status checks, reschedules,
  uploads, slots, and payment) under elevated queue depth and regional contention.
  This
  scenario is only eligible during configured local peak hours.

tags:
  - latency
  - peak-hours
  - degraded

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 2.4
trace_interval_ms: 360
trace_interval_deviation_ms: 110
repeat_count: 1

workload_schedule:
  peak_hours:
    timezone: "America/Los_Angeles"
    weekdays: [1, 2, 3, 4, 5]
    start_hour: 16
    end_hour: 20

latency_profiles:
  commuter_peak:
    span_durations_ms:
      request.validation: {mean: 13, deviation: 5.2}
      payload.validation: {mean: 10, deviation: 3.8}
      policy.validation: {mean: 20, deviation: 7.5}
      augmentation.validation: {mean: 12, deviation: 4.8}
      a2a.orchestrate: {mean: 9700, deviation: 2400}
      planner: {mean: 700, deviation: 250}
      llm.call: {mean: 4500, deviation: 1450}
      task.execute: {mean: 1260, deviation: 450}
      tools.recommend: {mean: 90, deviation: 35}
      mcp.tool.execute: {mean: 2180, deviation: 1080}
      response.compose: {mean: 520, deviation: 185}
      response.validation: {mean: 17, deviation: 6.5}

latency_profile_conditions:
  - profile: commuter_peak
    higher_latency_attributes:
      gentoro.higher_latency.condition.keys: "peak_hours,commuter_spike,regional_queue"
      gentoro.higher_latency.peak_hours.timezone: "America/Los_Angeles"
      gentoro.higher_latency.peak_hours.start_hour: 16
      gentoro.higher_latency.peak_hours.end_hour: 20
      gentoro.higher_latency.peak_hours.weekdays: "[1,2,3,4,5]"
      gentoro.higher_latency.condition.commuter_spike: "mobile_chat_concurrency_high"
      gentoro.higher_latency.condition.regional_queue: "mcp_worker_queue_depth_elevated"

default_latency_profile: commuter_peak

x_span_plan: &latency_demo_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: peak_commute_01
    vendor.enduser.pseudo.id: "user_peak_commute_01"
    channel: mobile_app
    turns:
      - turn_index: 1
        span_plan: *latency_demo_span_plan
        vendor.enduser.request.raw: >
          Please check where claim CLAIM-PH-LAT-9301 stands.
        agent_response: >
          claim CLAIM-PH-LAT-9301 is in review with an assessor assigned. You will
          get a push update when the decision is posted.
        tool_chain: [claim_status]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 710
        gen_ai.usage.output_tokens: 101
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          claim_status:
            claim_id: "CLAIM-PH-LAT-9301"
        gen_ai.tool.call.result:
          claim_status:
            claim_id: "CLAIM-PH-LAT-9301"
            status: "in_review"
            last_updated: "2026-04-11T16:42:00Z"
            milestones:
              - intake_complete
              - photos_received
              - assessor_assigned
        planner:
          system_prompt: >
            Commuter peak claim_status check for claim CLAIM-PH-LAT-9301.
          output: >
            PLAN: claim_status CLAIM-PH-LAT-9301 and concise reassurance.
        response_compose:
          system_prompt: >
            Keep the answer short.

  - id: peak_commute_02
    vendor.enduser.pseudo.id: "user_peak_commute_02"
    channel: mobile_app
    turns:
      - turn_index: 1
        span_plan: *latency_demo_span_plan
        vendor.enduser.request.raw: >
          Move appointment APT-PH-9302 on claim CLAIM-PH-LAT-9302 to tomorrow after
          6pm — check what’s open and
          take 18:30 if it’s there.
        agent_response: >
          Tomorrow evening shows 18:30 for claim CLAIM-PH-LAT-9302 — APT-PH-9302 is
          rescheduled to that time.
        tool_chain: [get_available_slots, update_appointment]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 780
        gen_ai.usage.output_tokens: 98
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 2
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          get_available_slots:
            claim_id: "CLAIM-PH-LAT-9302"
            service_type: "screen_repair_visit"
            date_range_start: "2026-04-14"
            date_range_end: "2026-04-14"
          update_appointment:
            claim_id: "CLAIM-PH-LAT-9302"
            appointment_id: "APT-PH-9302"
            slot_id: "SLOT-2026-04-14T18:30"
            preferred_time_window: "evening"
        gen_ai.tool.call.result:
          get_available_slots:
            claim_id: "CLAIM-PH-LAT-9302"
            slots:
              - {slot_id: "SLOT-2026-04-14T18:30", duration_minutes: 90}
            timezone: "America/Los_Angeles"
          update_appointment:
            claim_id: "CLAIM-PH-LAT-9302"
            appointment_id: "APT-PH-9302"
            status: "rescheduled"
            scheduled_at: "2026-04-14T18:30:00Z"
        planner:
          system_prompt: >
            Peak-hour: list tomorrow evening slots then reschedule APT-PH-9302 for
            claim CLAIM-PH-LAT-9302.
          output: >
            PLAN: get_available_slots tomorrow evening; update_appointment 18:30.
        response_compose:
          system_prompt: >
            Confirm new date and time explicitly.

  - id: peak_commute_03
    vendor.enduser.pseudo.id: "user_peak_commute_03"
    channel: web_chat
    turns:
      - turn_index: 1
        span_plan: *latency_demo_span_plan
        vendor.enduser.request.raw: >
          Open upload for claim CLAIM-PH-LAT-9303. I can send receipt and two photos.
        agent_response: >
          Upload batch UPL-CLAIM-PH-LAT-9303 is ready for three files. Submit them
          and I will attach them to your case.
        tool_chain: [upload_documents]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 705
        gen_ai.usage.output_tokens: 97
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          upload_documents:
            claim_id: "CLAIM-PH-LAT-9303"
            document_types: ["photo_damage", "proof_of_purchase"]
            expected_count: 3
        gen_ai.tool.call.result:
          upload_documents:
            claim_id: "CLAIM-PH-LAT-9303"
            upload_batch_id: "UPL-CLAIM-PH-LAT-9303"
            pending_count: 3
            status: "pending"
        planner:
          system_prompt: >
            Commuter-window upload initiation for claim CLAIM-PH-LAT-9303.
          output: >
            PLAN: upload_documents with expected_count 3.
        response_compose:
          system_prompt: >
            Prioritize quick completion guidance.

  - id: peak_commute_04
    vendor.enduser.pseudo.id: "user_peak_commute_04"
    channel: mobile_app
    turns:
      - span_plan: *latency_demo_span_plan
        turn_index: 1
        vendor.enduser.request.raw: "Show available pickup slots for claim CLAIM-PH-LAT-9304
          this week, earliest evening slots first.\n\nPut me on Tuesday evening for
          claim CLAIM-PH-LAT-9304 — I don’t mind exactly when."
        agent_response: >
          I need a slot id or a specific hour — “Tuesday evening” alone isn’t enough
          to book pickup.
        tool_chain:
          - get_available_slots
          - update_appointment
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1320
        gen_ai.usage.output_tokens: 152
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 2
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          get_available_slots:
            claim_id: "CLAIM-PH-LAT-9304"
            service_type: "repair_collection"
            date_range_start: "2026-04-14"
            date_range_end: "2026-04-18"
          update_appointment:
            claim_id: "CLAIM-PH-LAT-9304"
            appointment_id: "APT-PH-LAT-9304-HOLD"
            preferred_time_window: "evening"
            scheduling_time_resolution: "ambiguous_day_part"
        gen_ai.tool.call.result:
          get_available_slots:
            claim_id: "CLAIM-PH-LAT-9304"
            slots:
              - slot_id: "SLOT-2026-04-15T18:00"
                duration_minutes: 120
              - slot_id: "SLOT-2026-04-17T18:30"
                duration_minutes: 120
            timezone: "America/Los_Angeles"
          update_appointment:
            claim_id: "CLAIM-PH-LAT-9304"
            appointment_id: "APT-PH-LAT-9304-HOLD"
            status: "error"
            scheduled_at: ""
            error_code: "ambiguous_scheduling_time"
            error_message: "slot_id required when only ambiguous day-part is provided"
        planner:
          system_prompt: "Peak-hour slot retrieval for claim CLAIM-PH-LAT-9304 with
            evening preference.\n\nPeak hour: update_appointment rejects vague evening
            without slot for claim CLAIM-PH-LAT-9304."
          output: "PLAN: get_available_slots and rank evening options first.\n\nPLAN:
            invalid_arguments; prompt user to pick SLOT-* from prior turn."
        response_compose:
          system_prompt: "Return top two options only.\n\nShort, practical; name the
            two listed times if needed."
        mcp_tool_retries:
          update_appointment:
            attempts:
              - outcome: fail
                error.type: invalid_arguments
  - id: peak_commute_05
    vendor.enduser.pseudo.id: "user_peak_commute_05"
    channel: voice
    turns:
      - turn_index: 1
        span_plan: *latency_demo_span_plan
        vendor.enduser.request.raw: >
          I want to submit payment of 75 euros for claim CLAIM-PH-LAT-9305 right now.
        agent_response: >
          EUR 75.00 has been captured for claim CLAIM-PH-LAT-9305 with payment reference
          PAY-PH-LAT-9305.
        tool_chain: [pay]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 680
        gen_ai.usage.output_tokens: 82
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          pay:
            payment_target: "excess"
            reference_id: "CLAIM-PH-LAT-9305"
            amount: 75.0
            currency: "EUR"
        gen_ai.tool.call.result:
          pay:
            payment_id: "PAY-PH-LAT-9305"
            reference_id: "CLAIM-PH-LAT-9305"
            status: "captured"
            amount: 75.0
            currency: "EUR"
        planner:
          system_prompt: >
            Commuter-window payment flow for claim CLAIM-PH-LAT-9305.
          output: >
            PLAN: submit payment and return payment confirmation.
        response_compose:
          system_prompt: >
            Read amount and payment reference clearly.

  - id: peak_commute_06
    vendor.enduser.pseudo.id: "user_peak_commute_06"
    channel: web
    turns:
      - turn_index: 1
        span_plan: *latency_demo_span_plan
        vendor.enduser.request.raw: >
          Duplicate claim CLAIM-PH-LAT-9306 should be cancelled, keep the newer filing
          active.
        agent_response: >
          claim CLAIM-PH-LAT-9306 has been cancelled as duplicate. Your newer filing
          remains active.
        tool_chain: [cancel_claim]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 700
        gen_ai.usage.output_tokens: 83
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          cancel_claim:
            claim_id: "CLAIM-PH-LAT-9306"
            reason: "duplicate_submission"
        gen_ai.tool.call.result:
          cancel_claim:
            claim_id: "CLAIM-PH-LAT-9306"
            status: "cancelled"
            cancelled_at: "2026-04-11T17:36:00Z"
        planner:
          system_prompt: >
            Peak-hour duplicate cleanup flow for claim CLAIM-PH-LAT-9306.
          output: >
            PLAN: cancel_claim with duplicate_submission reason.
        response_compose:
          system_prompt: >
            Confirm cancellation and active-claim continuity.
