name: peak_hours_commuter_spike
description: >
  Weekday commuter-window burst with realistic customer intents (status checks, reschedules,
  uploads, slots, and payment) under elevated queue depth and regional contention. This
  scenario is only eligible during configured local peak hours.

tags:
  - latency
  - peak-hours
  - degraded

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 2.4
trace_interval_ms: 360
trace_interval_deviation_ms: 110
repeat_count: 1

workload_schedule:
  peak_hours:
    timezone: "America/Los_Angeles"
    weekdays: [1, 2, 3, 4, 5]
    start_hour: 16
    end_hour: 20

latency_profiles:
  commuter_peak:
    span_durations_ms:
      request.validation: { mean: 12, deviation: 4.5 }
      payload.validation: { mean: 9, deviation: 3.0 }
      policy.validation: { mean: 18, deviation: 6.0 }
      augmentation.validation: { mean: 11, deviation: 4.0 }
      a2a.orchestrate: { mean: 8900, deviation: 1700 }
      planner: { mean: 640, deviation: 170 }
      llm.call: { mean: 4100, deviation: 980 }
      task.execute: { mean: 1100, deviation: 300 }
      tools.recommend: { mean: 82, deviation: 28 }
      mcp.tool.execute: { mean: 1850, deviation: 760 }
      response.compose: { mean: 460, deviation: 130 }
      response.validation: { mean: 15, deviation: 5 }

latency_profile_conditions:
  - profile: commuter_peak
    higher_latency_attributes:
      gentoro.higher_latency.condition.keys: "peak_hours,commuter_spike,regional_queue"
      gentoro.higher_latency.peak_hours.timezone: "America/Los_Angeles"
      gentoro.higher_latency.peak_hours.start_hour: 16
      gentoro.higher_latency.peak_hours.end_hour: 20
      gentoro.higher_latency.peak_hours.weekdays: "[1,2,3,4,5]"
      gentoro.higher_latency.condition.commuter_spike: "mobile_chat_concurrency_high"
      gentoro.higher_latency.condition.regional_queue: "mcp_worker_queue_depth_elevated"

default_latency_profile: commuter_peak

x_span_plan: &latency_demo_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: peak_commute_01
    vendor.enduser.pseudo.id: "user_peak_commute_01"
    channel: mobile_app
    turns:
      - turn_index: 1
        span_plan: *latency_demo_span_plan
        vendor.enduser.request.raw: >
          Train is leaving in ten minutes, please check where claim PH-LAT-9301 stands.
        agent_response: >
          PH-LAT-9301 is in review with an assessor assigned. You will get a push update when the decision is posted.
        tool_chain: [claim_status]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 710
        gen_ai.usage.output_tokens: 101
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          claim_status:
            claim_id: "PH-LAT-9301"
        gen_ai.tool.call.result:
          claim_status:
            claim_id: "PH-LAT-9301"
            status: "in_review"
            last_updated: "2026-04-11T16:42:00Z"
            milestones:
              - intake_complete
              - photos_received
              - assessor_assigned
        planner:
          system_prompt: >
            Commuter peak claim_status check for PH-LAT-9301.
          output: >
            PLAN: claim_status PH-LAT-9301 and concise reassurance.
        response_compose:
          system_prompt: >
            Keep answer short for a commuting user.

  - id: peak_commute_02
    vendor.enduser.pseudo.id: "user_peak_commute_02"
    channel: mobile_app
    turns:
      - turn_index: 1
        span_plan: *latency_demo_span_plan
        vendor.enduser.request.raw: >
          Move appointment APT-PH-9302 on claim PH-LAT-9302 to tomorrow after 6pm.
        agent_response: >
          APT-PH-9302 is rescheduled to tomorrow at 18:30 for PH-LAT-9302.
        tool_chain: [update_appointment]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 730
        gen_ai.usage.output_tokens: 89
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          update_appointment:
            claim_id: "PH-LAT-9302"
            appointment_id: "APT-PH-9302"
            slot_id: "SLOT-2026-04-14T18:30"
            preferred_time_window: "evening"
        gen_ai.tool.call.result:
          update_appointment:
            claim_id: "PH-LAT-9302"
            appointment_id: "APT-PH-9302"
            status: "rescheduled"
            scheduled_at: "2026-04-14T18:30:00Z"
        planner:
          system_prompt: >
            Peak-hour appointment reschedule for PH-LAT-9302.
          output: >
            PLAN: update_appointment with evening slot.
        response_compose:
          system_prompt: >
            Confirm new date and time explicitly.

  - id: peak_commute_03
    vendor.enduser.pseudo.id: "user_peak_commute_03"
    channel: web_chat
    turns:
      - turn_index: 1
        span_plan: *latency_demo_span_plan
        vendor.enduser.request.raw: >
          Open upload for PH-LAT-9303, I can send receipt and two photos before boarding.
        agent_response: >
          Upload batch UPL-PH-LAT-9303 is ready for three files. Submit them and I will attach them to your case.
        tool_chain: [upload_documents]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 705
        gen_ai.usage.output_tokens: 97
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          upload_documents:
            claim_id: "PH-LAT-9303"
            document_types: ["photo_damage", "proof_of_purchase"]
            expected_count: 3
        gen_ai.tool.call.result:
          upload_documents:
            claim_id: "PH-LAT-9303"
            upload_batch_id: "UPL-PH-LAT-9303"
            pending_count: 3
            status: "pending"
        planner:
          system_prompt: >
            Commuter-window upload initiation for PH-LAT-9303.
          output: >
            PLAN: upload_documents with expected_count 3.
        response_compose:
          system_prompt: >
            Prioritize quick completion guidance.

  - id: peak_commute_04
    vendor.enduser.pseudo.id: "user_peak_commute_04"
    channel: mobile_app
    turns:
      - turn_index: 1
        span_plan: *latency_demo_span_plan
        vendor.enduser.request.raw: >
          Show available pickup slots for PH-LAT-9304 this week, earliest evening slots first.
        agent_response: >
          Earliest evening windows for PH-LAT-9304 are Tue 18:00 and Thu 18:30.
        tool_chain: [get_available_slots]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 720
        gen_ai.usage.output_tokens: 86
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          get_available_slots:
            claim_id: "PH-LAT-9304"
            service_type: "repair_collection"
            date_range_start: "2026-04-14"
            date_range_end: "2026-04-18"
        gen_ai.tool.call.result:
          get_available_slots:
            claim_id: "PH-LAT-9304"
            slots:
              - { slot_id: "SLOT-2026-04-15T18:00", duration_minutes: 120 }
              - { slot_id: "SLOT-2026-04-17T18:30", duration_minutes: 120 }
            timezone: "America/Los_Angeles"
        planner:
          system_prompt: >
            Peak-hour slot retrieval for PH-LAT-9304 with evening preference.
          output: >
            PLAN: get_available_slots and rank evening options first.
        response_compose:
          system_prompt: >
            Return top two options only.

  - id: peak_commute_05
    vendor.enduser.pseudo.id: "user_peak_commute_05"
    channel: voice
    turns:
      - turn_index: 1
        span_plan: *latency_demo_span_plan
        vendor.enduser.request.raw: >
          Please collect the 75 euro excess for PH-LAT-9305 right now.
        agent_response: >
          EUR 75.00 has been captured for PH-LAT-9305 with payment reference PAY-PH-LAT-9305.
        tool_chain: [pay]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 680
        gen_ai.usage.output_tokens: 82
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          pay:
            payment_target: "excess"
            reference_id: "PH-LAT-9305"
            amount: 75.0
            currency: "EUR"
        gen_ai.tool.call.result:
          pay:
            payment_id: "PAY-PH-LAT-9305"
            reference_id: "PH-LAT-9305"
            status: "captured"
            amount: 75.0
            currency: "EUR"
        planner:
          system_prompt: >
            Commuter-window payment flow for PH-LAT-9305.
          output: >
            PLAN: pay excess and return payment confirmation.
        response_compose:
          system_prompt: >
            Read amount and payment reference clearly.

  - id: peak_commute_06
    vendor.enduser.pseudo.id: "user_peak_commute_06"
    channel: web
    turns:
      - turn_index: 1
        span_plan: *latency_demo_span_plan
        vendor.enduser.request.raw: >
          Duplicate claim PH-LAT-9306 should be cancelled, keep the newer filing active.
        agent_response: >
          PH-LAT-9306 has been cancelled as duplicate. Your newer filing remains active.
        tool_chain: [cancel_claim]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 700
        gen_ai.usage.output_tokens: 83
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          cancel_claim:
            claim_id: "PH-LAT-9306"
            reason: "duplicate_submission"
        gen_ai.tool.call.result:
          cancel_claim:
            claim_id: "PH-LAT-9306"
            status: "cancelled"
            cancelled_at: "2026-04-11T17:36:00Z"
        planner:
          system_prompt: >
            Peak-hour duplicate cleanup flow for PH-LAT-9306.
          output: >
            PLAN: cancel_claim with duplicate_submission reason.
        response_compose:
          system_prompt: >
            Confirm cancellation and active-claim continuity.
