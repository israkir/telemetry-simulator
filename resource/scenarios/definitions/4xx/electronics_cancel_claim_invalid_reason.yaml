# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: 4xx/electronics_cancel_claim_invalid_reason.yaml
# Endusers: 1 | Turns: 1
# Story: Agent selects cancel_claim on electronics MCP but supplies an empty cancellation
# reason; MCP rejects the call with HTTP 400 (invalid arguments).
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: electronics_cancel_claim_invalid_reason
description: >
  Full data-plane turn: LLM issues cancel_claim on electronics with an empty cancellation
  reason (invalid upstream). Traces record 400-style rejection on the MCP attempt; the
  agent reply to the end user stays non-technical (no MCP, HTTP, or internal codes).

tags:
  - 4xx
  - client-error
  - mcp
  - electronics
  - cancel-claim

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 1.0
trace_interval_ms: 220
trace_interval_deviation_ms: 45
repeat_count: 1

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 8, deviation: 3 }
      payload.validation: { mean: 5, deviation: 2 }
      policy.validation: { mean: 12, deviation: 5 }
      augmentation.validation: { mean: 6, deviation: 2 }
      a2a.orchestrate: { mean: 2100, deviation: 380 }
      planner: { mean: 340, deviation: 85 }
      llm.call: { mean: 620, deviation: 140 }
      task.execute: { mean: 520, deviation: 120 }
      tools.recommend: { mean: 48, deviation: 16 }
      mcp.tool.execute: { mean: 95, deviation: 35 }
      response.compose: { mean: 260, deviation: 70 }
      response.validation: { mean: 10, deviation: 4 }

default_latency_profile: normal

x_span_plan: &full_dp_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: eu_el_cancel_4xx_01
    vendor.enduser.pseudo.id: "user_el_cancel_4xx_01"
    channel: web_chat
    mcp_server: electronics
    turns:
      - turn_index: 1
        span_plan: *full_dp_span_plan
        vendor.enduser.request.raw: >
          Please cancel my soundbar claim CLAIM-EL-9333 — I do not need the repair anymore. Use whatever
          reason code is fastest; I just need it gone today.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                Please cancel my soundbar claim CLAIM-EL-9333 — I do not need the repair anymore. Use whatever
                reason code is fastest; I just need it gone today.
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                I was not able to cancel claim CLAIM-EL-9333 yet. I still need a short, plain reason from you
                — for example that you sold the soundbar or you no longer want the repair. Once you say
                which applies, I will try again right away.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                Please cancel my soundbar claim CLAIM-EL-9333 — I do not need the repair anymore. Use whatever
                reason code is fastest; I just need it gone today.
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan":[{"tool_name":"cancel_claim","trigger_summary":"User wants claim CLAIM-EL-9333 cancelled urgently.","trigger_quote":"cancel my soundbar claim CLAIM-EL-9333","missing_info":null,"confidence":0.9,"tool_args":{"claim_id":"CLAIM-EL-9333","reason":""}}]}
          - target_span_class: mcp.tool.execute
            name: gentoro.mcp.tool.call.failed
            attributes:
              vendor.step.outcome: fail
              error.type: invalid_arguments
          - target_span_class: mcp.tool.execute.attempt
            name: gentoro.mcp.tool.call.rejected
            attributes:
              vendor.mcp.attempt.outcome: fail
              error.type: invalid_arguments
              vendor.block.http.status_code: 400
              vendor.block.http.error_type: bad_request
        agent_response: >
          I was not able to cancel claim CLAIM-EL-9333 yet. I still need a short, plain reason from you
          — for example that you sold the soundbar or you no longer want the repair. Once you say
          which applies, I will try again right away.
        tool_chain: [cancel_claim]
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 780
        gen_ai.usage.output_tokens: 118
        gentoro.llm.streaming: false
        gentoro.llm.turn.count: 1
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          cancel_claim:
            claim_id: "CLAIM-EL-9333"
            reason: ""
        gen_ai.tool.call.result:
          cancel_claim:
            claim_id: "CLAIM-EL-9333"
            status: "rejected"
            cancelled_at: "2026-03-22T10:00:00Z"
        planner:
          system_prompt: >
            Electronics MCP: user wants claim CLAIM-EL-9333 cancelled; tool cancel_claim.
          output: >
            PLAN: cancel_claim for claim CLAIM-EL-9333; user asked for fastest reason — map to policy reason code.
        response_compose:
          system_prompt: >
            If cancellation did not go through, speak in everyday language only: no MCP, APIs,
            status codes, or internal reason labels. Ask the customer for a simple stated reason
            and reassure them you will retry.
