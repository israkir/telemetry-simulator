# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: 4xx/http_403_forbidden.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 1
# Interaction model: ingress passes payload; authorization / scope policy returns 403
# MCP / tools: none (control-plane short-circuit before data plane)
#
# Simulates HTTP 403 Forbidden: OAuth client or API credential is valid but not allowed
# to invoke the configured agent (scope / tenant binding mismatch).
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: http_403_forbidden
description: >
  Request reaches payload validation successfully, then policy evaluation denies access:
  client application lacks scope for the target agent — surfaced as HTTP 403 Forbidden
  (4xx client error, distinct from 400 validation and 429 rate limit).

tags:
  - 4xx
  - client-error
  - control-plane
  - blocked
  - forbidden

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 1.0
trace_interval_ms: 200
trace_interval_deviation_ms: 25
repeat_count: 1

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 36, deviation: 12 }
      payload.validation: { mean: 22, deviation: 9 }
      policy.validation: { mean: 55, deviation: 22 }

default_latency_profile: normal

endusers:
  - id: user_4xx_403
    vendor.enduser.pseudo.id: "user_4xx_forbidden_01"
    channel: web_chat
    turns:
      - turn_index: 1
        span_plan:
          cp_request:
            root: request.validation
            children:
              - payload.validation
              - policy.validation
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                Open a screen crack claim for my phone — our integration test client is calling
                toro-customer-assistant-001 but only has read-only scope.
          - target_span_class: request.validation
            name: gentoro.request.blocked
            attributes:
              vendor.request.outcome: blocked
              vendor.block.reason: request_policy
              vendor.block.stage: policy_validation
              vendor.block.http.status_code: 403
              vendor.block.http.error_type: forbidden
          - target_span_class: payload.validation
            name: gentoro.validation.payload.result
            attributes:
              vendor.step.outcome: pass
              vendor.validation.result: valid
          - target_span_class: policy.validation
            name: gentoro.validation.policy.decision
            attributes:
              vendor.step.outcome: fail
              vendor.policy.engine: abac
              vendor.policy.decision: block
              vendor.policy.rule.id: client_scope_agent_mismatch
              vendor.policy.reason: insufficient_client_scope
              vendor.policy.severity: medium
        vendor.enduser.request.raw: >
          Open a screen crack claim for my phone — our integration test client is calling
          toro-customer-assistant-001 but only has read-only scope.
