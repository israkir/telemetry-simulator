name: outlier_no_slots_offered_appliances
description: >
  Outlier: user asks for a dishwasher claim and a visit, but the assistant
  creates the claim and uploads internal notes without ever offering
  appointment slots. Tool chain is new_claim → upload_documents — no
  get_available_slots or update_appointment.

tags:
  - data-plane
  - outlier
  - clustering
  - agent-confusion

workload_weight: 1.2
redaction_applied: none

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: appliances
  tools:
    - new_claim
    - upload_documents
  tool_call_arguments:
    new_claim:
      product_type: "appliance"
      description: "Dishwasher overflowing with water onto floor"
      incident_date: "2025-03-10"
    upload_documents:
      claim_id: "HA-9930"
      document_type: "internal_notes"
      file_names:
        - "urgency_note.txt"
  tool_call_results:
    new_claim:
      claim_id: "HA-9930"
      product_type: "appliance"
      status: "opened"
      coverage:
        type: "appliance_water_damage"
        deductible: 150
      notes: "Claim created for dishwasher overflow — marked urgent."
    upload_documents:
      claim_id: "HA-9930"
      uploaded_count: 1
      status: "attached"

conversation:
  external:
    user_input: "My dishwasher is overflowing with water. Please start a claim and send someone out."
    agent_response: "I've opened a claim for your dishwasher overflow. Your claim ID is HA-9930. I've added notes that water is spilling onto the floor and marked it as urgent. You can view all the details in your app."

data_plane:
  workflow: new_claim
  goal: outlier_incomplete_flow
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        about a dishwasher overflow and decide how far to progress the claim
        using the appliances tools available.
      output: >
        PLAN:
          1) Call "new_claim" on server "appliances" with product_type=appliance,
             description of overflow. Mark as urgent.
          2) Call "upload_documents" to attach internal urgency notes.
          3) Do not call get_available_slots or update_appointment.
    - role: summarizer
      system_prompt: >
        Confirm the claim and urgency notes to the user, without offering
        any appointment slots or booking a visit.
