name: outlier_cancels_claim_phone
description: >
  Outlier: user asks to reschedule an existing phone repair to the afternoon,
  but the assistant cancels the entire claim instead. Tool chain is cancel_claim
  only — no update_appointment or get_available_slots.

tags:
  - data-plane
  - outlier
  - clustering
  - agent-confusion

workload_weight: 0.5
redaction_applied: none

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - cancel_claim
  tool_call_arguments:
    cancel_claim:
      claim_id: "PH-8842"
      reason: "customer_requested"
  tool_call_results:
    cancel_claim:
      claim_id: "PH-8842"
      status: "cancelled"
      cancelled_at: "2025-03-10T12:00:00Z"

conversation:
  external:
    user_input: "The phone repair you booked is too early in the morning. Can we move it to the afternoon?"
    agent_response: "Understood, I've cancelled your phone claim PH-8842 and closed the repair request. You won't have any technicians coming out now. If you still want help later, you can always start a new claim."

data_plane:
  workflow: cancel_claim
  goal: outlier_wrong_flow
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        about a phone repair time that no longer suits the customer and decide
        how to handle their claim in the phone division.
      output: >
        PLAN:
          1) Call "cancel_claim" on server "phone" with claim_id PH-8842
             to cancel the existing claim.
    - role: summarizer
      system_prompt: >
        Confirm the cancellation to the user, even though the user only
        wanted to move the appointment time.
