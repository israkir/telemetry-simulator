name: single_turn_new_claim_appliances
description: >
  Single-turn chained tool flow for Home appliances division: planner → LLM task →
  tool recommendation → new_claim → get_available_slots → update_appointment →
  response_compose, all in one trace.

tags:
  - data-plane
  - happy-path
  - clustering

workload_weight: 4.0
redaction_applied: none

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: appliances
  tools:
    - new_claim
    - get_available_slots
    - update_appointment
  tool_call_arguments:
    new_claim:
      product_type: "appliance"
      description: "Dishwasher is leaking during the wash cycle"
      incident_date: "2025-03-10"
    get_available_slots:
      claim_id: "HA-7733"
      from_date: "2025-03-12"
      to_date: "2025-03-20"
    update_appointment:
      claim_id: "HA-7733"
      slot: "2025-03-13T10:00:00Z"
      reason: "initial_booking"
  tool_call_results:
    new_claim:
      claim_id: "HA-7733"
      product_type: "appliance"
      status: "opened"
      coverage:
        type: "appliance_water_damage"
        deductible: 150
      notes: "Claim created for leaking dishwasher during wash cycle."
    get_available_slots:
      claim_id: "HA-7733"
      timezone: "UTC"
      slots:
        - start: "2025-03-13T10:00:00Z"
          end: "2025-03-13T14:00:00Z"
          status: "available"
        - start: "2025-03-14T09:00:00Z"
          end: "2025-03-14T13:00:00Z"
          status: "available"
    update_appointment:
      claim_id: "HA-7733"
      appointment:
        start: "2025-03-13T10:00:00Z"
        end: "2025-03-13T14:00:00Z"
        status: "booked"
      confirmation_id: "HA-7733-APT-1"
      reason: "initial_booking"

conversation:
  external:
    user_input: "My dishwasher is leaking — open a claim and, if possible, book the Thursday 10–2 slot."
    agent_response: "I’ve started a claim for your leaking dishwasher. Your claim ID is HA-7733. The Thursday 10–2 window is available, so I’ve booked a technician visit in that slot. You’ll receive a confirmation shortly."

data_plane:
  workflow: single_turn_new_claim_chain
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        and produce a tool plan for starting a home appliances claim, finding
        available technician slots, and booking an appointment.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "appliances" with arguments from the external request
             (product_type=appliance, incident_description, incident_date).
          2) Call MCP tool "get_available_slots" to fetch repair slots for the created claim.
          3) Call MCP tool "update_appointment" to book the slot closest to the requested time.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of all tool calls into a final response for the end user.

