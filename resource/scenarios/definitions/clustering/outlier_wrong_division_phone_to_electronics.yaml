name: outlier_wrong_division_phone_to_electronics
description: >
  Outlier: user has a phone camera issue but the assistant routes it to the
  Home electronics division. Tool chain is new_claim on the electronics server
  instead of phone — wrong claim ID prefix (EV- instead of PH-) and wrong
  division context end-to-end.

tags:
  - data-plane
  - outlier
  - clustering
  - wrong-division
  - agent-confusion

workload_weight: 1.2
redaction_applied: none

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: electronics
  tools:
    - new_claim
    - get_available_slots
  tool_call_arguments:
    new_claim:
      product_type: "electronics"
      description: "Phone camera stopped focusing"
      incident_date: "2025-03-10"
    get_available_slots:
      claim_id: "EV-5510"
      from_date: "2025-03-12"
      to_date: "2025-03-20"
  tool_call_results:
    new_claim:
      claim_id: "EV-5510"
      product_type: "electronics"
      status: "opened"
      coverage:
        type: "electronics_repair"
        deductible: 100
      notes: "Claim created for phone camera on electronics server — wrong division."
    get_available_slots:
      claim_id: "EV-5510"
      timezone: "UTC"
      slots:
        - start: "2025-03-12T10:00:00Z"
          end: "2025-03-12T12:00:00Z"
          status: "available"
        - start: "2025-03-13T14:00:00Z"
          end: "2025-03-13T16:00:00Z"
          status: "available"

scenario_overrides:
  wrong_division_target: electronics
  intended_division: phone

conversation:
  external:
    user_input: "My phone camera stopped focusing and I need to get it fixed under my cover."
    agent_response: "I've started a Home electronics claim for your device; your claim ID is EV-5510. I can help you with TVs, sound systems, and streaming devices under this claim. Do you want to add your TV to the same claim as well?"

data_plane:
  workflow: new_claim
  goal: wrong_division
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        about a phone camera issue and decide which division and tools to use
        to progress the customer's claim.
      output: >
        PLAN:
          1) Call "new_claim" on server "electronics" (wrong — should be
             "phone") with product_type=electronics for a phone camera issue.
          2) Call "get_available_slots" on the electronics claim.
    - role: summarizer
      system_prompt: >
        Summarize the result referencing the electronics claim, even though
        the device is a phone.
