name: multi_turn_new_claim_appliances_washer_same_day
description: >
  Multi-turn appliances claim variant: washing machine won't spin.
  User asks about same-day availability and books an evening window.
  Two traces in one session.

tags:
  - data-plane
  - multi-turn
  - happy-path
  - clustering

workload_weight: 1.5
redaction_applied: none

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: appliances
  tools:
    - new_claim
    - get_available_slots
    - update_appointment
  tool_call_arguments:
    new_claim:
      product_type: "appliance"
      description: "Washing machine will not spin"
      incident_date: "2025-03-10"
    get_available_slots:
      claim_id: "HA-6055"
      from_date: "2025-03-10"
      to_date: "2025-03-12"
    update_appointment:
      claim_id: "HA-6055"
      slot: "2025-03-10T16:00:00Z"
      reason: "initial_booking"
  tool_call_results:
    new_claim:
      claim_id: "HA-6055"
      product_type: "appliance"
      status: "opened"
      coverage:
        type: "appliance_mechanical_breakdown"
        deductible: 150
      notes: "Claim created for washing machine that will not spin."
    get_available_slots:
      claim_id: "HA-6055"
      timezone: "UTC"
      slots:
        - start: "2025-03-10T16:00:00Z"
          end: "2025-03-10T20:00:00Z"
          status: "available"
        - start: "2025-03-11T09:00:00Z"
          end: "2025-03-11T13:00:00Z"
          status: "available"
    update_appointment:
      claim_id: "HA-6055"
      appointment:
        start: "2025-03-10T16:00:00Z"
        end: "2025-03-10T20:00:00Z"
        status: "booked"
      confirmation_id: "HA-6055-APT-1"
      reason: "initial_booking"

conversation:
  turns:
    - user_input: "My washing machine won't spin. Is there any chance of a same-day visit, and can you open a claim for it?"
      agent_response: "I've opened a claim for your washing machine that isn't spinning; your claim ID is HA-6055. I've checked for same-day availability and can offer today 16:00-20:00, or if that's too late, tomorrow 9:00-13:00. Which works better for you?"
      steps:
        - planner
        - task
        - tools_recommend
        - new_claim
        - get_available_slots
        - response_compose
    - user_input: "Today 4-8 is fine."
      agent_response: "I've booked a same-day visit for 16:00-20:00 today under claim HA-6055. You'll get a confirmation with all the details shortly."
      steps:
        - planner
        - task
        - tools_recommend
        - update_appointment
        - response_compose

data_plane:
  workflow: multi_turn_new_claim_chain
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        for a washing machine that will not spin and produce a tool plan for
        starting a home appliances claim, finding same-day and next-day
        visit windows, and booking the window the user selects.
      output: >
        PLAN:
          1) Call "new_claim" on server "appliances" with product_type=appliance
             and a description of the spin failure.
          2) Call "get_available_slots" with from_date=today to include same-day
             and next-day options.
          3) Call "update_appointment" with the window the user selects.
    - role: summarizer
      system_prompt: >
        Summarize each turn into a clear assistant message for the end user,
        keeping the claim ID and appointment details consistent across turns.
