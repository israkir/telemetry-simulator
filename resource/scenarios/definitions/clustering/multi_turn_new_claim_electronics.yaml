name: multi_turn_new_claim_electronics
description: >
  Multi-turn chained tool flow for Home electronics division: two traces in one session.
  Turn 1: new_claim + get_available_slots. Turn 2: update_appointment.
  Same session_id and gen_ai.conversation.id across both traces.

tags:
  - data-plane
  - multi-turn
  - happy-path
  - clustering

workload_weight: 2.0
redaction_applied: none

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: electronics
  tools:
    - new_claim
    - get_available_slots
    - update_appointment
  tool_call_arguments:
    new_claim:
      product_type: "electronics"
      description: "TV will not turn on"
      incident_date: "2025-03-10"
    get_available_slots:
      claim_id: "EV-2291"
      from_date: "2025-03-12"
      to_date: "2025-03-20"
    update_appointment:
      claim_id: "EV-2291"
      slot: "2025-03-13T15:00:00Z"
      reason: "initial_booking"
  tool_call_results:
    new_claim:
      claim_id: "EV-2291"
      product_type: "electronics"
      status: "opened"
      coverage:
        type: "electronics_repair"
        deductible: 100
      notes: "Claim created for TV that will not turn on."
    get_available_slots:
      claim_id: "EV-2291"
      timezone: "UTC"
      slots:
        - start: "2025-03-11T10:00:00Z"
          end: "2025-03-11T12:00:00Z"
          status: "available"
        - start: "2025-03-13T15:00:00Z"
          end: "2025-03-13T17:00:00Z"
          status: "available"
        - start: "2025-03-14T11:00:00Z"
          end: "2025-03-14T13:00:00Z"
          status: "available"
    update_appointment:
      claim_id: "EV-2291"
      appointment:
        start: "2025-03-13T15:00:00Z"
        end: "2025-03-13T17:00:00Z"
        status: "booked"
      confirmation_id: "EV-2291-APT-1"
      reason: "initial_booking"

conversation:
  turns:
    - user_input: "My TV won't turn on. I want to make a claim."
      agent_response: "I've opened a claim for your TV that won't turn on. Your claim ID is EV-2291. Did it stop working suddenly, or was there a power surge? I've checked our schedule and have Tuesday 10:00, Thursday 15:00, or Friday 11:00 available. Which slot would you like?"
    - user_input: "Thursday at 3 is fine. There was no surge, it just stopped."
      agent_response: "Thanks, I've scheduled your TV repair for Thursday at 15:00 under claim EV-2291. You'll receive a confirmation email with the visit details."

data_plane:
  workflow: multi_turn_new_claim_chain
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        and produce a tool plan for starting a home electronics claim,
        finding available technician slots, and booking an appointment with
        update_appointment.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "electronics" with
             product_type=electronics, incident_description, and incident_date.
          2) Call MCP tool "get_available_slots" to present suitable options.
          3) Call MCP tool "update_appointment" to book the slot the user selects.
    - role: summarizer
      system_prompt: >
        Summarize each turn into a clear assistant message for the end user,
        keeping the claim ID and appointment details consistent across turns.
