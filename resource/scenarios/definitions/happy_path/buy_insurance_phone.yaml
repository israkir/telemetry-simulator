# Phone MCP context, happy path. User buys insurance; agent calls buy_insurance successfully.

name: buy_insurance_phone
description: >
  Happy path for Phone mcp_server: planner → task → tools_recommend → buy_insurance → response_compose.
  User confirms purchase of phone cover; tool succeeds and assistant confirms order.
  Single-turn external conversation paired with structured context for clustering-friendly traces.

tags:
  - data-plane
  - happy-path
  - phone
  - buy-insurance

workload_weight: 1.5
interval_ms: 90
interval_deviation_ms: 40
redaction_applied: basic

data_plane:
  workflow: buy_insurance
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to buy phone insurance and produce a tool plan that calls the
        "buy_insurance" MCP tool on server "phone" with the selected cover
        and payment details.
      output: >
        PLAN:
          1) Call MCP tool "buy_insurance" on server "phone" with arguments from the
             external request (device details, chosen cover level, billing cadence).
          2) Return a confirmation including the new policy ID and start date.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the buy_insurance tool call into a clear final
        response for the end user, including the policy ID, cover summary, and billing info.

expected:
  mcp_server: phone
  tools:
    - buy_insurance

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - buy_insurance
  tool_call_arguments:
    buy_insurance:
      product_type: "phone"
      phone_model: "smartphone"
      cover_level: "standard"
      billing_cadence: "monthly"
      start_date: "2025-03-10"
  tool_call_results:
    buy_insurance:
      policy_id: "PH-COV-1001"
      product_type: "phone"
      cover_level: "standard"
      billing_cadence: "monthly"
      status: "active"
      start_date: "2025-03-10"
      monthly_premium: 9.99
  tools:
    - buy_insurance

conversation:
  external:
    user_input: "I’ve just bought a new smartphone and want to add phone insurance. Can you set up standard cover and bill me monthly?"
    agent_response: "I’ve set up standard phone insurance for your new device with monthly billing. Your policy is now active on your account, and I’ve emailed a summary of what’s covered and the monthly price."
