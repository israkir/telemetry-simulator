# Phone MCP context, happy path. User uploads documents for a claim; agent calls upload_documents successfully.

name: upload_documents_phone
description: >
  Happy path for Phone mcp_server: planner → task → tools_recommend → upload_documents → response_compose.
  User asks to upload photos/documents for a phone claim; tool succeeds and assistant confirms.

tags:
  - data-plane
  - happy-path
  - phone
  - upload-documents

workload_weight: 2.5
interval_ms: 90
interval_deviation_ms: 40
redaction_applied: basic

data_plane:
  workflow: upload_documents
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to upload documents for a phone claim and produce a tool plan that
        calls the "upload_documents" MCP tool on server "phone" with the
        claim ID and document types.
      output: >
        PLAN:
          1) Call MCP tool "upload_documents" on server "phone" with arguments from the
             external request (claim_id and document_types).
          2) Return a confirmation including how many documents were accepted.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the upload_documents tool call into a clear
        final response for the end user, including what was uploaded and what
        happens next.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - upload_documents
  tool_call_arguments:
    upload_documents:
      claim_id: "PH-8842"
      document_types:
        - "photos"
        - "invoice"
  tool_call_results:
    upload_documents:
      claim_id: "PH-8842"
      uploaded_count: 2
      accepted_types:
        - "photos"
        - "invoice"

conversation:
  external:
    user_input: "I need to upload photos and the repair invoice for my phone claim PH-8842."
    agent_response: "I’ve uploaded 2 documents to your phone claim PH-8842: your photos and the repair invoice. We’ll review them and update you once the assessment is complete."
