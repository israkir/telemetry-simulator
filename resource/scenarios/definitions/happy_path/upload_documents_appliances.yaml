# Home appliances MCP context, happy path. User uploads documents for a claim; agent calls upload_documents successfully.

name: upload_documents_appliances
description: >
  Happy path for Appliances mcp_server: planner → task → tools_recommend → upload_documents → response_compose.
  User asks to upload photos/documents for an appliance claim; tool succeeds and assistant confirms.

tags:
  - data-plane
  - happy-path
  - appliances
  - upload-documents

workload_weight: 1.5
interval_ms: 90
interval_deviation_ms: 40
redaction_applied: basic

data_plane:
  workflow: upload_documents
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to upload documents for an appliance claim and produce a tool plan
        that calls the "upload_documents" MCP tool on server "appliances"
        with the claim ID and document types.
      output: >
        PLAN:
          1) Call MCP tool "upload_documents" on server "appliances" with arguments from the
             external request (claim_id and document_types).
          2) Return a confirmation including how many documents were accepted.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the upload_documents tool call into a clear
        final response for the end user, including what was uploaded and what
        happens next.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: appliances
  tools:
    - upload_documents
  tool_call_arguments:
    upload_documents:
      claim_id: "AP-4480"
      document_types:
        - "photos"
        - "invoice"
  tool_call_results:
    upload_documents:
      claim_id: "AP-4480"
      uploaded_count: 3
      accepted_types:
        - "photos"
        - "invoice"

conversation:
  external:
    user_input: "I need to upload photos and my purchase invoice for my washing machine claim AP-4480."
    agent_response: "I’ve uploaded 3 documents to your appliance claim AP-4480, including your photos and invoice. We’ll review them and let you know the outcome once the assessment is complete."
