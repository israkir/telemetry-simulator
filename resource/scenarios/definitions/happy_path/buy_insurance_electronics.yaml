# Home electronics MCP context, happy path. User buys insurance; agent calls buy_insurance successfully.

name: buy_insurance_electronics
description: >
  Happy path for Home electronics mcp_server: planner → task → tools_recommend → buy_insurance → response_compose.
  User confirms purchase of TV/electronics cover; tool succeeds and assistant confirms order.

tags:
  - data-plane
  - happy-path
  - electronics
  - buy-insurance

workload_weight: 1.0
interval_ms: 90
interval_deviation_ms: 40
redaction_applied: basic

data_plane:
  workflow: buy_insurance
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to buy electronics insurance and produce a tool plan that calls the
        "buy_insurance" MCP tool on server "electronics" with the device
        details, chosen cover, and billing cadence.
      output: >
        PLAN:
          1) Call MCP tool "buy_insurance" on server "electronics" with arguments from the
             external request (device_type, value, cover_level, billing_cadence).
          2) Return a confirmation including the new policy ID, start date, and billing info.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the buy_insurance tool call into a clear final
        response for the end user, including the policy ID, what is covered,
        and how and when they will be billed.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: electronics
  tools:
    - buy_insurance
  tool_call_arguments:
    buy_insurance:
      product_type: "electronics"
      device_type: "tv"
      cover_level: "standard"
      billing_cadence: "monthly"
      start_date: "2025-03-10"
  tool_call_results:
    buy_insurance:
      policy_id: "EV-COV-3001"
      product_type: "electronics"
      device_type: "tv"
      cover_level: "standard"
      billing_cadence: "monthly"
      status: "active"
      start_date: "2025-03-10"
      monthly_premium: 8.49

conversation:
  external:
    user_input: "I’ve just bought a new TV and want to add electronics insurance. Can you set up standard cover and bill me monthly?"
    agent_response: "I’ve set up standard electronics insurance for your TV with monthly billing. Your policy EV-COV-3001 is now active from 10 March 2025, and I’ve emailed a summary of what’s covered and the monthly price."

