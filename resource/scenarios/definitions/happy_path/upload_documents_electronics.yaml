# Home electronics MCP context, happy path. User uploads documents for a claim; agent calls upload_documents successfully.

name: upload_documents_electronics
description: >
  Happy path for Home electronics mcp_server: planner → task → tools_recommend → upload_documents → response_compose.
  User asks to upload photos/documents for a TV/electronics claim; tool succeeds and assistant confirms.

tags:
  - data-plane
  - happy-path
  - electronics
  - upload-documents

workload_weight: 2.0
interval_ms: 90
interval_deviation_ms: 40
redaction_applied: basic

data_plane:
  workflow: upload_documents
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to upload documents for an electronics claim and produce a tool plan
        that calls the "upload_documents" MCP tool on server "electronics"
        with the claim ID and document types.
      output: >
        PLAN:
          1) Call MCP tool "upload_documents" on server "electronics" with arguments from the
             external request (claim_id and document_types).
          2) Return a confirmation including how many documents were accepted.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the upload_documents tool call into a clear
        final response for the end user, including what was uploaded and what
        happens next.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: electronics
  tools:
    - upload_documents
  tool_call_arguments:
    upload_documents:
      claim_id: "EV-2291"
      document_types:
        - "photos"
        - "invoice"
  tool_call_results:
    upload_documents:
      claim_id: "EV-2291"
      uploaded_count: 4
      accepted_types:
        - "photos"
        - "invoice"

conversation:
  external:
    user_input: "I want to upload photos and my receipt for TV claim EV-2291."
    agent_response: "I’ve uploaded 4 documents to your TV claim EV-2291, including your photos and receipt. We’ll review them and let you know the next steps once the assessment is finished."
