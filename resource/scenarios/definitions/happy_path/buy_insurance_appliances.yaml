# Home appliances MCP context, happy path. User buys insurance; agent calls buy_insurance successfully.

name: buy_insurance_appliances
description: >
  Happy path for Appliances mcp_server: planner → task → tools_recommend → buy_insurance → response_compose.
  User confirms purchase of appliance cover; tool succeeds and assistant confirms order.

tags:
  - data-plane
  - happy-path
  - appliances
  - buy-insurance

workload_weight: 0.8
mcp_server: appliances
interval_ms: 90
interval_deviation_ms: 40
redaction_applied: basic

data_plane:
  workflow: buy_insurance
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to buy appliance insurance and produce a tool plan that calls the
        "buy_insurance" MCP tool on server "appliances" with the appliance
        details, chosen cover, and billing cadence.
      output: >
        PLAN:
          1) Call MCP tool "buy_insurance" on server "appliances" with arguments from the
             external request (appliance_type, value, cover_level, billing_cadence).
          2) Return a confirmation including the new policy ID, start date, and billing info.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the buy_insurance tool call into a clear final
        response for the end user, including the policy ID, what is covered,
        and how and when they will be billed.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: appliances
  tools:
    - buy_insurance
  tool_call_arguments:
    buy_insurance:
      product_type: "appliance"
      appliance_type: "washing_machine"
      cover_level: "standard"
      billing_cadence: "monthly"
      start_date: "2025-03-10"
  tool_call_results:
    buy_insurance:
      policy_id: "AP-COV-2001"
      product_type: "appliance"
      appliance_type: "washing_machine"
      cover_level: "standard"
      billing_cadence: "monthly"
      status: "active"
      start_date: "2025-03-10"
      monthly_premium: 7.49

conversation:
  external:
    user_input: "I’ve bought a new washing machine and want to add appliance insurance. Can you set up standard cover and bill me monthly?"
    agent_response: "I’ve set up standard appliance insurance for your washing machine with monthly billing. Your policy AP-COV-2001 is now active from 10 March 2025, and I’ve emailed you a summary of what’s covered and the monthly price."
