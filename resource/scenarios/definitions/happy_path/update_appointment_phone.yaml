# Phone MCP context, happy path. User reschedules repair; agent calls update_appointment successfully.

name: update_appointment_phone
description: >
  Happy path for Phone mcp_server: planner → task → tools_recommend → update_appointment → response_compose.
  User asks to reschedule a phone repair; tool succeeds and assistant confirms new slot.

tags:
  - data-plane
  - happy-path
  - phone
  - update-appointment

workload_weight: 4.0

mcp_server: phone
repeat_count: 3
interval_ms: 90
interval_deviation_ms: 40
emit_metrics: false
emit_logs: false
redaction_applied: basic

data_plane:
  workflow: update_appointment
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed

expected:
  mcp_server: phone
  tools:
    - update_appointment

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
