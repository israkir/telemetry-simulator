# Home appliances MCP context, happy path. User reschedules repair; agent calls update_appointment successfully.

name: update_appointment_appliances
description: >
  Happy path for Appliances mcp_server: planner → task → tools_recommend → update_appointment → response_compose.
  User asks to reschedule a dishwasher/fridge/appliance repair; tool succeeds and assistant confirms new slot.

tags:
  - data-plane
  - happy-path
  - appliances
  - update-appointment

workload_weight: 2.0
interval_ms: 90
interval_deviation_ms: 40
redaction_applied: basic

data_plane:
  workflow: update_appointment
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to reschedule an appliance repair appointment and produce a tool plan
        that calls the "update_appointment" MCP tool on server "appliances"
        with the claim ID, new slot, and reschedule reason.
      output: >
        PLAN:
          1) Call MCP tool "update_appointment" on server "appliances" with
             arguments from the external request (claim_id, new slot,
             reason=reschedule_by_customer).
          2) Return a confirmation including the new appointment window and
             reference.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the update_appointment tool call into a clear
        final response for the end user, including the new appointment time
        and any reference they should keep.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: appliances
  tools:
    - update_appointment
  tool_call_arguments:
    update_appointment:
      claim_id: "HA-7733"
      slot: "2025-03-15T10:00:00Z"
      reason: "reschedule_by_customer"
  tool_call_results:
    update_appointment:
      claim_id: "HA-7733"
      appointment:
        start: "2025-03-15T10:00:00Z"
        end: "2025-03-15T14:00:00Z"
        status: "booked"
      confirmation_id: "HA-7733-APT-2"
      reason: "reschedule_by_customer"

conversation:
  external:
    user_input: "I need to move my dishwasher repair for claim HA-7733 to Saturday morning instead."
    agent_response: "I’ve rescheduled your dishwasher repair for claim HA-7733 to Saturday 10–2. Your new appointment is confirmed and I’ve sent you an updated confirmation."
