# Home electronics MCP context, happy path. User asks for insurance quote; agent calls choose_insurance successfully.

name: choose_insurance_electronics
description: >
  Happy path for Home electronics mcp_server: planner → task → tools_recommend → choose_insurance → response_compose.
  User asks for TV/electronics cover quote or options; tool succeeds and assistant presents options.
  Single-turn external conversation paired with structured context for clustering-friendly traces.

tags:
  - data-plane
  - happy-path
  - electronics
  - choose-insurance

workload_weight: 1.5
interval_ms: 90
interval_deviation_ms: 40
emit_metrics: false
emit_logs: false
redaction_applied: basic

data_plane:
  workflow: choose_insurance
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        for TV or electronics insurance options and produce a tool plan that
        calls the "choose_insurance" MCP tool on server "electronics" with
        the device details and cover preferences.
      output: >
        PLAN:
          1) Call MCP tool "choose_insurance" on server "electronics" with arguments from the
             external request (device_type, value, cover preferences).
          2) Return a short list of cover options with price and key differences.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the choose_insurance tool call into a clear final
        response for the end user, highlighting 1–2 recommended options.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: electronics
  tools:
    - choose_insurance
  tool_call_arguments:
    choose_insurance:
      product_type: "electronics"
      device_type: "tv"
      device_value: 900
      cover_preferences:
        - "accidental_damage"
        - "breakdown"
  tool_call_results:
    choose_insurance:
      product_type: "electronics"
      device_type: "tv"
      options:
        - id: "EV-COV-STD"
          level: "standard"
          monthly_premium: 7.99
          features:
            - "accidental_damage"
            - "breakdown"
        - id: "EV-COV-PRM"
          level: "premium"
          monthly_premium: 11.99
          features:
            - "accidental_damage"
            - "breakdown"
            - "loan_device"

conversation:
  external:
    user_input: "I’ve bought a new 55-inch TV. What electronics insurance options do you have and how much do they cost?"
    agent_response: "I’ve checked our electronics cover for a 55-inch TV and found a standard and a premium option. Standard gives you accidental damage and breakdown cover, while premium also adds faster repair and loan TV benefits. I’ll show you the monthly prices and a quick comparison so you can choose."
