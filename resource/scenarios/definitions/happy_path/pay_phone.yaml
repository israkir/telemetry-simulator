# Phone MCP context, happy path. User pays balance; agent calls pay successfully.

name: pay_phone
description: >
  Happy path for Phone mcp_server: planner → task → tools_recommend → pay → response_compose.
  User asks to pay balance or get payment link; tool succeeds and assistant confirms.

tags:
  - data-plane
  - happy-path
  - phone
  - pay

workload_weight: 2.0
interval_ms: 90
interval_deviation_ms: 40
redaction_applied: basic

data_plane:
  workflow: pay
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to pay a phone claim balance and produce a tool plan that calls the
        "pay" MCP tool on server "phone" with the claim ID and payment details.
      output: >
        PLAN:
          1) Call MCP tool "pay" on server "phone" with arguments from the
             external request (claim_id, amount, currency, method).
          2) Return a confirmation including the payment status and reference.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the pay tool call into a clear final response
        for the end user, including whether the payment succeeded and any
        reference they might need.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - pay
  tool_call_arguments:
    pay:
      claim_id: "PH-8842"
      amount: 75.00
      currency: "GBP"
      method: "card"
  tool_call_results:
    pay:
      payment_id: "PH-PAY-7001"
      claim_id: "PH-8842"
      amount: 75.00
      currency: "GBP"
      status: "succeeded"

conversation:
  external:
    user_input: "I want to pay the £75 excess on my phone claim PH-8842."
    agent_response: "I’ve taken a £75 card payment for your phone claim PH-8842. The payment has succeeded under reference PH-PAY-7001, and we’ll continue processing your claim."
