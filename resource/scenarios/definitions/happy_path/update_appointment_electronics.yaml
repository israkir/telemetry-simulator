# Home electronics MCP context, happy path. User reschedules repair; agent calls update_appointment successfully.

name: update_appointment_electronics
description: >
  Happy path for Home electronics mcp_server: planner → task → tools_recommend → update_appointment → response_compose.
  User asks to reschedule a TV/electronics repair; tool succeeds and assistant confirms new slot.

tags:
  - data-plane
  - happy-path
  - electronics
  - update-appointment

workload_weight: 3.0
interval_ms: 90
interval_deviation_ms: 40
redaction_applied: basic

data_plane:
  workflow: update_appointment
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to reschedule a TV or electronics repair appointment and produce a
        tool plan that calls the "update_appointment" MCP tool on server
        "electronics" with the claim ID, new slot, and reschedule reason.
      output: >
        PLAN:
          1) Call MCP tool "update_appointment" on server "electronics" with
             arguments from the external request (claim_id, new slot,
             reason=reschedule_by_customer).
          2) Return a confirmation including the new appointment window and
             reference.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the update_appointment tool call into a clear
        final response for the end user, including the new appointment time
        and any reference they should keep.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: electronics
  tools:
    - update_appointment
  tool_call_arguments:
    update_appointment:
      claim_id: "EV-2291"
      slot: "2025-03-13T14:00:00Z"
      reason: "reschedule_by_customer"
  tool_call_results:
    update_appointment:
      claim_id: "EV-2291"
      appointment:
        start: "2025-03-13T14:00:00Z"
        end: "2025-03-13T16:00:00Z"
        status: "booked"
      confirmation_id: "EV-2291-APT-2"
      reason: "reschedule_by_customer"

conversation:
  external:
    user_input: "Can you move my TV repair for claim EV-2291 to a later afternoon slot?"
    agent_response: "I’ve rescheduled your TV repair for claim EV-2291 to the 2–4pm slot you asked for. Your new appointment is confirmed and I’ve sent you an updated confirmation message."
