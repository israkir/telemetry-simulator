# Home electronics MCP context, happy path. Data-plane workflow new_claim; config supplies
# conversation samples (e.g. TV, gaming, streaming). Each iteration uses a random sample.

name: new_claim_electronics
description: >
  Happy path for Home electronics mcp_server: planner → task → tools_recommend → new_claim → response_compose.
  User starts a claim for TV, smart device, or gaming; agent calls new_claim successfully.
  Single-turn external conversation paired with structured context for clustering-friendly traces.

tags:
  - data-plane
  - happy-path
  - electronics

workload_weight: 3.0
interval_ms: 100
interval_deviation_ms: 50
redaction_applied: basic

data_plane:
  workflow: new_claim
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to start a home electronics claim and produce a tool plan that calls
        the "new_claim" MCP tool on server "electronics" with the incident
        description and date.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "electronics" with arguments from the
             external request (product_type=electronics, incident_description, incident_date).
          2) Return a confirmation including the new claim ID and next steps.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the new_claim tool call into a clear final
        response for the end user, including the claim ID and what happens next.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: electronics
  tools:
    - new_claim
  tool_call_arguments:
    new_claim:
      product_type: "electronics"
      description: "TV will not power on after a recent storm"
      incident_date: "2025-03-10"
  tool_call_results:
    new_claim:
      claim_id: "EV-2291"
      product_type: "electronics"
      status: "opened"
      coverage:
        type: "electronics_repair"
        deductible: 100
      notes: "Claim created for TV not powering on after storm."

conversation:
  external:
    user_input: "I want to start a claim for my TV that won’t turn on after last night’s storm."
    agent_response: "I’ve opened a claim for your TV that stopped working after the storm. Your claim ID is EV-2291. You can now upload photos or a short video of the issue, and we’ll confirm the cover and arrange a repair appointment."
