# Phone MCP context, happy path. User cancels product/policy; agent calls cancel_product successfully.

name: cancel_product_phone
description: >
  Happy path for Phone mcp_server: planner → task → tools_recommend → cancel_product → response_compose.
  User asks to cancel a phone policy/product; tool succeeds and assistant confirms.
  Single-turn external conversation paired with structured context for clustering-friendly traces.

tags:
  - data-plane
  - happy-path
  - phone
  - cancel-product

workload_weight: 1.0
interval_ms: 90
interval_deviation_ms: 40
redaction_applied: basic

data_plane:
  workflow: cancel_product
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to cancel a phone insurance policy and produce a tool plan that calls
        the "cancel_product" MCP tool on server "phone" with the policy ID and
        cancellation timing.
      output: >
        PLAN:
          1) Call MCP tool "cancel_product" on server "phone" with arguments from the
             external request (policy_id and effective_date).
          2) Return a confirmation including when cover ends and any refund details.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the cancel_product tool call into a clear final
        response for the end user, including the cancellation date and what they’ll see on their bill.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - cancel_product
  tool_call_arguments:
    cancel_product:
      policy_id: "PH-COV-1001"
      effective_date: "2025-03-11"
      reason: "customer_request"
  tool_call_results:
    cancel_product:
      policy_id: "PH-COV-1001"
      status: "cancelled"
      effective_date: "2025-03-11"
      refund_amount: 3.99
      reason: "customer_request"
  tools:
    - cancel_product

conversation:
  external:
    user_input: "Can you cancel the insurance on my old phone from today?"
    agent_response: "I’ve cancelled the insurance on your old phone effective today. Cover has now ended, and any final charge or refund will appear on your next statement."
