# Phone MCP context, happy path. Data-plane (workflow, goal, control_plane_template)
# and expected MCP server/tools are defined here; config supplies key → UUID and workflow step names.
# Each iteration uses a different session and a random conversation sample (simulating different users).

name: new_claim_phone
description: >
  Happy path for Phone mcp_server: planner → LLM task → tool recommendation → tool execution (new_claim) → response_compose.
  Single-turn external conversation paired with structured tool arguments/results for clustering-friendly traces.

tags:
  - data-plane
  - happy-path
  - phone

# Primary flow: new claims dominate; phone division highest volume.
workload_weight: 2.0
interval_ms: 100
interval_deviation_ms: 50
redaction_applied: basic

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - new_claim
  tool_call_arguments:
    new_claim:
      product_type: "phone"
      description: "Mobile phone is not working after being dropped; screen is cracked and the device will not power on."
      incident_date: "2025-03-10"
  tool_call_results:
    new_claim:
      claim_id: "PH-7788"
      product_type: "phone"
      status: "opened"
      coverage:
        type: "phone_screen_damage"
        deductible: 75
      notes: "Claim created for phone that stopped working after a drop with cracked screen."

conversation:
  external:
    user_input: "My mobile phone is not working after I dropped it. Start a claim."
    agent_response: "I've started a claim for your phone and noted that it stopped working after a drop with a cracked screen. Your claim ID is PH-7788. You can now upload photos of the damage, and we'll confirm the cover and next repair steps."

data_plane:
  workflow: new_claim
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to start a phone claim and produce a tool plan that calls the "new_claim"
        MCP tool on server "phone" with the incident description and date.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "phone" with arguments from the
             external request (product_type=phone, incident_description, incident_date).
          2) Return a confirmation including the new claim ID and next steps.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the new_claim tool call into a clear final
        response for the end user, including the claim ID and what happens next.
