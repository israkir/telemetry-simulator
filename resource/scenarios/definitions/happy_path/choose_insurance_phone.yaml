# Phone MCP context, happy path. User asks for insurance quote; agent calls choose_insurance successfully.

name: choose_insurance_phone
description: >
  Happy path for Phone mcp_server: planner → task → tools_recommend → choose_insurance → response_compose.
  User asks for phone cover quote or options; tool succeeds and assistant presents options.
  Single-turn external conversation paired with structured context for clustering-friendly traces.

tags:
  - data-plane
  - happy-path
  - phone
  - choose-insurance

workload_weight: 2.0
interval_ms: 90
interval_deviation_ms: 40
emit_metrics: false
emit_logs: false
redaction_applied: basic

data_plane:
  workflow: choose_insurance
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        for phone insurance options and produce a tool plan that calls the
        "choose_insurance" MCP tool on server "phone" with the device details
        and cover preferences.
      output: >
        PLAN:
          1) Call MCP tool "choose_insurance" on server "phone" with arguments from the
             external request (phone model, value, excess preference).
          2) Return a short list of phone cover options with price and key benefits.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the choose_insurance tool call into a clear final
        response for the end user, calling out the recommended option.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - choose_insurance
  tool_call_arguments:
    choose_insurance:
      product_type: "phone"
      phone_model: "smartphone"
      device_value: 800
      cover_preferences:
        - "accidental_damage"
        - "loss_theft"
  tool_call_results:
    choose_insurance:
      product_type: "phone"
      options:
        - id: "PH-COV-STD"
          level: "standard"
          monthly_premium: 6.99
          features:
            - "accidental_damage"
        - id: "PH-COV-FULL"
          level: "full"
          monthly_premium: 10.99
          features:
            - "accidental_damage"
            - "loss_theft"

conversation:
  external:
    user_input: "I’ve upgraded my smartphone and want to see your insurance options. What cover can you offer and how much is it?"
    agent_response: "I’ve checked our phone insurance options for your new device and found a few levels of cover, from basic damage-only through to full loss and theft. I’ll show you the monthly prices and a quick summary of what each option includes so you can pick the one that suits you."
