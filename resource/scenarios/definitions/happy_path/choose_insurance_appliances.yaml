# Home appliances MCP context, happy path. User asks for insurance quote; agent calls choose_insurance successfully.

name: choose_insurance_appliances
description: >
  Happy path for Appliances mcp_server: planner → task → tools_recommend → choose_insurance → response_compose.
  User asks for appliance cover quote or options; tool succeeds and assistant presents options.

tags:
  - data-plane
  - happy-path
  - appliances
  - choose-insurance

workload_weight: 1.0
interval_ms: 90
interval_deviation_ms: 40
emit_metrics: false
emit_logs: false
redaction_applied: basic

data_plane:
  workflow: choose_insurance
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        for appliance insurance options and produce a tool plan that calls
        the "choose_insurance" MCP tool on server "appliances" with the
        appliance details and cover preferences.
      output: >
        PLAN:
          1) Call MCP tool "choose_insurance" on server "appliances" with
             arguments from the external request (appliance_type, value,
             cover preferences).
          2) Return a short list of cover options with price and key
             differences.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the choose_insurance tool call into a clear
        final response for the end user, highlighting 1–2 recommended options.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: appliances
  tools:
    - choose_insurance
  tool_call_arguments:
    choose_insurance:
      product_type: "appliance"
      appliance_type: "dishwasher"
      appliance_value: 600
      cover_preferences:
        - "accidental_damage"
        - "breakdown"
  tool_call_results:
    choose_insurance:
      product_type: "appliance"
      appliance_type: "dishwasher"
      options:
        - id: "AP-COV-STD"
          level: "standard"
          monthly_premium: 5.99
          features:
            - "accidental_damage"
            - "breakdown"
        - id: "AP-COV-PRM"
          level: "premium"
          monthly_premium: 8.99
          features:
            - "accidental_damage"
            - "breakdown"
            - "loan_appliance"

conversation:
  external:
    user_input: "I’d like to insure my dishwasher. What appliance insurance options do you have and how much do they cost?"
    agent_response: "I’ve checked our appliance insurance for your dishwasher and found a standard and a premium option. Standard includes accidental damage and breakdown cover, while premium also adds a loan appliance benefit. I’ll show you the monthly prices and a quick comparison so you can choose."
