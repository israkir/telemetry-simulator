# Higher latency during peak hours (weekdays 9–14 PT) or post long weekend.
# Latencies: config latency_profiles.higher_latency_peak (peak and reasonably high for this context).
# Condition (peak_hours, post_long_weekend) in this file.

name: generic_higher_latency_peak_hours
description: >
  Tool calls have higher latency during peak hours (weekdays 9am–2pm PT) or post long weekends.
  Latencies use the higher_latency_peak profile (peak and reasonably high). Condition in this file.

tags:
  - data-plane
  - higher-latency
  - peak-hours

# Peak-hours / post–long-weekend higher latency is a minority of traffic.
workload_weight: 1.5
interval_ms: 80
redaction_applied: none

data_plane:
  workflow: new_claim
  goal: higher_latency
  latency_profile: higher_latency_peak
  control_plane_template: allowed
  higher_latency_condition:
    peak_hours:
      timezone: "America/Los_Angeles"
      start_hour: 9
      end_hour: 14
      weekdays: [1, 2, 3, 4, 5]  # Mon=1 .. Fri=5 (ISO weekday)
    post_long_weekend:
      days_after: 1

  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to start a phone claim and produce a tool plan that calls the "new_claim"
        MCP tool on server "phone" with the incident description and date. This
        scenario represents peak hours or the day after a long weekend, where
        latencies are higher.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "phone" with arguments from the
             external request (product_type=phone, incident_description, incident_date).
          2) Return a confirmation including the new claim ID and next steps.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the new_claim tool call into a clear final
        response for the end user, including the claim ID and what happens next.

# Single-turn conversation (peak hours / post long weekend higher-latency).
conversation:
  external:
    user_input: "I dropped my phone and the screen is cracked. How do I start a claim?"
    agent_response: "I’ve started a claim for your phone and noted the cracked screen. Your claim ID is PH-8842. You can now upload photos of the damage, and I’ll confirm your cover and the next steps once the review is complete."

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - new_claim
  tool_call_arguments:
    new_claim:
      product_type: "phone"
      description: "Screen cracked after a drop down the stairs"
      incident_date: "2025-03-10"
  tool_call_results:
    new_claim:
      claim_id: "PH-8842"
      product_type: "phone"
      status: "opened"
      coverage:
        type: "phone_screen_damage"
        deductible: 75
      notes: "Claim created for cracked phone screen during peak hours."
