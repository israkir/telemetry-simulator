# Tool calls have higher latency when cancelling a claim that has an appointment already scheduled.
# Division: appliances (dishwasher, fridge, washer, etc.).

name: cancel_claim_appliances_higher_latency
description: >
  Tool calls have higher latency when cancelling appliances claims (e.g. claim with scheduled appointment).
  Appliances division. Condition is captured as span attributes for filtering.

tags:
  - data-plane
  - higher-latency
  - cancel-claim
  - appliances

workload_weight: 5.0
interval_ms: 80
redaction_applied: none

data_plane:
  workflow: cancel_claim
  goal: higher_latency
  latency_profile: higher_latency
  control_plane_template: allowed
  higher_latency_condition:
    appointment_scheduled: true

  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to cancel an appliance claim and produce a tool plan that calls the
        "cancel_claim" MCP tool on server "appliances" with the claim ID and
        cancellation reason. Be aware that cancelling claims with a scheduled
        appointment can experience higher latency.
      output: >
        PLAN:
          1) Call MCP tool "cancel_claim" on server "appliances" with arguments
             from the external request (claim_id and reason).
          2) Return a confirmation including the final status of the claim and
             whether any existing technician appointment has been released.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the cancel_claim tool call into a clear final
        response for the end user, confirming that the claim and any scheduled
        technician visit have been cancelled.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: appliances
  tools:
    - cancel_claim
  tool_call_arguments:
    cancel_claim:
      claim_id: "HA-7733"
      reason: "customer_requested"
  tool_call_results:
    cancel_claim:
      claim_id: "HA-7733"
      status: "cancelled"
      cancelled_at: "2025-03-12T10:30:00Z"
      reason: "customer_requested"

conversation:
  external:
    user_input: "Cancel my dishwasher claim HA-7733 — I don’t need the repair appointment anymore."
    agent_response: "I’ve cancelled your dishwasher claim HA-7733 and released the scheduled technician visit. The claim is now closed, and you’ll receive a confirmation email shortly."
