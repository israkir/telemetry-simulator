# Cold starts / scale-to-zero during bursts.
# Many requests pay cold-start cost (not just 1–2%), making tail more common.

name: mcp_cold_start_bursts_phone
description: >
  MCP tool runs on autoscaling/serverless infrastructure. During bursts, many calls
  pay cold-start cost, increasing both typical latency and tail frequency.

tags:
  - data-plane
  - higher-latency
  - mcp-latency
  - cold-start
  - autoscaling

workload_weight: 5.0
interval_ms: 100
redaction_applied: none

data_plane:
  workflow: new_claim
  goal: higher_latency
  latency_profile: higher_latency_peak
  control_plane_template: allowed
  higher_latency_condition:
    cause: "cold_starts_scale_to_zero"
    infra: "serverless_autoscaling"

  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Create a tool plan that calls the "new_claim"
        MCP tool on server "phone". This scenario represents cold-start heavy bursts
        (scale-to-zero / autoscaling), so tool calling latencies often include cold-start delays.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "phone" with arguments from the external request.
          2) Return a confirmation including the claim ID and next steps.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the new_claim tool call into a clear final response for the end user.

conversation:
  external:
    user_input: "Can you open a phone claim? It got water damage yesterday."
    agent_response: "I’ve started a claim for your phone and noted the water damage. Your claim ID is PH-8842. Upload photos when you’re ready, and we’ll confirm cover and next steps."

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - new_claim
  tool_call_arguments:
    new_claim:
      product_type: "phone"
      description: "Water damage"
      incident_date: "2025-03-10"
  tool_call_results:
    new_claim:
      claim_id: "PH-8842"
      product_type: "phone"
      status: "opened"
      notes: "Claim created during burst traffic with frequent cold starts."

