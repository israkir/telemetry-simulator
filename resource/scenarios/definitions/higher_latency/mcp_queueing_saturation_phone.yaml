# Upstream dependency saturation / queueing.
# Typical latency rises (p50 shifts right) and tail thickens (p95/p99 blow out).

name: mcp_queueing_saturation_phone
description: >
  MCP tool calls hit an overloaded upstream (DB/search/billing) causing queueing.
  Latency distribution shifts up and tail becomes heavy (high p95/p99).

tags:
  - data-plane
  - higher-latency
  - mcp-latency
  - queueing
  - saturation

workload_weight: 0.6
interval_ms: 100
redaction_applied: none

data_plane:
  workflow: new_claim
  goal: higher_latency
  latency_profile: mcp_queueing_saturation
  control_plane_template: allowed
  higher_latency_condition:
    cause: "upstream_dependency_saturation_queueing"
    upstream: "db_search_billing"

  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Create a tool plan that calls the "new_claim"
        MCP tool on server "phone". This scenario represents upstream dependency saturation
        (queueing), so tool calling latencies are elevated with a heavy tail.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "phone" with arguments from the external request.
          2) Return a confirmation including the claim ID and next steps.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the new_claim tool call into a clear final response for the end user.

conversation:
  external:
    user_input: "My phone stopped charging yesterday — can you start a claim?"
    agent_response: "I’ve started a claim for your phone. Your claim ID is PH-8842. You can upload photos or details of the issue, and we’ll confirm cover and next steps shortly."

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - new_claim
  tool_call_arguments:
    new_claim:
      product_type: "phone"
      description: "Phone not charging"
      incident_date: "2025-03-10"
  tool_call_results:
    new_claim:
      claim_id: "PH-8842"
      product_type: "phone"
      status: "opened"
      notes: "Claim created while upstream dependencies were saturated (queueing)."

