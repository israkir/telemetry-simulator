# Higher latency when scheduling appointments in certain zip codes (condition in higher_latency_condition).
# Division: electronics (TV, laptop, home electronics). Same structure as update_appointment_phone_higher_latency.

name: update_appointment_electronics_higher_latency
description: >
  Tool calls have higher latency when scheduling appointments in zip 10001 (electronics division).
  Condition is defined in this file.

tags:
  - data-plane
  - higher-latency
  - scheduling
  - electronics

workload_weight: 1.0
interval_ms: 80
redaction_applied: none

data_plane:
  workflow: update_appointment
  goal: higher_latency
  latency_profile: higher_latency
  control_plane_template: allowed
  higher_latency_condition:
    zip_code: "10001"

  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to reschedule a TV or electronics repair appointment and produce a
        tool plan that calls the "update_appointment" MCP tool on server
        "electronics" with the claim ID, new slot, and reschedule reason. This
        scenario represents higher latency when scheduling in certain zip
        codes, such as 10001.
      output: >
        PLAN:
          1) Call MCP tool "update_appointment" on server "electronics" with
             arguments from the external request (claim_id, new slot,
             reason=reschedule_by_customer).
          2) Return a confirmation including the new appointment window and
             reference.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the update_appointment tool call into a clear
        final response for the end user, including the new appointment time
        and any reference they should keep.

conversation:
  external:
    user_input: "I need to reschedule my TV repair for claim EV-2291 to a different slot."
    agent_response: "I’ve rescheduled your TV repair for claim EV-2291 to the next available slot and updated your appointment. Your new visit is confirmed, and I’ve sent you an updated confirmation message."

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: electronics
  tools:
    - update_appointment
  tool_call_arguments:
    update_appointment:
      claim_id: "EV-2291"
      slot: "2025-03-15T10:00:00Z"
      reason: "reschedule_by_customer"
  tool_call_results:
    update_appointment:
      claim_id: "EV-2291"
      appointment:
        start: "2025-03-15T10:00:00Z"
        end: "2025-03-15T14:00:00Z"
        status: "booked"
      confirmation_id: "EV-2291-APT-2"
      reason: "reschedule_by_customer"
