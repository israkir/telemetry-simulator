# Tool calls have higher latency when claim_status output is 'technician on-route to scheduled appointment'.
# This scenario runs both cases each time: (1) generic claim status response, (2) technician-on-route response.
# Both are framed as gen_ai LLM response messages in traces; higher_latency_condition is captured as span attributes.

name: claim_status_phone_higher_latency
description: >
  Tool calls have higher latency when claim status output is 'technician on-route to scheduled appointment'.
  Each run emits two traces: one with a reasonable claim status reply, one with technician-on-route style response (gen_ai.output).

tags:
  - data-plane
  - higher-latency
  - claim-status

# Higher-latency status checks (e.g. technician on-route) are a minority of traffic.
workload_weight: 1.2
interval_ms: 80
redaction_applied: none

# Cycle through samples so each run produces both cases (generic + technician-on-route).
cycle_conversation_samples: true

# Latency profile: higher_latency (config latency_profiles.higher_latency). MCP tool and
# orchestrate means are higher than happy_path so traces clearly reflect "higher latency" semantics.
data_plane:
  workflow: claim_status
  goal: higher_latency
  latency_profile: higher_latency
  control_plane_template: allowed
  higher_latency_condition:
    claim_status_output: "technician on-route to scheduled appointment"

  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        for the status of a phone claim and produce a tool plan that calls the
        "claim_status" MCP tool on server "phone" with the claim ID. Some
        statuses, such as a technician being on-route to a scheduled
        appointment, may experience higher latency.
      output: >
        PLAN:
          1) Call MCP tool "claim_status" on server "phone" with the claim_id
             from the external request.
          2) Return a summary of the current status, highlighting when a
             technician is on-route to a scheduled appointment.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the claim_status tool call into a clear final
        response for the end user, explaining that a technician is already
        on-route to their scheduled appointment and what they should expect next.

# Higher-latency sample: technician on-route outcome.
conversation:
  external:
    user_input: "What’s the status of my phone claim PH-8842?"
    agent_response: "I’ve checked your phone claim PH-8842. Your appointment is scheduled for Thursday at 10am, and a technician is already on-route to your address. If anything changes, we’ll send you an update."

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - claim_status
  tool_call_arguments:
    claim_status:
      claim_id: "PH-8842"
  tool_call_results:
    claim_status:
      claim_id: "PH-8842"
      status: "technician_on_route"
      appointment_time: "2025-03-13T10:00:00Z"
      detail: "technician on-route to scheduled appointment"
