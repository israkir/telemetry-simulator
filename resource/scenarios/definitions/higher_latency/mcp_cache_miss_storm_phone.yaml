# Cache miss storms.
# Cache misses drive higher median latency and a thicker tail during incident windows.

name: mcp_cache_miss_storm_phone
description: >
  MCP tool depends on caches/feature stores. During cache-miss storms, typical latency increases
  and the tail becomes heavy (more frequent slow calls).

tags:
  - data-plane
  - higher-latency
  - mcp-latency
  - cache-miss
  - incident

workload_weight: 0.6
interval_ms: 100
redaction_applied: none

data_plane:
  workflow: new_claim
  goal: higher_latency
  latency_profile: mcp_cache_miss_storm
  control_plane_template: allowed
  higher_latency_condition:
    cause: "cache_miss_storm"
    cache_layer: "feature_store"

  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Create a tool plan that calls the "new_claim"
        MCP tool on server "phone". This scenario represents a cache miss storm (feature store / cache layer),
        increasing typical and tail latency for MCP tool calls.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "phone" with arguments from the external request.
          2) Return a confirmation including the claim ID and next steps.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the new_claim tool call into a clear final response for the end user.

conversation:
  external:
    user_input: "I need to open a claim for my phone. The camera stopped working."
    agent_response: "I’ve started a claim for your phone. Your claim ID is PH-8842. Upload photos or details when ready, and we’ll confirm cover and next steps."

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - new_claim
  tool_call_arguments:
    new_claim:
      product_type: "phone"
      description: "Camera stopped working"
      incident_date: "2025-03-10"
  tool_call_results:
    new_claim:
      claim_id: "PH-8842"
      product_type: "phone"
      status: "opened"
      notes: "Claim created during cache-miss storm impacting upstream feature store."

