# Higher latency during peak hours (weekdays 9–14 PT) or post long weekend.
# Division: appliances. Same condition and latency profile as generic_higher_latency_peak_hours.

name: new_claim_appliances_higher_latency_peak_hours
description: >
  Tool calls have higher latency during peak hours (weekdays 9am–2pm PT) or post long weekends.
  Appliances division. Latencies: higher_latency_peak (peak and reasonably high). Condition in this file.

tags:
  - data-plane
  - higher-latency
  - peak-hours
  - appliances

workload_weight: 5.0
interval_ms: 80
redaction_applied: none

data_plane:
  workflow: new_claim
  goal: higher_latency
  latency_profile: higher_latency_peak
  control_plane_template: allowed
  higher_latency_condition:
    peak_hours:
      timezone: "America/Los_Angeles"
      start_hour: 9
      end_hour: 14
      weekdays: [1, 2, 3, 4, 5]
    post_long_weekend:
      days_after: 1

  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to start a home appliances claim and produce a tool plan that calls
        the "new_claim" MCP tool on server "appliances" with the incident
        description and date. This scenario represents peak hours or the day
        after a long weekend, where latencies are higher.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "appliances" with arguments
             from the external request (product_type=appliance, incident_description,
             incident_date).
          2) Return a confirmation including the new claim ID and next steps.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the new_claim tool call into a clear final
        response for the end user, including the claim ID and what happens next.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: appliances
  tools:
    - new_claim
  tool_call_arguments:
    new_claim:
      product_type: "appliance"
      description: "Dishwasher is leaking during the wash cycle"
      incident_date: "2025-03-10"
  tool_call_results:
    new_claim:
      claim_id: "HA-5521"
      product_type: "appliance"
      status: "opened"
      coverage:
        type: "appliance_water_damage"
        deductible: 150
      notes: "Claim created for leaking dishwasher during wash cycle during peak hours."

conversation:
  external:
    user_input: "My dishwasher is leaking and it’s really busy today — I need to start a claim."
    agent_response: "I’ve started a claim for your dishwasher and noted the leak during the wash cycle. Your claim ID is HA-5521. You can now upload photos of the issue, and we’ll confirm your cover and next repair steps."
