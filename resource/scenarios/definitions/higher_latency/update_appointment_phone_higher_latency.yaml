# Higher latency when scheduling in certain zip codes (condition in higher_latency_condition).
# Latencies: config latency_profiles.higher_latency. Condition keys/values in this file (e.g. zip_code).

name: update_appointment_phone_higher_latency
description: >
  Tool calls have higher latency when scheduling appointments in zip 90210.
  Condition is defined in this file; add new test cases (e.g. other zips) by copying and editing.

tags:
  - data-plane
  - higher-latency
  - scheduling

# Higher-latency reschedule (e.g. zip-based) is a minority of traffic.
workload_weight: 1.0
interval_ms: 80
redaction_applied: none

data_plane:
  workflow: update_appointment
  goal: higher_latency
  latency_profile: higher_latency
  control_plane_template: allowed
  higher_latency_condition:
    zip_code: "90210"

  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to reschedule a phone repair appointment and produce a tool plan that
        calls the "update_appointment" MCP tool on server "phone" with the
        claim ID, new slot, and reschedule reason. This scenario represents
        higher latency when scheduling in certain zip codes, such as 90210.
      output: >
        PLAN:
          1) Call MCP tool "update_appointment" on server "phone" with
             arguments from the external request (claim_id, new slot,
             reason=reschedule_by_customer).
          2) Return a confirmation including the new appointment window and
             reference.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the update_appointment tool call into a clear
        final response for the end user, including the new appointment time
        and any reference they should keep.

# Single-turn conversation (zip-code higher-latency).
conversation:
  external:
    user_input: "I need to move my phone repair for claim PH-8842 to next week."
    agent_response: "I’ve rescheduled your phone repair for claim PH-8842 to next Tuesday 10am–2pm. Your new appointment is confirmed, and you’ll receive an updated confirmation by email shortly."

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - update_appointment
  tool_call_arguments:
    update_appointment:
      claim_id: "PH-8842"
      slot: "2025-03-18T10:00:00Z"
      reason: "reschedule_by_customer"
  tool_call_results:
    update_appointment:
      claim_id: "PH-8842"
      appointment:
        start: "2025-03-18T10:00:00Z"
        end: "2025-03-18T14:00:00Z"
        status: "booked"
      confirmation_id: "PH-8842-APT-2"
      reason: "reschedule_by_customer"
