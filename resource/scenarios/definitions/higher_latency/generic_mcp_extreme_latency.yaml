# Occasional extreme MCP tool-calling latency (e.g. backend stall, cold start, network partition).
# Uses config latency_profiles.higher_latency_extreme: same base as peak but mcp_tool_execute
# has a rare, very high spike (multiplier 9–22x) so latencies can reach ~15–25s occasionally.

name: generic_mcp_extreme_latency
description: >
  MCP tool calls occasionally experience extreme latency (e.g. 15–25s) due to backend stall,
  cold start, or transient network issues. Uses higher_latency_extreme profile (rare spike on
  mcp_tool_execute). Intended to stress-test latency dashboards and SLOs.

tags:
  - data-plane
  - higher-latency
  - extreme-latency
  - mcp-tool-calling

# Extreme MCP latency is rare; keep weight low so it appears occasionally.
workload_weight: 0.5
interval_ms: 100
redaction_applied: none

data_plane:
  workflow: new_claim
  goal: higher_latency
  latency_profile: higher_latency_extreme
  control_plane_template: allowed
  higher_latency_condition:
    extreme_tail: true

  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to start a phone claim and produce a tool plan that calls the "new_claim"
        MCP tool on server "phone" with the incident description and date. In
        rare cases MCP tool calls may experience very high latency (backend stall
        or cold start); this scenario models that tail.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "phone" with arguments from the
             external request (product_type=phone, incident_description, incident_date).
          2) Return a confirmation including the new claim ID and next steps.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the new_claim tool call into a clear final
        response for the end user, including the claim ID and what happens next.

conversation:
  external:
    user_input: "I need to file a claim for my phone — it got damaged yesterday."
    agent_response: "I’ve started a claim for your phone. Your claim ID is PH-8842. You can upload photos of the damage when ready, and we’ll confirm your cover and next steps."

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - new_claim
  tool_call_arguments:
    new_claim:
      product_type: "phone"
      description: "Device damaged"
      incident_date: "2025-03-10"
  tool_call_results:
    new_claim:
      claim_id: "PH-8842"
      product_type: "phone"
      status: "opened"
      coverage:
        type: "phone_screen_damage"
        deductible: 75
      notes: "Claim created; MCP tool completed after extreme latency tail."
