# Higher latency during peak hours (weekdays 9–14 PT) or post long weekend.
# Division: electronics. Same condition and latency profile as generic_higher_latency_peak_hours.

name: new_claim_electronics_higher_latency_peak_hours
description: >
  Tool calls have higher latency during peak hours (weekdays 9am–2pm PT) or post long weekends.
  Electronics division. Latencies: higher_latency_peak (peak and reasonably high). Condition in this file.

tags:
  - data-plane
  - higher-latency
  - peak-hours
  - electronics

workload_weight: 5.0
interval_ms: 80
redaction_applied: none

data_plane:
  workflow: new_claim
  goal: higher_latency
  latency_profile: higher_latency_peak
  control_plane_template: allowed
  higher_latency_condition:
    peak_hours:
      timezone: "America/Los_Angeles"
      start_hour: 9
      end_hour: 14
      weekdays: [1, 2, 3, 4, 5]
    post_long_weekend:
      days_after: 1

  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to start a home electronics claim and produce a tool plan that calls
        the "new_claim" MCP tool on server "electronics" with the incident
        description and date. This scenario represents peak hours or the day
        after a long weekend, where latencies are higher.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "electronics" with arguments
             from the external request (product_type=electronics,
             incident_description, incident_date).
          2) Return a confirmation including the new claim ID and next steps.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the new_claim tool call into a clear final
        response for the end user, including the claim ID and what happens next.

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: electronics
  tools:
    - new_claim
  tool_call_arguments:
    new_claim:
      product_type: "electronics"
      description: "TV will not power on after a recent storm"
      incident_date: "2025-03-10"
  tool_call_results:
    new_claim:
      claim_id: "EL-8821"
      product_type: "electronics"
      status: "opened"
      coverage:
        type: "electronics_repair"
        deductible: 100
      notes: "Claim created for TV not powering on after storm during peak hours."

conversation:
  external:
    user_input: "My TV won’t turn on after a power surge and I need to start a claim."
    agent_response: "I’ve started a claim for your TV and noted that it stopped working after the power surge. Your claim ID is EL-8821. You can now upload photos or a short video of the issue, and we’ll confirm your cover and the next repair steps."
