# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: request_validation/request_policy_allow_audit.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 1
# Interaction model: single ingress attempt; allowed with policy audit flag (no data plane)
# MCP / tools: none (span_plan stops after augmentation.validation)
# Path: payload + policy + augmentation pass; allow_with_audit outcome
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: request_policy_allow_audit
description: >
  Incoming request passes payload and policy validation, is allowed to proceed,
  and is marked with an audit flag due to policy signal.

tags:
  - normal
  - control-plane
  - allowed
  - audit

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 1.0
trace_interval_ms: 200
trace_interval_deviation_ms: 20
repeat_count: 1

# Allowed path with audit: policy + enrichment/augmentation service work on control plane.
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 40, deviation: 15 }
      payload.validation: { mean: 24, deviation: 10 }
      policy.validation: { mean: 82, deviation: 32 }
      augmentation.validation: { mean: 62, deviation: 24 }

default_latency_profile: normal

endusers:
  - id: user_d
    vendor.enduser.pseudo.id: "user_a19c2f"
    turns:
      - turn_index: 1
        span_plan:
          cp_request:
            root: request.validation
            children:
              - payload.validation
              - policy.validation
              - augmentation.validation
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "I need to file a phone damage claim."
          - target_span_class: request.validation
            name: gentoro.request.allowed
            attributes:
              vendor.request.outcome: allowed
              vendor.request.audit.flag: true
              vendor.request.audit.source: policy
          - target_span_class: payload.validation
            name: gentoro.validation.payload.result
            attributes:
              vendor.step.outcome: pass
              vendor.validation.result: valid
          - target_span_class: policy.validation
            name: gentoro.validation.policy.decision
            attributes:
              vendor.step.outcome: pass
              vendor.policy.engine: abac
              vendor.policy.decision: allow_with_audit
              vendor.policy.rule.id: abac_207
              vendor.policy.reason: unusual_geo
              vendor.policy.severity: medium
          - target_span_class: augmentation.validation
            name: gentoro.augmentation.result
            attributes:
              vendor.step.outcome: pass
              vendor.augment.conversation_id.action: propagated
              vendor.augment.request_id.action: created
              vendor.augment.enduser_id.action: propagated
              vendor.augment.target_agent_id.action: attached
        vendor.enduser.request.raw: "I need to file a phone damage claim."
