# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: request_validation/policy_exception_fail_closed_blocked.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 1
# Interaction model: single ingress attempt; policy engine fail-closed block
# MCP / tools: none (control-plane short-circuit)
# Path: payload ok; policy evaluation exception → blocked
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: policy_exception_fail_closed_blocked
description: >
  Incoming request passes payload validation, but policy engine runtime failure
  triggers fail-closed behavior and blocks the request.

tags:
  - request-validation
  - control-plane
  - blocked
  - policy-exception
  - fail-closed

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 1.0
trace_interval_ms: 200
trace_interval_deviation_ms: 20
repeat_count: 1

# Fail-closed policy path: more conservative evaluation before block.
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 40, deviation: 15 }
      payload.validation: { mean: 24, deviation: 10 }
      policy.validation: { mean: 108, deviation: 40 }

default_latency_profile: normal

endusers:
  - id: user_h
    vendor.enduser.pseudo.id: "user_f2c9a0"
    turns:
      - turn_index: 1
        span_plan:
          cp_request:
            root: request.validation
            children:
              - payload.validation
              - policy.validation
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "Please start a phone damage claim for me."
          - target_span_class: request.validation
            name: gentoro.request.blocked
            attributes:
              vendor.request.outcome: blocked
              vendor.block.reason: request_policy
              vendor.policy.fail_mode: closed
          - target_span_class: payload.validation
            name: gentoro.validation.payload.result
            attributes:
              vendor.step.outcome: pass
              vendor.validation.result: valid
          - target_span_class: policy.validation
            name: gentoro.validation.policy.decision
            attributes:
              vendor.step.outcome: fail
              vendor.policy.engine: dlp
              vendor.policy.decision: block
              vendor.policy.reason: engine_error
              vendor.policy.severity: high
          - target_span_class: policy.validation
            name: exception
            attributes:
              error.type: policy_engine_timeout
              exception.type: PolicyEngineTimeout
              exception.message: policy_engine_timeout
              exception.escaped: false
        vendor.enduser.request.raw: "Please start a phone damage claim for me."
