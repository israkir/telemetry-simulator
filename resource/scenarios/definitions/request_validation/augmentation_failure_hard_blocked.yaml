# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: request_validation/augmentation_failure_hard_blocked.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 1
# Interaction model: single ingress attempt; blocked at augmentation.validation
# MCP / tools: none (no data_plane in span_plan)
# Path: payload + policy pass; augmentation fails — hard block
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: augmentation_failure_hard_blocked
description: >
  Incoming request passes payload and policy validation, but augmentation fails
  to bind required context and the request is blocked.

tags:
  - request-validation
  - control-plane
  - error
  - augmentation-failure
  - system-failure

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 1.0
trace_interval_ms: 200
trace_interval_deviation_ms: 20
repeat_count: 1

# Policy passes then augmentation/enrichment fails (extra downstream latency on that hop).
latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 40, deviation: 15 }
      payload.validation: { mean: 24, deviation: 10 }
      policy.validation: { mean: 78, deviation: 30 }
      augmentation.validation: { mean: 145, deviation: 55 }

default_latency_profile: normal

endusers:
  - id: user_i
    vendor.enduser.pseudo.id: "user_7d31e4"
    turns:
      - turn_index: 1
        span_plan:
          cp_request:
            root: request.validation
            children:
              - payload.validation
              - policy.validation
              - augmentation.validation
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "I need to report phone damage and open a claim."
          - target_span_class: request.validation
            name: gentoro.request.blocked
            attributes:
              vendor.request.outcome: error
              error.type: augmentation_bind_error
          - target_span_class: payload.validation
            name: gentoro.validation.payload.result
            attributes:
              vendor.step.outcome: pass
              vendor.validation.result: valid
          - target_span_class: policy.validation
            name: gentoro.validation.policy.decision
            attributes:
              vendor.step.outcome: pass
              vendor.policy.engine: dlp
              vendor.policy.decision: allow
          - target_span_class: augmentation.validation
            name: gentoro.augmentation.result
            attributes:
              vendor.step.outcome: fail
              error.type: augmentation_bind_error
              vendor.augment.conversation_id.action: propagated
              vendor.augment.request_id.action: created
              vendor.augment.enduser_id.action: propagated
              vendor.augment.target_agent_id.action: missing
          - target_span_class: augmentation.validation
            name: exception
            attributes:
              error.type: augmentation_bind_error
              exception.type: AugmentationBindError
              exception.message: augmentation_failed
              exception.escaped: false
        vendor.enduser.request.raw: "I need to report phone damage and open a claim."
