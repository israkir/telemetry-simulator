# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: request_validation/request_policy_blocked.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 1
# Interaction model: single ingress attempt; blocked at policy.validation
# MCP / tools: none (control-plane short-circuit)
# Path: payload pass; policy block (sensitive data / deny)
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: request_policy_blocked
description: >
  Incoming request is blocked during request validation because policy checks
  detect sensitive data and return a block decision.

tags:
  - normal
  - control-plane
  - blocked

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 1.0
trace_interval_ms: 200
trace_interval_deviation_ms: 20
repeat_count: 1

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: { mean: 40, deviation: 15 }
      payload.validation: { mean: 24, deviation: 10 }
      policy.validation: { mean: 78, deviation: 30 }

default_latency_profile: normal

endusers:
  - id: user_c
    vendor.enduser.pseudo.id: "user_8d2c41"
    turns:
      - turn_index: 1
        span_plan:
          cp_request:
            root: request.validation
            children:
              - payload.validation
              - policy.validation
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "Please open a phone damage claim for me."
          - target_span_class: request.validation
            name: gentoro.request.blocked
            attributes:
              vendor.request.outcome: blocked
              vendor.block.reason: request_policy
          - target_span_class: payload.validation
            name: gentoro.validation.payload.result
            attributes:
              vendor.step.outcome: pass
              vendor.validation.result: valid
          - target_span_class: policy.validation
            name: gentoro.validation.policy.decision
            attributes:
              vendor.step.outcome: fail
              vendor.policy.engine: dlp
              vendor.policy.decision: block
              vendor.policy.rule.id: dlp_013
              vendor.policy.reason: sensitive_data_detected
              vendor.policy.severity: high
        vendor.enduser.request.raw: "Please open a phone damage claim for me."
