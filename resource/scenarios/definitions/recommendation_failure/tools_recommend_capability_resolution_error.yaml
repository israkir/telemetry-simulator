# Tool recommendation (gentoro.tools.recommend) fails with capability resolution error.
# Span: status=ERROR, gentoro.step.outcome=fail, gentoro.mcp.tools.selected.count=0,
# error.type=capability_resolution_error, and exception event (CapabilityResolutionError).
# Simulated via goal: recommendation_failure.

name: tools_recommend_capability_resolution_error
description: >
  Tool recommendation step fails: gentoro.tools.recommend span has status=ERROR,
  gentoro.step.outcome=fail, gentoro.mcp.tools.selected.count=0, and
  error.type=capability_resolution_error with exception event
  (CapabilityResolutionError: Failed to evaluate MCP tool capabilities).

tags:
  - data-plane
  - recommendation-failure
  - tools-recommend
  - capability-resolution-error
  - phone

workload_weight: 0.5
interval_ms: 80
redaction_applied: none

data_plane:
  workflow: cancel_claim
  goal: recommendation_failure
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        to cancel a phone claim and attempt to select an appropriate MCP tool
        using the tools.recommend step.
      output: >
        PLAN:
          1) Call the gentoro.tools.recommend step to select the best MCP tool
             on server "phone" for cancelling the claim (for example, "cancel_claim").
          2) If tool recommendation fails with a capability resolution error,
             do not call any MCP tools and hand off to response composition to
             explain the failure to the end user.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of the failed tools.recommend step into a clear
        final response for the end user, briefly explaining that the assistant
        could not determine which internal tool to use and advising them what
        to do next.

scenario_overrides:
  # No MCP tool execute when tools.recommend fails — flow stops after tools_recommend.
  actual_steps:
    - planner
    - task
    - tools_recommend
    - response_compose
  exception_type: "CapabilityResolutionError"
  exception_message: "Failed to evaluate MCP tool capabilities"

context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - cancel_claim
  tool_call_arguments:
    cancel_claim:
      claim_id: "PH-8842"
      reason: "customer_requested"

conversation:
  external:
    user_input: "I want to cancel my phone claim PH-8842."
    agent_response: "I’m sorry, but I wasn’t able to resolve which internal tool to use to cancel your claim right now. I can’t complete the cancellation in this chat, so please try again later or contact support for help."
