name: _EXAMPLE_SCENARIO_
description: >
  Reference scenario for single-turn clustering-style data-plane flow.
  Mirrors the structure of single_turn_new_claim_* clustering scenarios.

# Scenario tags:
# - Used for filtering: `otelsim scenario list --tags=...` or `otelsim run --tags=...`.
# - Common values: `data-plane`, `control-plane`, `happy-path`, `higher-latency`, `clustering`, etc.
tags:
  - data-plane           # Data-plane trace driven by workflow in config.yaml → scenarios.workflow_templates
  - happy-path           # Uses scenarios.error_templates.happy_path (no induced errors)
  - clustering           # Shape/content suitable for trace or conversation clustering

# Relative weight when running mixed workloads (see docs/generating-telemetry.md).
# - Only used when running `otelsim run` with multiple scenarios loaded.
# - Probability of choosing this scenario is `workload_weight / Σ(all workload_weight)`.
workload_weight: 1.0

# Run behavior (per CLI invocation)
# - repeat_count: how many traces to emit for this scenario per run.
# - interval_ms: base delay between successive requests.
# - interval_deviation_ms: optional ± jitter around interval_ms for more realistic spacing.
repeat_count: 2
interval_ms: 100
interval_deviation_ms: 50

# Output controls
# - emit_metrics / emit_logs: enable OTEL metrics/logs alongside traces.
emit_metrics: true
emit_logs: true

# Redaction behavior for gen_ai.input/output.*.redacted.
# - Value comes from here; config defaults are only used when scenario omits it.
# - When != none, redacted fields from conversation (external or samples) are preferred.
redaction_applied: none

# Data-plane section:
# - workflow: key from resource/config/config.yaml → scenarios.workflow_templates
# - goal: key from scenarios.error_templates (e.g. happy_path, 4xx_invalid_arguments, wrong_division, ...)
# - latency_profile: key from latency_profiles; must align with goal (e.g. higher_latency ↔ higher_latency).
# - control_plane_template: key from control_plane.request_validation_templates.
data_plane:
  workflow: single_turn_new_claim_chain
  goal: happy_path
  latency_profile: happy_path
  control_plane_template: allowed
  llm_interactions:
    - role: planner
      system_prompt: >
        You are the Toro orchestration planner. Analyze the external request
        and produce a tool plan for starting a claim, finding slots, and
        booking an appointment.
      output: >
        PLAN:
          1) Call MCP tool "new_claim" on server "phone" with arguments from the external request
             (product_type=phone, incident_description, incident_date).
          2) Call MCP tool "get_available_slots" to fetch repair slots for the created claim.
          3) Call MCP tool "update_appointment" to book the slot closest to the requested time.
    - role: summarizer
      system_prompt: >
        Summarize the outcome of all tool calls into a final response for the end user.

# Conversation:
# - external: single-turn external exchange captured verbatim (for clustering / QA).
# - If omitted, the simulator falls back to config.yaml → conversation_samples[workflow] when present.
conversation:
  external:
    user_input: "Start a claim for my phone — I dropped it and the screen cracked. I’d like the Wednesday 9am slot if possible."
    agent_response: "I’ve created a claim for your phone and noted the cracked screen. Your claim ID is PH-8842. I’ve checked our repair schedule and Wednesday at 9am is available, so I’ve booked that for you. You’ll get a confirmation email shortly."

# Context:
# - tenant: key from config.yaml → tenants
# - agent: id from config.yaml → agents (must match a2a.agent.target.id)
# - mcp_server: key from config.yaml → mcp_servers (resolves to mcp_server_uuid + tools list)
# - tools: subset of tools configured for this mcp_server (names only; UUIDs come from config)
# - tool_call_arguments / tool_call_results: structured arguments/results per tool; serialized into
#   gen_ai.tool.call.arguments and MCP attempt spans for richer analysis.
context:
  tenant: toro
  agent: toro-customer-assistant-001
  mcp_server: phone
  tools:
    - new_claim
    - get_available_slots
    - update_appointment
  tool_call_arguments:
    new_claim:
      product_type: "phone"
      description: "Screen cracked after a drop down the stairs"
      incident_date: "2025-03-10"
    get_available_slots:
      claim_id: "PH-8842"
      from_date: "2025-03-12"
      to_date: "2025-03-20"
    update_appointment:
      claim_id: "PH-8842"
      slot: "2025-03-12T09:00:00Z"
      reason: "initial_booking"
  tool_call_results:
    new_claim:
      claim_id: "PH-8842"
      product_type: "phone"
      status: "opened"
      coverage:
        type: "phone_screen_damage"
        deductible: 75
      notes: "Claim created for cracked phone screen after drop down the stairs."
    get_available_slots:
      claim_id: "PH-8842"
      timezone: "UTC"
      slots:
        - start: "2025-03-12T09:00:00Z"
          end: "2025-03-12T11:00:00Z"
          status: "available"
        - start: "2025-03-13T13:00:00Z"
          end: "2025-03-13T15:00:00Z"
          status: "available"
    update_appointment:
      claim_id: "PH-8842"
      appointment:
        start: "2025-03-12T09:00:00Z"
        end: "2025-03-12T11:00:00Z"
        status: "booked"
      confirmation_id: "PH-8842-APT-1"
      reason: "initial_booking"
