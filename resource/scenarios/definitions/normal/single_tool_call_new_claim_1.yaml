# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: normal/single_tool_call_new_claim_1.yaml
# Endusers: 20 | Conversation threads: 20 | Total user turns: 20 (1 per enduser)
# Interaction model: single-turn per enduser — one user message → one agent response each
# MCP: exactly one tool per turn (tool_chain length 1); new_claim only; mixed mcp_server
# Data plane: shared span_plan anchor (*new_claim_span_plan) for all turns
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: single_tool_call_new_claim_1
description: >
  Twenty single-turn Toro flows, all new_claim intakes: seven phone, seven electronics,
  and six appliances.
  Each enduser routes to the correct department MCP; default MCP server at scenario
  level is phone.

tags:
- normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 3.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 3}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 12, deviation: 5}
      augmentation.validation: {mean: 6, deviation: 2}
      a2a.orchestrate: {mean: 1200, deviation: 200}
      planner: {mean: 380, deviation: 90}
      llm.call: {mean: 320, deviation: 80}
      task.execute: {mean: 600, deviation: 120}
      tools.recommend: {mean: 45, deviation: 15}
      mcp.tool.execute: {mean: 180, deviation: 50}
      response.compose: {mean: 280, deviation: 70}
      response.validation: {mean: 10, deviation: 4}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 12, deviation: 5}
      payload.validation: {mean: 8, deviation: 3}
      policy.validation: {mean: 18, deviation: 6}
      augmentation.validation: {mean: 10, deviation: 4}
      a2a.orchestrate: {mean: 2200, deviation: 400}
      planner: {mean: 620, deviation: 140}
      llm.call: {mean: 520, deviation: 120}
      task.execute: {mean: 950, deviation: 200}
      tools.recommend: {mean: 70, deviation: 25}
      mcp.tool.execute: {mean: 320, deviation: 90}
      response.compose: {mean: 450, deviation: 100}
      response.validation: {mean: 14, deviation: 5}

default_latency_profile: normal

x_new_claim_span_plan: &new_claim_span_plan
  cp_request:
    root: request.validation
    children:
    - payload.validation
    - policy.validation
    - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
    - planner
    - task.execute
    - llm.call
    - tools.recommend
    - mcp.tool.execute
    - mcp.tool.execute.attempt
    - response.compose
  cp_response:
    root: response.validation
    children:
    - policy.validation

endusers:
# --- Mobile / phone MCP ---
- id: dept_phone_frame_charge_port
  vendor.enduser.pseudo.id: "user_ph_nc1_01"
  channel: web
  mcp_server: phone
  turns:
  - turn_index: 1
    span_plan: *new_claim_span_plan
    vendor.enduser.request.raw: >
      I think I bent my phone when it was in my back pocket — now the frame pinches
      the USB-C port
      and charging only works if I press the cable upward. Can you open a mobile damage
      claim on my Toro cover?
    span_events:
    - target_span_class: request.validation
      name: gentoro.enduser.request
      attributes:
        vendor.enduser.request.raw: >
          I think I bent my phone when it was in my back pocket — now the frame pinches
          the USB-C port
          and charging only works if I press the cable upward. Can you open a mobile
          damage claim on my Toro cover?
    - target_span_class: response.validation
      name: gentoro.agent.response
      attributes:
        vendor.agent.response.raw: >
          PH-8211 is open for your handset: frame deformation affecting the USB-C
          port with intermittent charging.
          Please upload a close-up of the port and frame seam; we will confirm repair
          eligibility.
    - target_span_class: tools.recommend
      name: gentoro.agent.tool_selection
      attributes:
        vendor.agent.tool_selection.input.raw: |
          I think I bent my phone when it was in my back pocket — now the frame pinches the USB-C port
          and charging only works if I press the cable upward. Can you open a mobile damage claim on my Toro cover?
        vendor.agent.tool_selection.tool.plan: |
          {"tool_plan": [{"tool_name": "new_claim", "trigger_summary": "Back-pocket bend; misaligned USB-C; intermittent charge.", "trigger_quote": "bent my phone when it was in my back pocket", "missing_info": null, "confidence": 0.91, "tool_args": {"product_type": "phone", "description": "Frame bent after back-pocket carry; USB-C port misaligned; charging only when cable angled.", "incident_date": "2026-03-18"}}]}
    agent_response: >
      PH-8211 is open for your handset: frame deformation affecting the USB-C port
      with intermittent charging.
      Please upload a close-up of the port and frame seam; we will confirm repair
      eligibility.
    tool_chain: [new_claim]
    gen_ai.request.type: completion
    gen_ai.response.finish_reason: stop
    gen_ai.usage.input_tokens: 1080
    gen_ai.usage.output_tokens: 168
    gentoro.llm.streaming: false
    gentoro.llm.content.capture.enabled: true
    gentoro.llm.content.redaction.enabled: false
    gen_ai.tool.call.arguments:
      new_claim:
        product_type: "phone"
        description: "Frame bent after back-pocket carry; USB-C port misaligned; charging
          only when cable angled."
        incident_date: "2026-03-18"
    gen_ai.tool.call.result:
      new_claim:
        claim_id: "PH-8211"
        product_type: "phone"
        status: "opened"
        coverage: {type: "phone_physical_damage", deductible: 75}
        notes: "Phone MCP; port photo emphasis."
    planner:
      system_prompt: >
        Toro planner on phone MCP — new_claim for bent frame / charge port.
      output: >
        PLAN: new_claim on phone, product_type phone, incident_date 2026-03-18.
    response_compose:
      system_prompt: >
        Professional tone; PH-8211; photo guidance for port.
