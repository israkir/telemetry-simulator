# =============================================================================
# SCENARIO MANIFEST (human + LLM)
# =============================================================================
# File: normal/new_claim_phone_multi_turn.yaml
# Endusers: 1 | Conversation threads: 1 | Total user turns: 1
# Interaction model: single-turn — one user message; full tool chain in one orchestration
# MCP: phone — four tools in one orchestration (new_claim → claim_status →
#   get_available_slots → update_appointment)
# Data plane: full span_plan; one request_id with sequential MCP executions
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================
#
# Single enduser, one message (combined utterances) driving the full repair-intake flow in
# a single LLM orchestration pass.

name: claim_phone_multiturn
description: >
  Single-turn phone support: one message opens a screen-damage claim, checks status after photos,
  lists afternoon repair slots, and reschedules the repair — four tools in one orchestration.

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 3.0
trace_interval_ms: 250
trace_interval_deviation_ms: 60

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 3}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 12, deviation: 5}
      augmentation.validation: {mean: 6, deviation: 2}
      a2a.orchestrate: {mean: 1100, deviation: 180}
      planner: {mean: 360, deviation: 80}
      llm.call: {mean: 300, deviation: 70}
      task.execute: {mean: 550, deviation: 100}
      tools.recommend: {mean: 42, deviation: 14}
      mcp.tool.execute: {mean: 160, deviation: 45}
      response.compose: {mean: 260, deviation: 65}
      response.validation: {mean: 10, deviation: 4}

default_latency_profile: normal

x_phone_span_plan: &phone_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  - id: user_multiturn_01
    vendor.enduser.pseudo.id: "user_mt_rina_88"
    channel: "web_chat"
    turns:
      # Turn 1 — open claim
      - span_plan: *phone_span_plan
        turn_index: 1
        vendor.enduser.request.raw: "Hi, I cracked my phone screen yesterday when
          it slid off the armrest. Touch still works in most places. Can you start
          a damage claim for me?\n\nThanks — I just uploaded the photos. Where does
          claim CLAIM-PH-MT-9001 stand now? Am I waiting on an assessor or can I book
          already?\n\nI booked repair online — appointment APT-MT-9001 on claim CLAIM-PH-MT-9001
          — but Tuesday 9am is impossible with school drop-off. What afternoon slots
          do you have that day at the same store?\n\nPlease move APT-MT-9001 to Tuesday
          15:00 at the same store — that works with school drop-off."
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: "Hi, I cracked my phone screen yesterday
                when it slid off the armrest. Touch still works in most places. Can
                you start a damage claim for me?\n\nThanks — I just uploaded the photos.
                Where does claim CLAIM-PH-MT-9001 stand now? Am I waiting on an assessor
                or can I book already?\n\nI booked repair online — appointment APT-MT-9001
                on claim CLAIM-PH-MT-9001 — but Tuesday 9am is impossible with school
                drop-off. What afternoon slots do you have that day at the same store?\n\
                \nPlease move APT-MT-9001 to Tuesday 15:00 at the same store — that
                works with school drop-off."
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                All set — I moved appointment APT-MT-9001 for claim CLAIM-PH-MT-9001
                to Tuesday 15:00 at the
                same location. You should see the updated time in the app and get
                a confirmation text within
                a few minutes.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: "Hi, I cracked my phone screen
                yesterday when it slid off the armrest. Touch still works in most
                places. Can you start a damage claim for me?\n\nThanks — I just uploaded
                the photos. Where does claim CLAIM-PH-MT-9001 stand now? Am I waiting
                on an assessor or can I book already?\n\nI booked repair online —
                appointment APT-MT-9001 on claim CLAIM-PH-MT-9001 — but Tuesday 9am
                is impossible with school drop-off. What afternoon slots do you have
                that day at the same store?\n\nPlease move APT-MT-9001 to Tuesday
                15:00 at the same store — that works with school drop-off.\n"
              vendor.agent.tool_selection.tool.plan: "{\"tool_plan\":[{\"tool_name\"\
                :\"new_claim\",\"trigger_summary\":\"I want to file a claim \\u2014
                Screen crack after slide from armrest; partial touch OK.\",\"trigger_quote\"\
                :\"I want to file a claim \\u2014 I cracked my phone screen yesterday
                when it slid off the armrest\",\"missing_info\":null,\"confidence\"\
                :0.92,\"tool_args\":{\"product_type\":\"phone\",\"description\":\"\
                Screen cracked after sliding off armrest; touch mostly functional.\"\
                ,\"incident_date\":\"2026-03-21\"}},{\"tool_name\":\"claim_status\"\
                ,\"trigger_summary\":\"Follow-up on claim CLAIM-PH-MT-9001 after photo
                upload; booking readiness.\",\"trigger_quote\":\"Where does claim
                CLAIM-PH-MT-9001 stand now?\",\"missing_info\":null,\"confidence\"\
                :0.94,\"tool_args\":{\"claim_id\":\"CLAIM-PH-MT-9001\"}},{\"tool_name\"\
                :\"get_available_slots\",\"trigger_summary\":\"Afternoon screen repair
                slots same store for claim CLAIM-PH-MT-9001 on booked date.\",\"trigger_quote\"\
                :\"What afternoon slots\",\"missing_info\":null,\"confidence\":0.92,\"\
                tool_args\":{\"claim_id\":\"CLAIM-PH-MT-9001\",\"service_type\":\"\
                screen_repair_visit\",\"date_range_start\":\"2026-03-24\",\"date_range_end\"\
                :\"2026-03-24\"}},{\"tool_name\":\"update_appointment\",\"trigger_summary\"\
                :\"Reschedule APT-MT-9001 to listed afternoon slot same day/store.\"\
                ,\"trigger_quote\":\"Tuesday 15:00 at the same store\",\"missing_info\"\
                :null,\"confidence\":0.9,\"tool_args\":{\"claim_id\":\"CLAIM-PH-MT-9001\"\
                ,\"appointment_id\":\"APT-MT-9001\",\"slot_id\":\"SLOT-2026-03-24T15:00\"\
                ,\"preferred_time_window\":\"afternoon\"}}]}\n"
        agent_response: >
          All set — I moved appointment APT-MT-9001 for claim CLAIM-PH-MT-9001 to
          Tuesday 15:00 at the
          same location. You should see the updated time in the app and get a confirmation
          text within
          a few minutes.
        tool_chain:
          - new_claim
          - claim_status
          - get_available_slots
          - update_appointment
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 4170
        gen_ai.usage.output_tokens: 603
        gentoro.llm.streaming: false
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "phone"
            description: "Screen cracked after sliding off armrest; touch mostly functional."
            incident_date: "2026-03-21"
          claim_status:
            claim_id: "CLAIM-PH-MT-9001"
          get_available_slots:
            claim_id: "CLAIM-PH-MT-9001"
            service_type: "screen_repair_visit"
            date_range_start: "2026-03-24"
            date_range_end: "2026-03-24"
          update_appointment:
            claim_id: "CLAIM-PH-MT-9001"
            appointment_id: "APT-MT-9001"
            slot_id: "SLOT-2026-03-24T15:00"
            preferred_time_window: "afternoon"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: "CLAIM-PH-MT-9001"
            product_type: "phone"
            status: "opened"
            coverage:
              type: "phone_screen_damage"
              deductible: 75
            notes: "Customer to upload photos; SMS with repair link pending intake."
          claim_status:
            claim_id: "CLAIM-PH-MT-9001"
            status: "in_review"
            last_updated: "2026-03-22T11:40:00Z"
            milestones:
              - intake_complete
              - photos_received
              - assessor_assigned
          get_available_slots:
            claim_id: "CLAIM-PH-MT-9001"
            slots:
              - slot_id: "SLOT-2026-03-24T15:00"
                duration_minutes: 90
              - slot_id: "SLOT-2026-03-24T17:00"
                duration_minutes: 90
            timezone: "America/Los_Angeles"
          update_appointment:
            claim_id: "CLAIM-PH-MT-9001"
            appointment_id: "APT-MT-9001"
            status: "rescheduled"
            scheduled_at: "2026-03-24T15:00:00Z"
        planner:
          system_prompt: "You are the Toro orchestration planner for user_mt_rina_88
            (turn 1 of an ongoing chat). Open a phone damage claim from the user's
            message.\n\nYou are the Toro orchestration planner. Same chat session
            as prior turn; user follows up on claim CLAIM-PH-MT-9001 after uploading
            photos.\n\nYou are the Toro orchestration planner. Same session; user
            needs afternoon options before rescheduling APT-MT-9001 for claim CLAIM-PH-MT-9001.\n\
            \nYou are the Toro orchestration planner. Same session; user reschedules
            an existing appointment tied to claim CLAIM-PH-MT-9001 after slots were
            listed."
          output: "PLAN:\n  1) Call MCP tool \"new_claim\" on server \"phone\" with
            product_type=phone, description, incident_date.\n  2) Confirm claim id,
            photo upload, and SMS booking link expectation.\n\nPLAN:\n  1) Call \"\
            claim_status\" with claim_id CLAIM-PH-MT-9001.\n  2) Explain current milestone
            and whether booking is allowed.\n\nPLAN:\n  1) Call \"get_available_slots\"\
            \ for the booked service date and afternoon window.\n  2) Offer concrete
            times; wait for explicit slot choice on the next turn.\n\nPLAN:\n  1)
            Call \"update_appointment\" with claim_id, appointment_id, new slot, preferred_time_window.\n\
            \  2) Confirm new time and notification expectations."
        response_compose:
          system_prompt: "Friendly assistant: confirm claim opened, give claim CLAIM-PH-MT-9001,
            set expectations for photos and SMS.\n\nConcise status summary; reassure
            photos were received; mention SMS booking link and offer help if slots
            are poor.\n\nTwo slot choices; invite the user to name one for the following
            turn.\n\nConfident closure tone: confirm new slot 15:00, same store, SMS
            confirmation soon."
        gentoro.llm.turn.count: 4
