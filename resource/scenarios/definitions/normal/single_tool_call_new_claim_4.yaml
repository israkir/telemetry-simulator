          Caught in heavy rain with the phone in my jacket — dried it quickly but the OLED now has a green-grey tint on greys and low-brightness banding that was not there before.
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
