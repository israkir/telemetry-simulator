              vendor.agent.tool_selection.input.raw: "Used the phone briefly underwater in a hotel pool deeper than the rated depth — microphones gurgle, wireless charging is dead, and the under-glass fingerprint reader errors every time."
              vendor.agent.tool_selection.tool.plan: |
