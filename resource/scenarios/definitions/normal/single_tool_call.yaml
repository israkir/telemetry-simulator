# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: normal/single_tool_call.yaml
# Endusers: 30 | Conversation threads: 30 | Total user turns: 30 (1 per enduser)
# Interaction model: single-turn per enduser — one user message → one agent response each
# MCP: exactly one tool per turn (tool_chain length 1); mixed mcp_server by enduser
# Data plane: shared span_plan anchor (*new_claim_span_plan) for all turns
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: single_tool_call
description: >
  Thirty single-turn Toro flows: fifteen new_claim intakes (phone, electronics, appliances)
  plus fifteen
  flows for claim status, appointments, document upload, payment, claim cancellation,
  booking slots,
  insurance choice and purchase, and product cancellation. Each enduser sets mcp_server
  for the
  correct department; default MCP server at scenario level is phone.

tags:
  - normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 3.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 3}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 12, deviation: 5}
      augmentation.validation: {mean: 6, deviation: 2}
      a2a.orchestrate: {mean: 1200, deviation: 200}
      planner: {mean: 380, deviation: 90}
      llm.call: {mean: 320, deviation: 80}
      task.execute: {mean: 600, deviation: 120}
      tools.recommend: {mean: 45, deviation: 15}
      mcp.tool.execute: {mean: 180, deviation: 50}
      response.compose: {mean: 280, deviation: 70}
      response.validation: {mean: 10, deviation: 4}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 12, deviation: 5}
      payload.validation: {mean: 8, deviation: 3}
      policy.validation: {mean: 18, deviation: 6}
      augmentation.validation: {mean: 10, deviation: 4}
      a2a.orchestrate: {mean: 2200, deviation: 400}
      planner: {mean: 620, deviation: 140}
      llm.call: {mean: 520, deviation: 120}
      task.execute: {mean: 950, deviation: 200}
      tools.recommend: {mean: 70, deviation: 25}
      mcp.tool.execute: {mean: 320, deviation: 90}
      response.compose: {mean: 450, deviation: 100}
      response.validation: {mean: 14, deviation: 5}

default_latency_profile: normal

x_new_claim_span_plan: &new_claim_span_plan
  cp_request:
    root: request.validation
    children:
      - payload.validation
      - policy.validation
      - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
      - planner
      - task.execute
      - llm.call
      - tools.recommend
      - mcp.tool.execute
      - mcp.tool.execute.attempt
      - response.compose
  cp_response:
    root: response.validation
    children:
      - policy.validation

endusers:
  # --- Mobile / phone MCP ---
  - id: dept_phone_web_drop
    vendor.enduser.pseudo.id: "user_ph_web_01"
    channel: web
    mcp_server: phone
    turns:
      - turn_index: 1
        span_plan: *new_claim_span_plan
        vendor.enduser.request.raw: >
          I dropped my phone on the platform this morning — cracked glass and it reboots
          in a loop.
          Please open a claim under my Toro mobile cover and book the repair visit
          for the afternoon
          (any time is fine).
        span_events:
          - target_span_class: request.validation
            name: gentoro.enduser.request
            attributes:
              vendor.enduser.request.raw: >
                I dropped my phone on the platform this morning — cracked glass and
                it reboots in a loop.
                Please open a claim under my Toro mobile cover and book the repair
                visit for the afternoon
                (any time is fine).
          - target_span_class: response.validation
            name: gentoro.agent.response
            attributes:
              vendor.agent.response.raw: >
                I could not complete that yet — the scheduling API needs a concrete
                time (for example 14:00–16:00)
                or a slot id, not only “afternoon.” Tell me a specific window and
                I will open the claim and book.
          - target_span_class: tools.recommend
            name: gentoro.agent.tool_selection
            attributes:
              vendor.agent.tool_selection.input.raw: |
                I dropped my phone on the platform this morning — cracked glass and it reboots in a loop.
                Please open a claim under my Toro mobile cover and book the repair visit for the afternoon
                (any time is fine).
              vendor.agent.tool_selection.tool.plan: |
                {"tool_plan": [{"tool_name": "new_claim", "trigger_summary": "Platform drop; cracked glass; boot loop; vague afternoon repair.", "trigger_quote": "open a claim ... afternoon (any time is fine)", "missing_info": null, "confidence": 0.92, "tool_args": {"product_type": "phone", "description": "Dropped on platform; cracked glass; device boot loops.", "incident_date": "2026-04-08", "scheduling_time_resolution": "ambiguous_day_part", "preferred_time_window": "afternoon"}}]}
        agent_response: >
          I could not complete that yet — the scheduling API needs a concrete time
          (for example 14:00–16:00)
          or a slot id, not only “afternoon.” Tell me a specific window and I will
          open the claim and book.
        tool_chain: [new_claim]
        mcp_tool_retries:
          new_claim:
            attempts:
              - outcome: fail
                error.type: invalid_arguments
        gen_ai.request.type: completion
        gen_ai.response.finish_reason: stop
        gen_ai.usage.input_tokens: 1180
        gen_ai.usage.output_tokens: 178
        gentoro.llm.streaming: false
        gentoro.llm.content.capture.enabled: true
        gentoro.llm.content.redaction.enabled: false
        gen_ai.tool.call.arguments:
          new_claim:
            product_type: "phone"
            description: "Dropped on platform; cracked glass; device boot loops."
            incident_date: "2026-04-08"
            scheduling_time_resolution: "ambiguous_day_part"
            preferred_time_window: "afternoon"
        gen_ai.tool.call.result:
          new_claim:
            claim_id: ""
            product_type: "phone"
            status: "error"
            coverage: {}
            notes: ""
            error_code: "ambiguous_scheduling_time"
            error_message: "preferred_time_window must be a concrete clock window
              or slot_id when scheduling_time_resolution is ambiguous_day_part"
        planner:
          system_prompt: >
            Toro planner: user_ph_web_01 on phone MCP — new_claim rejected: ambiguous
            afternoon only.
          output: >
            PLAN: new_claim with scheduling_time_resolution ambiguous_day_part — expect
            MCP invalid_arguments; ask for concrete window.
        response_compose:
          system_prompt: >
            Explain validation error in plain language; ask for a specific time band
            or slot.

