# =============================================================================
# SCENARIO MANIFEST
# =============================================================================
# File: normal/single_tool_call_new_claim_3.yaml
# Endusers: 15 | Conversation threads: 15 | Total user turns: 15 (1 per enduser)
# Interaction model: single-turn per enduser — one user message → one agent response each
# MCP: exactly one tool per turn (tool_chain length 1); new_claim only; mixed mcp_server
# Data plane: shared span_plan anchor (*new_claim_span_plan) for all turns
#
# --- LLM / MAINTAINER ---
# Checklist: resource/scenarios/conventions/scenario_authoring_checklist.txt
# =============================================================================

name: single_tool_call_new_claim_3
description: >
  Fifteen single-turn Toro flows, all new_claim intakes: five phone, five electronics,
  and five appliances.
  Each enduser routes to the correct department MCP; default MCP server at scenario
  level is phone.

tags:
- normal

tenant: toro
agent: toro-customer-assistant-001
mcp_server: phone

vendor.redaction.applied: none

workload_weight: 3.0
trace_interval_ms: 200
trace_interval_deviation_ms: 50

latency_profiles:
  normal:
    span_durations_ms:
      request.validation: {mean: 8, deviation: 3}
      payload.validation: {mean: 5, deviation: 2}
      policy.validation: {mean: 12, deviation: 5}
      augmentation.validation: {mean: 6, deviation: 2}
      a2a.orchestrate: {mean: 1200, deviation: 200}
      planner: {mean: 380, deviation: 90}
      llm.call: {mean: 320, deviation: 80}
      task.execute: {mean: 600, deviation: 120}
      tools.recommend: {mean: 45, deviation: 15}
      mcp.tool.execute: {mean: 180, deviation: 50}
      response.compose: {mean: 280, deviation: 70}
      response.validation: {mean: 10, deviation: 4}
  peak_hours:
    span_durations_ms:
      request.validation: {mean: 12, deviation: 5}
      payload.validation: {mean: 8, deviation: 3}
      policy.validation: {mean: 18, deviation: 6}
      augmentation.validation: {mean: 10, deviation: 4}
      a2a.orchestrate: {mean: 2200, deviation: 400}
      planner: {mean: 620, deviation: 140}
      llm.call: {mean: 520, deviation: 120}
      task.execute: {mean: 950, deviation: 200}
      tools.recommend: {mean: 70, deviation: 25}
      mcp.tool.execute: {mean: 320, deviation: 90}
      response.compose: {mean: 450, deviation: 100}
      response.validation: {mean: 14, deviation: 5}

default_latency_profile: normal

x_new_claim_span_plan: &new_claim_span_plan
  cp_request:
    root: request.validation
    children:
    - payload.validation
    - policy.validation
    - augmentation.validation
  data_plane:
    root: a2a.orchestrate
    children:
    - planner
    - task.execute
    - llm.call
    - tools.recommend
    - mcp.tool.execute
    - mcp.tool.execute.attempt
    - response.compose
  cp_response:
    root: response.validation
    children:
    - policy.validation

endusers:
# --- Mobile / phone MCP ---
- id: dept_phone_kernel_panic
  vendor.enduser.pseudo.id: "user_ph_nc3_01"
  channel: web
  mcp_server: phone
  turns:
  - turn_index: 1
    span_plan: *new_claim_span_plan
    vendor.enduser.request.raw: >
      Phone reboots three or four times a day with a kernel panic screen I can barely
      snap — started right after a security patch. No new case drops. I need a Toro
      hardware claim.
    span_events:
    - target_span_class: request.validation
      name: gentoro.enduser.request
      attributes:
        vendor.enduser.request.raw: >
          Phone reboots three or four times a day with a kernel panic screen I can
          barely snap — started right after a security patch. No new case drops. I
          need a Toro hardware claim.
    - target_span_class: response.validation
      name: gentoro.agent.response
      attributes:
        vendor.agent.response.raw: "PH-8231 is open for instability presenting as
          recurring kernel panics after a security update. Back up if still bootable;
          capture the panic text when safe; diagnostics will verify memory or board
          fault."
    - target_span_class: tools.recommend
      name: gentoro.agent.tool_selection
      attributes:
        vendor.agent.tool_selection.input.raw: "Phone reboots three or four times
          a day with a kernel panic screen I can barely snap — started right after
          a security patch. No new case drops. I need a Toro hardware claim."
        vendor.agent.tool_selection.tool.plan: |
          {"tool_plan": [{"tool_name": "new_claim", "trigger_summary": "Post-patch kernel panics; random reboots.", "trigger_quote": "reboots three or four times a day", "missing_info": null, "confidence": 0.84, "tool_args": {"product_type": "phone", "description": "Frequent unexpected reboots with kernel panic screen following OTA security update; no new physical damage reported.", "incident_date": "2026-04-10"}}]}
    agent_response: "PH-8231 is open for instability presenting as recurring kernel
      panics after a security update. Back up if still bootable; capture the panic
      text when safe; diagnostics will verify memory or board fault."
    tool_chain: [new_claim]
    gen_ai.request.type: completion
    gen_ai.response.finish_reason: stop
    gen_ai.usage.input_tokens: 1060
    gen_ai.usage.output_tokens: 162
    gentoro.llm.streaming: false
    gentoro.llm.content.capture.enabled: true
    gentoro.llm.content.redaction.enabled: false
    gen_ai.tool.call.arguments:
      new_claim:
        product_type: "phone"
        description: "Frequent unexpected reboots with kernel panic screen following
          OTA security update; no new physical damage reported."
        incident_date: "2026-04-10"
    gen_ai.tool.call.result:
      new_claim:
        claim_id: "PH-8231"
        product_type: "phone"
        status: "opened"
        coverage: {type: "phone_mechanical_breakdown", deductible: 60}
        notes: "Stability intake; capture panic string."
    planner:
      system_prompt: >
        Phone MCP — post-update crash loop intake.
      output: >
        PLAN: new_claim product_type phone.
    response_compose:
      system_prompt: >
        PH-8231; backup if possible.
