# Shared scenarios configuration (ID formats and settings).
# Loaded by ScenarioLoader; ID generation uses these programmatic format definitions.
#
# Trace / Session / Conversation (semantic conventions):
#   - Trace ID (trace_id): One user turn with child spans. Generated by the OTEL SDK per trace;
#     exactly 32 hex chars. Not configured here.
#   - Session ({prefix}.session.id): First-class; one logical interaction that may encompass one or
#     more traces. All spans for that interaction carry the same value. Propagated via Baggage in
#     production; here generated per trace from id_formats.session_id when using ScenarioLoader.
#   - Conversation (gen_ai.conversation.id): OTEL GenAI; SHOULD equal {prefix}.session.id for the
#     same conversation. The simulator sets both from the same context.session_id so they match.
#
# Conventions (DB-compliant values):
#   Attribute / field              | Config key / source       | Format / note
#   -------------------------------|---------------------------|-------------------------------
#   {prefix}.tenant.id             | tenant.id / context       | Must be UUID; predefined below or from scenario context.
#   {prefix}.a2a.agent.target.id   | agents[].id / context     | Must match agents.agent_id (normalized); predefined below.
#   agent_uuid_resolved            | ingestion                 | From agents.id; set by ingestion (not generated here).
#   {prefix}.mcp.server.uuid       | mcp_servers.*             | Must be UUID (mcp_servers.id); from mcp_servers config.
#   {prefix}.mcp.tool.uuid         | mcp_servers.*.tools[]     | Must be UUID (mcp_tools.id); from mcp_servers config.
#   {prefix}.session.id            | session_id                | No UUID requirement; e.g. sess_toro_abc123.
#   {prefix}.mcp.tool.call.id      | mcp_tool_call_id          | One per logical MCP tool call (parent + attempt share it).
#   trace_id                       | OTEL SDK                  | Exactly 32 hex chars (SDK-generated).
#   span_id                        | OTEL SDK                  | Exactly 16 hex chars (SDK-generated).
#
# Template placeholders:
#   {hex:N}   - N random hexadecimal characters (e.g. {hex:12})
#   {uuid}    - full UUID with dashes (e.g. a1b2c3d4-1111-4eec-94d6-8f539b31b0ee)
#   {tenant_id} - current tenant id from scenario context (when provided)

id_formats:
  # {prefix}.session.id – no UUID requirement; all spans in same logical interaction carry this
  session_id: "sess_toro_{hex:12}"
  # gen_ai.conversation.id – SHOULD equal session_id for same conversation (OTEL GenAI)
  conversation_id: "sess_toro_{hex:12}"
  # {prefix}.request.id – no UUID requirement
  request_id: "req_{hex:6}"
  # {prefix}.mcp.tool.call.id – one per logical MCP tool call
  mcp_tool_call_id: "mcp_call_{hex:12}"

# -----------------------------------------------------------------------------
# Happy-path context flow latencies (ms)
# -----------------------------------------------------------------------------
# These control the default mean latencies for spans generated from
# ScenarioContext.correct_flow. When omitted, the simulator falls back to
# convention-aligned defaults defined in scenario_loader.py.
#
# Keys:
#   a2a_orchestrate   -> SpanType.A2A_ORCHESTRATE
#   planner           -> SpanType.PLANNER
#   mcp_tool_execute  -> SpanType.MCP_TOOL_EXECUTE
#   response_compose  -> SpanType.RESPONSE_COMPOSE

happy_path_latencies_ms:
  a2a_orchestrate: 1500.0
  planner: 250.0
  mcp_tool_execute: 150.0
  response_compose: 60.0

# -----------------------------------------------------------------------------
# Resource attributes (OTEL resource; used for all spans/metrics/logs)
# -----------------------------------------------------------------------------
# tenant.id is always injected from tenant.id below at runtime.
# Prefix-relative keys (module, component, otel.source) are expanded with VENDOR prefix.

resource:
  schema_url: "https://gentoro.ai/otel/schema/enterprise/1.0.0"
  attributes:
    service.name: "gentoro-enterprise"
    service.version: "1.2.0"
    service.instance.id: "pod-7f9c6d4b8d-xyz12"
    deployment.environment.name: "prod"
    module: "data-plane"
    component: "gateway-ext"
    otel.source: "propagated"

# -----------------------------------------------------------------------------
# Predefined tenant ({prefix}.tenant.id must be UUID for matching/aggregation)
# -----------------------------------------------------------------------------
# Scenario context references this tenant id. display_name is for UI/logging.

tenant:
  id: "9cafa427-504f-4bb7-a09f-ec1f5524facf"
  display_name: "Toro Insurance"

# -----------------------------------------------------------------------------
# Predefined agents ({prefix}.a2a.agent.target.id; must match agents.agent_id for tenant)
# -----------------------------------------------------------------------------
# Scenario context references these agent ids on root/orchestrate spans.

agents:
  - id: "toro-customer-assistant-001"

