# Phone MCP context, happy path: LLM call → tool recommendation (from LLM result) → tool execution.
# Toro Insurance: customer (Phone only) starts a claim; agent uses Phone backend (mcp_server).
#
# Trace structure: each task type has its own task.execute parent.
#   a2a.orchestrate
#   ├── planner
#   ├── task.execute (llm_call) → llm.call
#   ├── task.execute (tool_recommendation) → tools.recommend
#   ├── task.execute (tool_execution) → mcp.tool.execute → mcp.tool.execute.attempt
#   └── response.compose
#
# Run: telemetry-simulator scenario --name phone_new_claim_happy --count 5
#      telemetry-simulator run  (uses this when selected in mixed workload)

name: phone_new_claim_happy
description: >
  Happy path for Phone mcp_server: planner → LLM task (task→llm.call) →
  tool recommendation (task→tools.recommend, after LLM result) →
  tool execution (task→mcp.tool.execute new_claim) → response_compose.

simulation_goal: happy_path
mcp_server: phone

repeat_count: 5
interval_ms: 100
interval_deviation_ms: 50   # delay = 100 ± 50 ms (random)
emit_metrics: false
emit_logs: false

redaction_applied: none

# Flow is expressed in context; hierarchy is built from correct_flow.steps.
context:
  tenant_uuid: "9cafa427-504f-4bb7-a09f-ec1f5524facf"
  workflow: "new_claim"
  correct_flow:
    steps:
      - planner
      - task              # → task.execute (llm_call) → llm.call
      - tools_recommend   # → task.execute (tool_recommendation) → tools.recommend (after LLM result)
      - new_claim         # → task.execute (tool_execution) → mcp.tool.execute
      - response_compose
  error_pattern: happy_path
  agents:
    - uuid: "toro-customer-assistant-001"
      mcp:
        - server_uuid: "11111111-1111-4eec-8001-000000000001"
          tools:
            - name: new_claim
              uuid: "11111111-1111-4eec-8001-000000000011"
