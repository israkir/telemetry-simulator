# Simplest case: Phone MCP server context, happy path – one tool call (new_claim).
# Toro Insurance: customer (Phone only) starts a claim; agent uses Phone backend (mcp_server).
#
# Run: telemetry-simulator scenario --name phone_new_claim_happy --count 5

name: phone_new_claim_happy
description: >
  Happy path for Phone mcp_server context: planner → task → new_claim → response_compose.
  Single tool call; simulation goal and mcp_server are defined in this file.

simulation_goal: happy_path
mcp_server: phone

tags:
  - phone
  - happy_path
  - toro

repeat_count: 5
interval_ms: 100
interval_deviation_ms: 50   # delay = 100 ± 50 ms (random)
emit_metrics: false
emit_logs: false

# Redaction level for {prefix}.redaction.applied (none, basic, strict). Default: none.
redaction_applied: none

# Happy-path flow is expressed in context; hierarchy is built from correct_flow.steps (no root tree needed).
context:
  # Predefined tenant (tenant.id in scenarios_config.yaml)
  tenant_uuid: "9cafa427-504f-4bb7-a09f-ec1f5524facf"
  workflow: "new_claim"
  correct_flow:
    steps:
      - planner
      - task
      - new_claim
      - response_compose
  error_pattern: happy_path
  # Predefined agent (agent.id in scenarios_config.yaml → {prefix}.a2a.agent.target.id)
  agents:
    - uuid: "toro-customer-assistant-001"
      mcp:
        # Phone mcp_server (matches mcp_servers.phone.mcp_server_uuid in scenarios_config.yaml; {prefix}.mcp.server.uuid on spans)
        - server_uuid: "11111111-1111-4eec-8001-000000000001"
          tools:
            - name: new_claim
              uuid: "11111111-1111-4eec-8001-000000000011"
