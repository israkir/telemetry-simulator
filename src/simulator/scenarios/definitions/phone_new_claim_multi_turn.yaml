# Multi-turn conversation: one trace per turn, same session_id for all turns.
# Same trace hierarchy as phone_new_claim_happy; conversation.turns defines 3 interactions.
#
# Expected: 3 traces per iteration (one per turn), each with hierarchy:
#   a2a.orchestrate
#   ├── planner
#   ├── task.execute (llm_call) → llm.call
#   ├── task.execute (tool_recommendation) → tools.recommend
#   ├── task.execute (tool_execution) → mcp.tool.execute → mcp.tool.execute.attempt
#   └── response.compose
#
# Run: telemetry-simulator scenario --name phone_new_claim_multi_turn --count 1 --show-spans

name: phone_new_claim_multi_turn
description: >
  Multi-turn new-claim flow: 3 user/assistant turns per session; one trace per turn, same session_id.

simulation_goal: happy_path
mcp_server: phone

repeat_count: 1
interval_ms: 0
emit_metrics: false
emit_logs: false
redaction_applied: none

conversation:
  turns:
    - user_input: "I want to start a claim for my phone."
      llm_response: "I've started a claim (PH-8842). Describe what happened and I'll get you an appointment."
    - user_input: "The screen is cracked after a drop."
      llm_response: "Noted. Next repair slots: Wednesday 9am or Friday 2pm. Which do you prefer?"
    - user_input: "Wednesday 9am please."
      llm_response: "You're booked for Wednesday 9am. You'll get a confirmation by email."

context:
  tenant_uuid: "9cafa427-504f-4bb7-a09f-ec1f5524facf"
  workflow: "new_claim"
  correct_flow:
    steps:
      - planner
      - task
      - tools_recommend
      - new_claim
      - response_compose
  error_pattern: happy_path
  agents:
    - uuid: "toro-customer-assistant-001"
      mcp:
        - server_uuid: "11111111-1111-4eec-8001-000000000001"
          tools:
            - name: new_claim
              uuid: "11111111-1111-4eec-8001-000000000011"
